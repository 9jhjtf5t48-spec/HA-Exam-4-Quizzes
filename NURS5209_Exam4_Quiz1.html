*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1F3864;--teal:#2E75B6;--teal-light:#DEEAF1;

body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh;padding:2rem 1rem}

.header::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.05)}
.header h1{font-family:'DM Serif Display',serif;font-size:1.6rem;font-weight:400;margin-bottom:4px}
.header p{font-size:0.85rem;opacity:0.75;margin-bottom:1rem}
.progress-bar{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:8px}

.qcard{background:#fff;border-radius:16px;padding:1.75rem;box-shadow:var(--shadow);margin-bottom:1rem;border:1px solid var(--gray3)}
.q-meta{font-size:0.72rem;font-weight:600;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
.vignette{font-size:0.9rem;line-height:1.75;color:var(--text2);background:var(--teal-light);border-left:4px solid var(--teal);padding:12px 16px;border-radius:0 8px 8px 0;margin-bottom:1.25rem}

.option{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid var(--gray3);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:all 0.15s;font-size:0.9rem;color:var(--text);line-height:1.5}

.option.selected .option-letter{color:var(--blue)}

<script>
const Qs=[
{mod:10,vignette:"A 23-year-old woman presents to the clinic with complaints of painful lesions in her genital area for the past 4 days. She reports fever, headache, and malaise. On examination, you note clusters of small, shallow vesicles with surrounding erythema bilaterally on the labia and inner thighs. Inguinal lymph nodes are tender and enlarged.",stem:"Which of the following best describes this condition and its expected clinical course?",opts:["A single, painless indurated ulcer that resolves spontaneously but leads to systemic rash","Clusters of vesicles that progress to painful ulcers over 1–3 days, then hemorrhagic crusts over 2–3 weeks; virus remains dormant with recurrence up to 90% in the first year","Painless warty growths caused by HPV that may go unnoticed by the patient","A tender, fluctuant mass near the posterior labia requiring incision and drainage"],ans:1,rat:"Herpes simplex virus type 2 (genital herpes) presents as clusters of small, shallow vesicles bilaterally with erythema, inguinal adenopathy, and systemic symptoms. The lesions progress: vesicles (1–3 days) → painful ulcers → hemorrhagic crusts (2–3 weeks). The virus remains dormant and recurrence in year 1 is ~70–90%. This distinguishes it from syphilis (single painless indurated ulcer), HPV warts (painless, warty), and Bartholin abscess (unilateral, fluctuant)."},
{mod:10,vignette:"A 34-year-old woman is seen in your clinic for a vaginal lesion she noticed 1 week ago. She denies pain. On examination, you find a solitary, round ulcer with a yellowish serous discharge. Palpation reveals a firm, indurated base that can be elevated between your thumb and finger. Bilateral inguinal lymph nodes are non-tender.",stem:"What is the most likely diagnosis and key distinguishing examination finding?",opts:["Herpes simplex type 2 — bilateral clusters of vesicles with tender inguinal nodes","Syphilitic chancre (primary syphilis) — nontender, indurated ulcer with button-like base and nontender lymphadenopathy","Bartholin gland abscess — unilateral swelling at 5 or 7 o'clock with induration","Urethral caruncle — small red mass protruding from the urethral meatus"],ans:1,rat:"The syphilitic chancre of primary syphilis is classically PAINLESS with an indurated (hard) base that can be lifted like a button between the examiner's thumb and finger. Nontender inguinal lymphadenopathy is also characteristic. If untreated, it resolves spontaneously but secondary syphilis follows (fever, lymphadenopathy, mucocutaneous rash). The key differentiator from herpes: painless + indurated (herpes = painful clusters, bilateral, tender nodes)."},
{mod:10,vignette:"A 58-year-old postmenopausal woman presents complaining of pain with urination, urinary frequency, and occasional bleeding when she wipes. She denies discharge. On examination of the external genitalia, you visualize a small, deep red mass protruding from the urethral meatus. The lesion bleeds slightly on contact.",stem:"What is the most likely diagnosis?",opts:["Bartholin gland cyst","Urethral caruncle","Herpes simplex type 2 lesion","Syphilitic chancre"],ans:1,rat:"A urethral caruncle is a small, deep red, benign mass protruding from the urethral meatus. It is most common in postmenopausal women due to decreased estrogen and urethral atrophy. Symptoms include dysuria, frequency, hematuria, dyspareunia, or it may be asymptomatic. The lesion may bleed on contact. Bartholin gland cysts are located at 5 or 7 o'clock on the labia; herpes presents with clusters of vesicles; syphilis presents with an indurated ulcer."},
{mod:10,vignette:"During a well-woman exam, you palpate bilateral posterior labia majora with your index finger in the vagina and thumb outside at the 5 o'clock position. You note induration, erythema around the duct opening, and the patient reports pain with palpation.",stem:"What structure is being assessed and what does this finding indicate?",opts:["Skene's glands — findings suggest urethritis","Bartholin glands — findings indicate an abscess or infected cyst","Clitoris — findings suggest vulvar vestibulitis","Urethral meatus — findings suggest urethral caruncle"],ans:1,rat:"The Bartholin glands are located bilaterally at the 5 and 7 o'clock positions of the posterior labia majora. Normally they are not palpable. The correct palpation technique uses the index finger inside the vagina and thumb outside. Induration, erythema around the duct opening, and tenderness on palpation indicate an infected Bartholin cyst (abscess). Skene's glands are periurethral; the technique described does not assess the urethral meatus or clitoris."},
{mod:10,vignette:"A 13-year-old girl is brought in by her mother for her annual exam. On assessment, you note that the girl has sparse, slightly pigmented, mostly straight pubic hair growing primarily on the labia, with a small mound of breast and nipple tissue and widening of the areola.",stem:"Which Tanner stage best describes her sexual maturity rating for BOTH pubic hair and breast development?",opts:["Stage 1 for both pubic hair and breasts","Stage 2 for both pubic hair and breasts","Stage 3 for pubic hair, Stage 2 for breasts","Stage 2 for pubic hair, Stage 4 for breasts"],ans:1,rat:"Stage 2 pubic hair = sparse growth mostly on labia; long, downy hair, slightly pigmented, straight or only slightly curly. Stage 2 breast development = breast bud stage: small mound of breast and nipple develops; the areola widens. Both descriptions match Stage 2 on the Tanner scale. Stage 3 pubic hair spreads over the mons pubis and becomes darker and coarser. Stage 4 breasts show the areola and nipple forming a secondary mound above the breast."},
{mod:10,vignette:"During a school physical, you are assessing a 14-year-old girl. She has no pubic hair growth and no breast development. Her mother reports she has not yet had her first menstrual period. She appears otherwise healthy.",stem:"How should the NP interpret this finding?",opts:["This is within normal limits; puberty can begin as late as 16","This warrants concern for delayed puberty, as no breast or pubic hair development by age 14–15 is the threshold","This is normal because menarche typically begins before breast development","Stage 1 Tanner in a 14-year-old is not clinically significant unless she is underweight"],ans:1,rat:"Delayed puberty is defined as no pubic hair or breast development by age 14–15 years. Thelarche (breast development) is the first sign of puberty in girls and typically precedes menarche by about 2 years. The absence of any secondary sex characteristics at age 14 warrants evaluation for causes such as Turner syndrome, hypothalamic/pituitary disorders, or chronic illness."},
{mod:10,vignette:"You are counseling a 16-year-old Black girl about expected puberty milestones. Her peers of different racial backgrounds are asking why some girls start puberty at different ages.",stem:"Which statement accurately reflects evidence-based data on racial and ethnic differences in puberty onset?",opts:["White girls begin breast development earliest, at a mean age of 8.8 years","Black girls begin breast development earliest at a mean age of 8.8 years, while Asian girls begin latest at approximately 9.9 years","All racial groups begin puberty at the same mean age of 10 years","Hispanic girls have the latest onset of menarche of all groups"],ans:1,rat:"Evidence shows that Black girls begin breast budding (Tanner stage 2) at the earliest mean age of 8.8 years. Hispanic/Latina girls follow at ~9.2–9.3 years, White girls at ~9.6–9.7 years, and Asian girls at ~9.9 years. For menarche, Latina girls have the earliest median age (11.83 years) and Asian girls the latest (12.75 years). A key driver of earlier puberty onset across all groups is obesity/higher BMI."},
{mod:10,vignette:"A 42-year-old woman presents saying she leaks urine every time she sneezes, coughs, or laughs. She does not have a sudden urge to go before the leakage. The episodes have worsened since her vaginal delivery 2 years ago.",stem:"Which type of urinary incontinence does this patient most likely have?",opts:["Urge incontinence due to overactive bladder","Overflow incontinence due to incomplete bladder emptying","Stress incontinence due to involuntary urine loss with physical strain","Mixed incontinence with both urge and stress components"],ans:2,rat:"Stress incontinence is the involuntary loss of urine associated with physical activities that increase intra-abdominal pressure — sneezing, coughing, laughing, running, or bearing down. It is common postpartum due to weakened pelvic floor musculature. The patient does NOT describe a sudden urge before leakage, which distinguishes this from urge incontinence (overactive bladder). Overflow presents as frequent small dribbles due to incomplete bladder emptying. Mixed would require both stress and urge components."},
{mod:10,vignette:"A 68-year-old woman describes a sudden, strong urge to urinate that she cannot control, resulting in leakage before she can reach the bathroom. She denies any leakage with coughing or sneezing. She reports frequent trips to the bathroom, including 3 times at night.",stem:"What type of incontinence is this, and what is the underlying mechanism?",opts:["Stress incontinence — weakened urethral sphincter from pelvic floor dysfunction","Urge incontinence — overactive detrusor (bladder) muscle causing involuntary contractions","Overflow incontinence — bladder outlet obstruction preventing complete emptying","Functional incontinence — inability to reach the toilet in time due to mobility issues"],ans:1,rat:"Urge incontinence is characterized by a sudden, strong urge to void that cannot be suppressed, caused by overactive detrusor (bladder) muscle contractions. The patient cannot make it to the bathroom in time. Nocturia (voiding 3 times at night) is also consistent. This is not stress incontinence (no leakage with strain), not overflow (no dribbling/incomplete emptying), and not functional (mobility was not described as an issue)."},
{mod:10,vignette:"When teaching a 28-year-old woman about breast self-examination (BSE), she asks you: 'When exactly should I do this each month, and why?'",stem:"What is the most accurate and evidence-based response?",opts:["Perform BSE on the first day of your menstrual period when estrogen levels are highest","Perform BSE on days 4–7 after your period begins, when breasts are smallest and least congested","Perform BSE mid-cycle around day 14 when breasts are most sensitive","For postmenopausal women, BSE is not recommended — mammography is sufficient"],ans:1,rat:"The best time to perform BSE is days 4–7 of the menstrual cycle (right after the period), when breasts are smallest and least congested, making any lump easier to detect. During the luteal phase (mid-to-late cycle), breast volume and nodularity increase due to hormonal effects, making palpation less accurate. For women without periods (postmenopausal, pregnant), a consistent date such as the 1st of the month is recommended. BSE is still valuable across all age groups as a supplement to mammography."},
{mod:10,vignette:"During a breast examination, you ask your patient to lean forward from a seated position. She asks why you are asking her to do this.",stem:"What is the primary clinical purpose of having the patient lean forward during breast examination?",opts:["To inspect for nipple inversion by changing gravitational position","To best access the axillae and detect lumps in the axillary tail of Spence","To assess for peau d'orange by stretching the skin","To perform the bimanual technique for measuring lump size"],ans:1,rat:"When the patient leans forward while seated, the breast falls away from the chest wall, allowing the examiner better access to the axillae and the axillary tail of Spence — the extension of breast tissue that projects up into the axilla close to the pectoral axillary lymph nodes. This is the optimal position for finding lumps in the axillary region. The supine position with a pillow under the shoulder is optimal for thorough breast palpation. Peau d'orange is assessed by inspection of the skin surface."},
{mod:10,vignette:"On breast examination, you palpate a 2 cm × 1.5 cm mass in the right breast at the 10 o'clock position, 3 cm from the nipple. The mass is hard, irregular, fixed to the chest wall, and non-tender. The overlying skin shows dimpling.",stem:"Which characteristics are most consistent with a malignant breast lump?",opts:["Soft, rubbery, mobile, well-defined borders with cyclic tenderness","Hard, irregular, fixed to chest wall, non-tender, with skin dimpling","Multiple bilateral nodules that are freely mobile and tender before menstruation","Firm, smooth, oval, and extremely mobile — the lump slides away from your fingers"],ans:1,rat:"Malignant breast lesions classically present as hard, irregular, fixed (to chest wall or skin), and non-tender masses. Skin dimpling results from Cooper's ligament tethering. These features contrast with benign lesions, which tend to be soft or rubbery, round or oval, well-defined, mobile, and often cyclically tender. A very mobile, smooth, oval lump ('slippery') is more consistent with a fibroadenoma. Multiple bilateral rubbery nodules with cyclic pain suggest fibrocystic changes."},
{mod:10,vignette:"A 22-year-old uncircumcised male presents saying the foreskin 'got stuck' after he retracted it during intercourse and he cannot pull it back over the glans. The glans is now edematous, and the patient is in significant pain.",stem:"What condition is this, and what is the clinical concern?",opts:["Phimosis — the foreskin opening is too narrow to retract","Paraphimosis — the retracted foreskin cannot be returned forward, causing constriction of the glans and potential ischemia","Hypospadias — the urethral meatus is on the ventral surface","Epispadias — the urethral meatus is on the dorsal surface"],ans:1,rat:"Paraphimosis occurs when the foreskin has been retracted behind the glans and cannot be moved forward again. The tight ring of retracted foreskin constricts the glans, impairing venous/lymphatic return and causing edema, pain, and potentially ischemia. This is a urological emergency. Phimosis is when the foreskin is too tight to retract at all. Hypospadias is a congenital meatal location anomaly (ventral). Epispadias is dorsal meatal placement."},
{mod:10,vignette:"On digital rectal examination of a 65-year-old man, you palpate the prostate gland and find it symmetric, smooth, rubbery, and nontender, approximately walnut-sized, with the median sulcus palpable. The patient has no urinary symptoms.",stem:"Which best describes a normal prostate examination?",opts:["Symmetric nontender enlargement with obliterated median sulcus — consistent with BPH","Smooth, rubbery (like the tip of the nose), nontender, ~walnut size, with palpable median sulcus — normal","Exquisitely tender, slightly asymmetric, boggy texture — consistent with acute prostatitis","Stone-hard, irregular, fixed posterior nodule — suspicious for malignancy"],ans:1,rat:"A normal prostate on DRE is approximately walnut-sized, smooth, and has a consistency often compared to the tip of the nose (rubbery). It is nontender with a palpable median sulcus dividing two lateral lobes. BPH: symmetric nontender enlargement with the median sulcus obliterated. Prostatitis: exquisitely tender, possibly asymmetric or boggy. Prostate cancer: stone-hard, irregular, fixed nodule on the posterior surface."},
{mod:10,vignette:"A 72-year-old man presents with urinary frequency, hesitancy, a weak stream, and sensation of incomplete bladder emptying. On DRE, the prostate is symmetrically enlarged, smooth, rubbery-to-firm, nontender, and the median sulcus is obliterated.",stem:"What is the most likely diagnosis based on symptoms and examination?",opts:["Prostate cancer — stone-hard nodule on posterior surface","Acute prostatitis — exquisitely tender, asymmetric, boggy prostate","Benign prostatic hyperplasia (BPH) — symmetric nontender enlargement with obliterated median sulcus","Chronic prostatitis — isolated firm areas from fibrosis"],ans:2,rat:"BPH is present in ~80% of men over 60. Classic symptoms include urinary frequency, hesitancy, weak or intermittent stream, nocturia, and sensation of incomplete emptying. The DRE finding is a symmetric, nontender enlargement with a smooth, rubbery-to-firm surface and OBLITERATED median sulcus. Cancer presents with a hard nodule. Prostatitis is tender."},
{mod:10,vignette:"A 28-year-old man presents with acute fever, chills, perineal pain, dysuria, and urethral discharge. On DRE, the prostate is exquisitely tender, slightly asymmetric, and feels swollen.",stem:"What is the most likely prostate diagnosis?",opts:["BPH — symmetric nontender enlargement","Prostate cancer — stone-hard, fixed posterior nodule","Acute prostatitis — exquisitely tender, asymmetric, swollen prostate","Normal prostate — findings are within expected range"],ans:2,rat:"Acute prostatitis presents with systemic symptoms (fever, chills, malaise) and genitourinary symptoms (dysuria, frequency, urgency, perineal pain, urethral discharge). On DRE, the hallmark is an EXQUISITELY TENDER prostate that is swollen and may be slightly asymmetric. This distinguishes it from BPH (nontender, symmetric) and cancer (nontender, stone-hard nodule)."},
{mod:10,vignette:"A 19-year-old male college athlete presents for a sports physical. He reports a painless lump in his right testicle that he noticed 3 weeks ago. He has a history of cryptorchidism (right side) corrected surgically at age 2.",stem:"Which statement about testicular cancer risk is most accurate?",opts:["Testicular cancer most commonly occurs in men over 60; the patient's age is reassuring","History of cryptorchidism is the strongest known risk factor for testicular cancer; this patient warrants urgent evaluation","The lump is almost certainly a hydrocele, which is fluid-filled and transilluminates","Testicular cancer presents with painful testicular swelling; since he is pain-free, cancer is unlikely"],ans:1,rat:"Testicular cancer most commonly occurs between ages 15–35. A history of cryptorchidism (undescended testis) is the strongest known risk factor. Even after surgical correction, the risk remains elevated. Testicular cancer is often PAINLESS — pain actually suggests epididymitis or torsion. A hydrocele transilluminates; a solid testicular mass does not. Any solid, non-transilluminating testicular mass in a young male with cryptorchidism history requires urgent ultrasound evaluation."},
{mod:10,vignette:"On scrotal examination, you shine a penlight from behind the scrotum and observe a red glow through the scrotal wall. The mass is located superior to the testis, is non-tender, and smooth.",stem:"What does transillumination indicate, and what condition is most likely?",opts:["Solid tissue — most likely epididymitis","Solid tissue — most likely a testicular tumor","Serous fluid — most likely a hydrocele or spermatocele","Blood — most likely testicular torsion"],ans:2,rat:"Transillumination of the scrotum: serous fluid (hydrocele, spermatocele) glows red because light passes through fluid. Solid tissue and blood do NOT transilluminate. A hydrocele is fluid within the tunica vaginalis surrounding the testis; a spermatocele is a cyst of the epididymis. Epididymitis is solid and tender. Testicular tumors are solid. Testicular torsion involves blood and is extremely painful — does not transilluminate."},
{mod:10,vignette:"A 25-year-old male presents with a dull ache in his left scrotum. On inspection the left hemiscrotum appears full. On palpation the spermatic cord on the left feels soft, swollen, and tortuous — described as a 'bag of worms'. The mass does NOT transilluminate.",stem:"What is the most likely diagnosis?",opts:["Hydrocele — serous fluid surrounding the testis","Varicocele — dilated tortuous veins of the pampiniform plexus, usually left-sided","Epididymitis — indurated, swollen, tender epididymis","Inguinal hernia — bowel descending into the scrotum"],ans:1,rat:"A varicocele is dilation and tortuosity of the veins of the pampiniform plexus — classically described as a 'bag of worms.' It is predominantly LEFT-sided (due to the left testicular vein draining at a right angle into the left renal vein, creating higher venous pressure). It does NOT transilluminate. It may cause a dull ache and is associated with male infertility."},
{mod:10,vignette:"A 32-year-old woman who is 3 days post-vaginal delivery asks about when she can start doing breast self-exams again. She wants to know which part of the menstrual cycle is best for BSE.",stem:"What timing should the NP recommend for BSE in a menstruating woman?",opts:["The last 3 days before her period when breasts are most sensitive","Day 1 of her period (first day of menses)","Days 4–7 after her period begins, when breasts are smallest and least congested","The middle of her cycle, around day 14, when hormone levels are highest"],ans:2,rat:"The menstrual cycle begins on day 1 (first day of menstrual flow). Breast volume is SMALLEST on days 4–7, when estrogen and progesterone levels are at their nadir and nodularity is minimized. This is the optimal window for BSE because lumps are easiest to detect when the breasts are least congested. In the days before menstruation, breasts feel full, tight, and heavy, making palpation less accurate."},
{mod:11,vignette:"A 45-year-old office worker presents with wrist pain, numbness in her thumb, index, and middle fingers, and nocturnal tingling that wakes her. You perform a test by asking her to hold both hands back-to-back, flexing the wrists to 90 degrees for 60 seconds. She reports reproduction of her symptoms.",stem:"What test was performed and what does a positive result indicate?",opts:["Tinel sign — positive for ulnar nerve entrapment","Phalen test — positive for carpal tunnel syndrome (median nerve compression)","McMurray test — positive for torn medial meniscus","Lachman test — positive for anterior cruciate ligament tear"],ans:1,rat:"The Phalen test is performed by holding both hands back-to-back with wrists flexed 90 degrees for 60 seconds. A positive result (reproduction of numbness, burning, tingling in the thumb, index, middle, and radial half of the ring finger) indicates carpal tunnel syndrome — compression of the median nerve at the wrist."},
{mod:11,vignette:"A 38-year-old carpenter reports numbness and burning in his right hand, especially at night. When you tap over the volar aspect of his wrist at the location of the median nerve, he reports burning and tingling radiating into his thumb, index, and middle fingers.",stem:"What test was performed and what does this positive finding confirm?",opts:["Phalen test — positive for carpal tunnel syndrome","Tinel sign — positive for carpal tunnel syndrome (median nerve entrapment at the wrist)","Lasègue test — positive for herniated disc","McMurray test — positive for meniscal tear"],ans:1,rat:"The Tinel sign is elicited by direct percussion (tapping) over the median nerve at the carpal tunnel (volar/palmar aspect of the wrist). A positive Tinel sign produces burning and tingling along the median nerve distribution (thumb, index, middle, and radial half of ring finger). Both the Phalen test and Tinel sign are used to assess for carpal tunnel syndrome."},
{mod:11,vignette:"During a knee examination, you position a 32-year-old football player supine, flex his knee and hip, externally rotate the leg, apply valgus stress to the knee, and slowly extend it. You feel a palpable 'click'.",stem:"What test was performed and what does this finding indicate?",opts:["Lachman test — positive for ACL tear","McMurray test — positive for torn meniscus (refer for imaging and possible surgical repair)","Lasègue test — positive for herniated lumbar disc","Valgus stress test — positive for medial collateral ligament tear"],ans:1,rat:"The McMurray test is performed when a patient has a history of knee trauma with locking, giving way, or local pain. Technique: supine, flex knee and hip, externally rotate leg, apply valgus stress, slowly extend. A positive McMurray test produces a palpable or audible 'click' and indicates a torn meniscus. This requires orthopedic referral for imaging and possible surgical repair."},
{mod:11,vignette:"A 29-year-old woman fell while hiking and now reports lower back pain radiating down her right leg below the knee. On examination, you raise her right leg while keeping the knee extended. At 50 degrees elevation, she reports sharp pain radiating down the leg, which intensifies when you dorsiflex her foot.",stem:"What test was performed and what does this positive finding suggest?",opts:["McMurray test — torn right meniscus","Lasègue (straight leg raise) test — strongly suggests herniated lumbar disc with nerve root compression/sciatica","Phalen test — carpal tunnel syndrome","Lachman test — ACL tear of the right knee"],ans:1,rat:"The Lasègue test (straight leg raise) is positive when raising the extended leg reproduces or worsens sciatic pain radiating below the knee. Dorsiflexion of the foot further stretches the nerve over the disc protrusion, increasing pain if truly positive. This strongly suggests a herniated nucleus pulposus with nerve root compression (sciatica)."},
{mod:11,vignette:"A patient asks you to explain the normal range of motion for their shoulder during a rehabilitation consult. They specifically want to know about forward flexion, abduction, internal rotation, and external rotation.",stem:"Which of the following correctly identifies the expected normal ROM for each shoulder movement?",opts:["Forward flexion 90°, abduction 90°, internal rotation 45°, external rotation 45°","Forward flexion 180°, abduction 180°, internal rotation 90°, external rotation 90°","Forward flexion 130°, abduction 130°, internal rotation 60°, external rotation 60°","Forward flexion 180°, abduction 90°, internal rotation 45°, external rotation 45°"],ans:1,rat:"Normal shoulder ROM per Jarvis: forward flexion = 180°, hyperextension = up to 50°, abduction = 180°, adduction = 50°, internal rotation = 90°, external rotation = 90°. Both flexion and abduction reach 180°. Both internal and external rotation = 90°."},
{mod:11,vignette:"During a sports physical, you are describing the muscles of the rotator cuff to a patient. You explain that four muscles work together to stabilize and rotate the arm.",stem:"Which of the following correctly identifies the SITS muscles of the rotator cuff and their primary function?",opts:["Supraspinatus, Infraspinatus, Trapezius, Subscapularis — extend the arm at the shoulder","Supraspinatus, Infraspinatus, Teres Minor, Subscapularis — rotate the arm and stabilize the humeral head in the glenoid fossa","Serratus, Infraspinatus, Teres Major, Subscapularis — abduct the arm and stabilize the AC joint","Supraspinatus, Iliopsoas, Teres Minor, Subscapularis — flex and internally rotate the arm"],ans:1,rat:"The SITS muscles are the Supraspinatus, Infraspinatus, Teres Minor, and Subscapularis. Together they form a cover around the head of the humerus, rotating the arm laterally and stabilizing the humeral head against the shallow glenoid fossa of the scapula."},
{mod:11,vignette:"You are explaining joint types to a nursing student during a musculoskeletal module. You describe a joint where the bones are enclosed in a joint cavity lined with a synovial membrane that secretes lubricating fluid.",stem:"What type of joint is being described, and what is a clinical example?",opts:["Fibrous joint — immovable, example: skull sutures","Cartilaginous joint — slightly movable, example: vertebral bodies","Synovial joint — freely movable, example: knee or shoulder","Amphiarthrosis — slightly movable, example: pubic symphysis"],ans:2,rat:"Synovial joints are freely movable (diarthroses). They are enclosed in a joint cavity lined by a synovial membrane that secretes synovial fluid. Articular cartilage covers the opposing bony surfaces. Examples include the knee, shoulder, hip, elbow, and wrist. Fibrous joints (e.g., skull sutures) are immovable. Cartilaginous joints (e.g., vertebrae, pubic symphysis) are slightly movable."},
{mod:11,vignette:"A 67-year-old woman comes in for a routine physical. She reports morning stiffness lasting about 20 minutes, bilateral hand pain, and nodular enlargements at her DIP joints. X-ray shows joint space narrowing.",stem:"What type of arthritis best matches this clinical presentation?",opts:["Rheumatoid arthritis — symmetric MCP joint involvement with >1 hour of morning stiffness","Osteoarthritis — bony hard Heberden nodes at DIP joints, morning stiffness <30 minutes, worsened with activity","Gout — acute onset of redness and warmth at the first MTP joint (podagra)","Septic arthritis — fever, single joint involvement, warm joint requiring joint aspiration"],ans:1,rat:"Osteoarthritis (OA) is characterized by Heberden nodes (bony enlargements at DIP joints) and Bouchard nodes (PIP joints). Morning stiffness is typically <30 minutes. Pain worsens with activity and improves with rest. In contrast, RA involves symmetric MCP and PIP joints, is inflammatory, and causes prolonged morning stiffness >1 hour."},
{mod:11,vignette:"During a health promotion visit, a 63-year-old woman asks when she should get a bone density scan. She is postmenopausal and has no history of fracture.",stem:"What is the current evidence-based recommendation for DEXA screening in women?",opts:["All women should have a DEXA scan at age 50 when they enter menopause","All women should have a DEXA (bone mineral density) scan by age 65; women at high risk may be screened earlier","DEXA screening is only recommended after a fracture has occurred","Men and women should be screened at the same age regardless of risk factors"],ans:1,rat:"Current guidelines recommend that ALL women receive a DEXA scan by age 65 years. Women younger than 65 with risk factors should be screened earlier. Men should be screened if specific risk factors exist. DEXA is noninvasive with low radiation exposure. The FRAX tool calculates 10-year fracture risk to guide treatment decisions."},
{mod:12,vignette:"During a neurologic examination, you test a patient's ability to identify odors with eyes closed, assess visual acuity, observe for facial symmetry when smiling, and check hearing with a tuning fork.",stem:"Which cranial nerves are being assessed in the order described?",opts:["CN I, CN II, CN VII, CN VIII","CN II, CN III, CN VI, CN V","CN I, CN III, CN V, CN VII","CN II, CN IV, CN VII, CN X"],ans:0,rat:"CN I (Olfactory) = smell identification. CN II (Optic) = visual acuity. CN VII (Facial) = facial muscle symmetry — tested by asking the patient to smile. CN VIII (Vestibulocochlear/Acoustic) = hearing and equilibrium tested with tuning fork."},
{mod:12,vignette:"A 55-year-old man suffered a left-sided stroke. His wife reports he understands what is said to him but cannot produce fluent speech. His speech is halting and effortful, with simplified sentence structure.",stem:"Which type of aphasia does this patient have and which brain area is affected?",opts:["Wernicke's aphasia — damage to the temporal lobe speech comprehension center","Broca's aphasia — damage to the frontal lobe motor speech center","Global aphasia — damage to both Broca's and Wernicke's areas","Dysarthria — motor dysfunction of the muscles used in speech"],ans:1,rat:"Broca's aphasia (expressive aphasia) results from damage to Broca's area in the frontal lobe of the dominant hemisphere. The patient understands language but cannot produce fluent speech — output is labored, telegraphic, and non-fluent. Wernicke's aphasia: fluent but incomprehensible speech; patient does not understand. Global aphasia: both production and comprehension impaired."},
{mod:12,vignette:"A 48-year-old woman suddenly cannot understand what her family is saying to her. Her speech is fluent but she is using wrong words and jargon that doesn't make sense. She appears unaware that her speech is abnormal.",stem:"Which type of aphasia does this patient most likely have, and which lobe is damaged?",opts:["Broca's aphasia — frontal lobe, non-fluent speech with intact comprehension","Wernicke's aphasia — temporal lobe, fluent but incomprehensible speech with poor comprehension","Global aphasia — damage to multiple language areas bilaterally","Expressive aphasia — patient understands but struggles to find words"],ans:1,rat:"Wernicke's aphasia (receptive aphasia) results from damage to Wernicke's area in the temporal lobe. Hallmark: fluent, rapid speech filled with paraphasias and jargon. Patient does NOT comprehend language and is unaware their output is abnormal. This contrasts with Broca's aphasia where the patient is non-fluent but understands."},
{mod:12,vignette:"You are performing a neurologic exam and testing cranial nerve XI. The patient is asked to shrug both shoulders against resistance and then turn their head against resistance.",stem:"What muscles are being assessed and what does weakness of CN XI indicate?",opts:["Masseter and temporalis — weakness indicates trigeminal nerve lesion","Trapezius and sternocleidomastoid (SCM) — weakness indicates CN XI (spinal accessory) lesion","Orbicularis oculi and frontalis — weakness indicates CN VII lesion","Tongue muscles — weakness indicates CN XII lesion"],ans:1,rat:"CN XI (Spinal Accessory nerve) innervates the trapezius muscle (shoulder shrug) and the sternocleidomastoid muscle (head turning). CN V controls mastication. CN VII controls facial muscles. CN XII controls tongue movement — tongue deviates TOWARD the side of a lower motor neuron lesion."},
{mod:12,vignette:"An infant's motor development is being assessed. The NP explains that motor skills develop in a predictable sequence: the baby first lifts its head, then lifts its head and shoulders, then rolls over, then uses hands, and finally walks.",stem:"What principle of neurologic development best explains this sequence?",opts:["Distal-to-proximal and caudocephalic progression driven by synaptic pruning","Cephalocaudal (head-to-toe) and proximodistal (trunk-to-extremity) myelination","Bilateral cortical maturation beginning in the occipital lobe spreading anteriorly","Primitive reflex integration beginning at birth and completing by age 5"],ans:1,rat:"Motor development follows the process of myelination, which proceeds in a CEPHALOCAUDAL (head-to-toe) and PROXIMODISTAL (trunk outward to extremities) direction. Myelination is required for efficient nerve conduction. Primitive reflexes are present at birth; as the cerebral cortex myelinates during the first year, it inhibits these reflexes."},
{mod:12,vignette:"During a geriatric assessment, you ask a 78-year-old woman to rise from a chair, walk 10 feet, turn around, walk back, and sit down. She completes the task in 15 seconds.",stem:"How should the NP interpret this result of the Timed Get Up and Go (TUG) test?",opts:["Less than 12 seconds — normal, low fall risk","12–20 seconds — moderate fall risk, warrants further evaluation and fall prevention counseling","Greater than 20 seconds — high fall risk, requires immediate intervention","The TUG test result is not clinically useful without concurrent balance testing"],ans:1,rat:"The Timed Get Up and Go (TUG) test: <12 seconds = low fall risk (normal); 12–20 seconds = moderate fall risk; >20 seconds = HIGH fall risk. This patient at 15 seconds = moderate fall risk warranting fall prevention counseling and further evaluation."},
{mod:12,vignette:"A patient asks you: 'What is a dermatome, and why does my doctor say my finger numbness matches a specific nerve level?' The patient has numbness in their middle finger.",stem:"Which dermatome level corresponds to the middle finger, and what is the clinical significance?",opts:["C6 — numbness in the middle finger indicates C6 nerve root compression","C7 — numbness in the middle finger indicates C7 nerve root compression/herniated disc at that level","C8 — numbness in the pinky and ring finger indicates C8 involvement","T1 — sensory loss at the axilla corresponds to T1 dermatomal level"],ans:1,rat:"Key dermatome landmarks: C6 = thumb, C7 = middle finger, C8 = fifth (little) finger. Middle finger numbness correlating with C7 suggests C7 nerve root pathology (e.g., disc herniation at C6-C7). Other key landmarks: T1 = axilla, T4 = nipple, T10 = umbilicus, L1 = groin, L4 = knee."},
{mod:12,vignette:"A patient's family is concerned because he has been repeating the same questions multiple times each day, recently got lost driving to a grocery store he has shopped at for 20 years, and relies heavily on reminder notes he didn't need before.",stem:"Which of the following best distinguishes this presentation from normal aging?",opts:["Forgetting where he put his car keys but later finding them — this is age-related","Forgetting important recent events that cannot be recalled later, losing ability to navigate familiar routes, and requiring memory aids — these are warning signs of Alzheimer's disease","Occasionally forgetting the name of an acquaintance — this is normal aging","Feeling weary of social obligations and preferring to stay home — this is within normal limits"],ans:1,rat:"Warning signs of Alzheimer's disease include: forgetting important recent information and being unable to recall it later, getting lost in familiar places, and increasing reliance on memory aids. These contrast with normal aging: forgetting names occasionally but remembering later, occasionally misplacing keys but retracing steps."},
{mod:12,vignette:"A 62-year-old patient is referred for a neurologic evaluation. The referring provider notes the patient has motor weakness, personality changes, and difficulty with abstract thinking.",stem:"Which lobe is associated with personality, behavior, emotions, and intellectual function?",opts:["Parietal lobe — primary sensory processing center","Occipital lobe — primary visual reception center","Frontal lobe — personality, behavior, emotions, and intellectual function; also houses Broca's area and the primary motor area","Temporal lobe — primary auditory reception; houses Wernicke's area"],ans:2,rat:"The frontal lobe mediates personality, behavior, emotions, and intellectual function (planning, judgment, insight). The precentral gyrus of the frontal lobe is the primary motor cortex. Broca's area (motor speech) is also in the frontal lobe. Parietal lobe: postcentral gyrus = primary sensory area. Temporal lobe: hearing, taste, smell, and Wernicke's area. Occipital lobe: primary visual receptor."},
{mod:13,vignette:"A 16-year-old basketball player is having a preparticipation physical evaluation (PPE) before his junior year season. During the cardiovascular history, he reports that his maternal uncle died suddenly at age 38 during exercise.",stem:"Which finding on the cardiovascular history during a sports PPE is MOST concerning for potential sudden cardiac death risk?",opts:["A history of mild asthma well-controlled with an albuterol inhaler","A family history of premature sudden death in a relative under 50 years during physical exertion — possible hypertrophic cardiomyopathy","Mild scoliosis noted on screening orthopedic exam","A murmur that has been present since birth and was cleared by a cardiologist at age 10"],ans:1,rat:"The most common cause of sudden cardiac death in young athletes is hypertrophic cardiomyopathy (HCM). The AHA 14-point preparticipation screening specifically asks about family history of premature sudden death in relatives under 50. Other concerning history: exertional chest pain, unexplained syncope during exercise, prior recognition of a heart murmur, or known cardiac conditions (HCM, long QT, Marfan syndrome)."},
{mod:13,vignette:"During the orthopedic component of a sports physical, you ask a 15-year-old soccer player to perform a 'duck walk' — walking four steps while in a deep squat position.",stem:"What is the primary purpose of the duck walk during the sports physical?",opts:["To assess for hip flexor tightness and iliotibial band syndrome","To screen the hip, knee, and ankle joints simultaneously for strength, coordination, and pathology","To evaluate for scoliosis by observing spinal alignment during a squat","To assess ankle dorsiflexion and Achilles tendon flexibility"],ans:1,rat:"The duck walk (4 steps in a deep squat) is part of the 2-minute orthopedic screening examination during the sports PPE. It assesses the hip, knee, and ankle joints simultaneously for strength, range of motion, and coordination. It can reveal pathology such as knee pain, hip instability, or ankle limitation that may require further evaluation before sports clearance."},
{mod:13,vignette:"During a sports physical, you palpate a systolic murmur that increases in intensity when the patient performs the Valsalva maneuver and decreases when they go from squatting to standing.",stem:"What does a murmur that increases with Valsalva suggest, and what is the clinical significance in a young athlete?",opts:["This is a benign flow murmur consistent with high cardiac output during exercise — no further evaluation needed","This murmur pattern is consistent with hypertrophic cardiomyopathy (HCM) — requires cardiology referral before sports clearance","This is consistent with aortic stenosis — the murmur decreases with Valsalva in aortic stenosis","This suggests a ventricular septal defect — common in young athletes and not disqualifying"],ans:1,rat:"HCM murmurs increase with Valsalva (which decreases venous return/preload, exaggerating the dynamic outflow obstruction) and decrease with squatting (which increases preload, reducing obstruction). HCM is the most common cause of sudden cardiac death in young athletes and requires cardiology referral for echocardiography before sports clearance."},
{mod:14,vignette:"You are working in an urgent care clinic when a 72-year-old man is brought in by his daughter. She reports he has been 'acting confused' since this morning and was found wandering in his neighborhood. His baseline is described as sharp and independent. Vital signs: BP 100/70, HR 110, Temp 38.9°C, RR 22.",stem:"What is the most critical first consideration in this older adult with acute confusion?",opts:["This is likely early Alzheimer's disease — refer to neurology for formal evaluation","Acute delirium in an older adult is a medical emergency until proven otherwise — requires immediate evaluation for underlying cause (infection, metabolic, cardiac, neurologic)","Confusion in older adults is an expected part of aging — reassure the family","Acute confusion is most commonly caused by psychiatric illness in this age group"],ans:1,rat:"Acute onset confusion (delirium) in an older adult represents a MEDICAL EMERGENCY until an underlying cause is identified. In elderly patients, UTI, sepsis, metabolic derangements, medication toxicity, stroke, MI, and pulmonary embolism can ALL present as acute confusion. This patient's vital signs suggest infection/sepsis (fever, tachycardia, borderline hypotension)."},
{mod:14,vignette:"A 7-month-old infant is brought to urgent care by her parents for fever. The rectal temperature is 38.7°C (101.7°F). The infant appears irritable, has a bulging anterior fontanelle, and a petechial rash spreading on her trunk.",stem:"Which combination of findings requires the MOST urgent immediate action?",opts:["Fever alone in a 7-month-old — schedule sick visit within 24 hours","Fever with a petechial rash and bulging fontanelle — call 911, transfer immediately to emergency department for possible meningococcal disease","Irritability in an infant — normal given fever; administer acetaminophen and discharge","Bulging fontanelle alone — benign finding when an infant is crying"],ans:1,rat:"A petechial or purpuric rash in a febrile infant is a medical emergency — must be presumed to be meningococcal septicemia until proven otherwise. A bulging fontanelle combined with fever suggests meningitis. Together, these findings require IMMEDIATE transfer to an emergency department."},
{mod:14,vignette:"A 78-year-old nursing home resident is transferred to urgent care with a chief complaint of confusion and general malaise for 2 days. Her daughter denies fever, dysuria, or frequency. Urinalysis shows nitrites, leukocyte esterase, and bacteriuria.",stem:"What does this case illustrate about UTI presentation in older adults?",opts:["The absence of dysuria and frequency rules out UTI in this patient — the UA finding is incidental","In older adults, UTI may present atypically with confusion, lethargy, and behavioral changes rather than classic urinary symptoms","UTI does not cause confusion; another neurologic cause should be sought","All elderly patients with bacteriuria on UA should receive antibiotics regardless of symptoms"],ans:1,rat:"In OLDER ADULTS, UTI frequently presents ATYPICALLY — with confusion, delirium, lethargy, and behavioral changes rather than classic dysuria, frequency, and urgency. The aging nervous system is more vulnerable to systemic inflammatory effects of infection. Combined with a positive UA, the diagnosis is strongly supported."},
{mod:14,vignette:"Before initiating resuscitation on an 88-year-old woman in respiratory arrest who was transferred to your urgent care, a family member presents a POLST form indicating 'DNR/DNI — comfort measures only' signed by the patient's physician 6 months ago.",stem:"What is the NP's appropriate action?",opts:["Begin CPR and intubation anyway — the POLST may be outdated","Honor the POLST form; do not initiate CPR or intubation; provide comfort-focused care and notify the attending physician","Contact the ethics committee before making any decision","Only honor the form if the patient's healthcare proxy is present at the bedside"],ans:1,rat:"A POLST is a legally actionable medical order — not just a preference statement. It must be honored by all healthcare providers, including in emergency settings. A DNR/DNI order means no CPR, no endotracheal intubation. Honoring patient autonomy is a core principle. The NP should shift immediately to comfort-focused care."},
{mod:14,vignette:"A patient is seen in a small urgent care clinic after a high-speed motor vehicle accident. He has a suspected closed femur fracture, BP 88/60, HR 128, and GCS of 12. The clinic does not have surgical capabilities.",stem:"When should this patient be transferred, and what is the appropriate transport method?",opts:["Transfer can wait until the patient is fully stabilized — internal stabilization first","Transfer immediately via ALS ambulance or air transport; stabilize airway and IV access en route — the patient needs a trauma center urgently","Discharge with instructions to go directly to the nearest hospital by private car","Wait for imaging confirmation of fracture before transferring"],ans:1,rat:"This patient is hemodynamically unstable with altered mental status — a trauma emergency beyond urgent care capabilities. EMTALA requires appropriate stabilization AND transfer when the receiving facility has greater capability. Initial stabilization includes airway management, IV access, and hemorrhage control. Transfer via ALS ambulance or air transport given critical status."},
{mod:14,vignette:"You are teaching a new NP about the difference between a routine comprehensive H&P and an urgent assessment approach.",stem:"Which statement BEST distinguishes urgent assessment from routine health assessment?",opts:["Urgent assessment follows the same head-to-toe systematic approach but takes more time","Urgent assessment is prioritized around immediate threats to life (ABCs — airway, breathing, circulation), is expedient, and is focused on the presenting emergency rather than comprehensive review of all systems","Routine assessment begins with vital signs; urgent assessment does not include vital signs","In urgent assessment, the social history and family history are always obtained first"],ans:1,rat:"Emergency and urgent assessment differs from routine in purpose, priority, time frame, and focus. Urgent assessment: prioritizes ABCs, is expedient (seconds to minutes), and is targeted to the presenting emergency. Routine assessment: comprehensive, systematic, includes full health history, all body systems, health promotion."},
{mod:10,vignette:"A 19-year-old woman asks you to explain what the different stages of pubic hair development look like so she can teach her younger sister what to expect during puberty.",stem:"In the Sexual Maturity Rating (SMR) for pubic hair in girls, which description correctly identifies Stage 5?",opts:["Sparse, slightly pigmented hair growing mostly on the labia","Adult-type hair distributed in an inverse triangle pattern, also present on the medial thigh surface","Hair present over the mons pubis, darker and coarser but limited to the mons","Thick adult-type hair limited to the pubic area; absent from the medial thigh"],ans:1,rat:"Stage 5 pubic hair in girls is the adult pattern — distributed in an inverse triangle and also present on the medial thigh surface. Stage 1 = no pubic hair. Stage 2 = sparse hair mostly on labia, slightly pigmented. Stage 3 = darker, coarser, curlier hair spreading over mons pubis. Stage 4 = adult type but over smaller area; absent from medial thigh. Stage 5 = adult type in inverse triangle, including medial thigh."},
{mod:11,vignette:"A 4-month-old infant is brought in for a routine well-child visit. During the musculoskeletal assessment, you flex both knees and hips to 90 degrees, then abduct the hips. You hear and feel a 'clunk' on the right side.",stem:"What does this finding represent and what test was performed?",opts:["Barlow test — positive finding suggests the right hip can be dislocated posteriorly with adduction and posterior pressure","Ortolani maneuver — positive finding (a 'clunk' with abduction) suggests the right hip is dislocated and is being reduced back into the acetabulum — consistent with developmental dysplasia of the hip (DDH)","Galeazzi sign — unequal knee heights suggest leg-length discrepancy","McMurray test — positive for torn meniscus in the right knee"],ans:1,rat:"The Ortolani maneuver is performed by flexing the hips and knees to 90°, then gently abducting the hips. A palpable/audible 'clunk' is a positive Ortolani sign — indicating that a dislocated femoral head is being relocated back into the acetabulum, diagnostic for DDH. Requires prompt orthopedic referral."},
{mod:12,vignette:"A 30-year-old woman presents with a 3-day history of complete right-sided facial paralysis, including inability to close her right eye, asymmetric smile, and inability to raise her right eyebrow. She denies limb weakness.",stem:"Which cranial nerve is affected, and what is the clinical significance of the inability to raise the eyebrow?",opts:["CN V (trigeminal) — sensory loss over face is the primary deficit","CN VII (facial nerve) — inability to raise the eyebrow indicates a lower motor neuron lesion (Bell's palsy) affecting all ipsilateral facial muscles including the forehead","CN III (oculomotor) — ptosis and inability to open the eye indicate CN III compression","CN XII (hypoglossal) — tongue deviation toward the affected side"],ans:1,rat:"CN VII (facial nerve) controls all facial muscles of expression. Bell's palsy is an idiopathic LMN CN VII palsy — affects ALL ipsilateral facial muscles, including the forehead (cannot raise eyebrow). KEY differentiator: forehead involvement = peripheral/LMN lesion (Bell's palsy). Forehead spared = central/UMN lesion (stroke). This is because the forehead has bilateral cortical representation."},
{mod:12,vignette:"You perform a cerebellar assessment on a 52-year-old man. You ask him to stand with feet together and arms at sides, then close his eyes. He immediately begins swaying and nearly falls.",stem:"What test was performed and what does a positive result indicate?",opts:["Finger-nose test — positive for intention tremor indicating cerebellar dysfunction","Romberg test — positive result (swaying with eyes closed but not open) suggests a proprioception or vestibular deficit rather than cerebellar disease","Heel-to-shin test — positive for lower extremity ataxia","Timed Get Up and Go — indicates high fall risk greater than 20 seconds"],ans:1,rat:"The Romberg test assesses proprioception and vestibular function. A positive Romberg test = maintaining balance with eyes OPEN but losing balance with eyes CLOSED. This indicates a proprioception or vestibular deficit (not primarily cerebellar). In cerebellar ataxia, the patient sways with BOTH eyes open and closed."},
{mod:10,vignette:"During a well-woman exam, a 38-year-old woman in the supine position with a small pillow under her right shoulder is being examined. The NP uses the vertical strip (lawnmower) pattern with flat finger pads, making small circular motions from the axilla to the sternum.",stem:"What examination position and technique is being used, and what is the purpose of the pillow under the shoulder?",opts:["The patient is in the sitting position for bimanual technique — the pillow stabilizes the torso","The patient is supine with a pillow under the ipsilateral shoulder — this flattens the breast tissue and spreads it evenly across the chest wall for more thorough palpation","The pillow is used for patient comfort only and has no clinical purpose","The supine position is not recommended for breast palpation — the sitting position is superior for all palpation"],ans:1,rat:"When performing clinical breast examination (CBE), the supine position with a small pillow placed under the ipsilateral (same-side) shoulder causes the breast to spread evenly across the chest wall, reducing thickness and making palpation more thorough. The vertical strip pattern with flat finger pads in small circular motions at three pressure levels is the recommended technique."},
{mod:11,vignette:"A 50-year-old man presents with wrist pain after falling on an outstretched hand. He has swelling at the wrist and when viewed from the side you note a characteristic 'silver fork' deformity.",stem:"What injury pattern is described, and what is the mechanism?",opts:["Colles' fracture — nonarticular fracture of the distal radius, typically from a fall on an outstretched hand; more common in older women","Dupuytren contracture — hyperplasia of the palmar fascia causing flexion contractures","Smith fracture — volar displacement of the distal radius from a fall on a flexed wrist","Carpal tunnel syndrome — median nerve compression at the wrist"],ans:0,rat:"A Colles' fracture is a fracture of the distal radius resulting from a fall on an outstretched hand. The 'silver fork' deformity is the classic finding on lateral view — dorsal displacement of the distal fragment. It is most common in older women with osteoporosis."},
{mod:14,vignette:"During a review of SOAP documentation, a nursing student asks the NP: 'I wrote the patient's vital signs in the Subjective section. Was that correct?'",stem:"Where do vital signs belong in a SOAP note, and what is the correct placement?",opts:["Subjective — because vital signs reflect the patient's current physiologic state as reported by the patient","Objective — because vital signs are measured and observed by the clinician, not reported by the patient","Assessment — because vital signs are used to assess the patient's diagnosis","Plan — because vital signs guide treatment decisions"],ans:1,rat:"SOAP note: Subjective (S) = what the patient reports — symptoms, complaints, history. Objective (O) = what the clinician MEASURES or OBSERVES — vital signs, physical examination findings, laboratory results. Vital signs are objective measurements taken by the provider, not reported by the patient."},
{mod:12,vignette:"A 3-month-old infant still has a strong Moro reflex, grasp reflex, and rooting reflex. The pediatric NP reassures the parents these are expected findings. However, the NP notes an asymmetric Moro reflex — the left arm does not extend as fully as the right.",stem:"What does an asymmetric Moro reflex in a newborn/young infant suggest?",opts:["Asymmetric Moro is a normal variant in premature infants only","Asymmetric Moro suggests unilateral pathology — possible brachial plexus injury (Erb's palsy from birth trauma), clavicle fracture, or hemiplegia — requires further evaluation","All primitive reflexes are symmetric by definition; this finding is not clinically significant","Asymmetric Moro indicates the dominant hand side is developing faster"],ans:1,rat:"The Moro (startle) reflex is normally SYMMETRIC. An ASYMMETRIC Moro reflex is abnormal and suggests unilateral pathology: brachial plexus injury (Erb's palsy — C5-C6 injury from lateral neck traction during delivery), clavicle fracture (pain inhibits the response), or hemiplegic cerebral palsy. Any asymmetric primitive reflex requires further neurologic evaluation."},
];

let cur=0,sel=Array(50).fill(-1),sub=Array(50).fill(false),cor=Array(50).fill(false);

function render(){
  const q=Qs[cur],isSub=sub[cur],s=sel[cur],ca=q.ans;
  const opts=q.opts.map((o,i)=>{
    let c='option';
    if(isSub){c+=' locked';if(i===ca)c+=' correct';else if(i===s&&s!==ca)c+=' wrong';}
    else if(i===s)c+=' selected';
    return `<div class="${c}" onclick="pick(${i})"><span class="option-letter">${String.fromCharCode(65+i)}.</span><span>${o}</span></div>`;
  }).join('');
  const rat=isSub?`<div class="rationale ${s===ca?'correct-r':'wrong-r'}"><div class="rationale-label">${s===ca?'Correct!':'Incorrect. Correct answer: '+String.fromCharCode(65+ca)+'.'}</div><div>${q.rat}</div></div>`:'';
  const nav=`<div class="nav">
    <button class="btn" onclick="go(cur-1)" ${cur===0?'disabled':''}>← Back</button>
    ${!isSub?`<button class="btn primary" onclick="submit()" ${s===-1?'disabled':''}>Submit answer</button>`:''}
    ${cur<49?`<button class="btn" onclick="go(cur+1)">Next →</button>`:''}
    ${cur===49&&isSub?`<button class="btn primary" onclick="showResults()">View final score</button>`:''}
  </div>`;
  const done=sub.filter(Boolean).length,corr=cor.filter(Boolean).length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/50)*100)+'%';
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('ans-count').textContent=done;
  document.getElementById('cor-count').textContent=corr;
  document.getElementById('qarea').innerHTML=`<div class="qcard"><div class="q-meta">Module ${q.mod} · Question ${cur+1} of 50</div><div class="vignette">${q.vignette}</div><div class="stem">${q.stem}</div>${opts}${rat}</div>${nav}`;
}

function pick(i){if(sub[cur])return;sel[cur]=i;render();}
function submit(){if(sel[cur]===-1)return;sub[cur]=true;cor[cur]=(sel[cur]===Qs[cur].ans);render();}
function go(i){if(i<0||i>49)return;cur=i;render();}

function showResults(){
  const tot=cor.filter(Boolean).length,pct=Math.round((tot/50)*100);
  let grade='',gc='#A32D2D';
  if(pct>=90){grade='A — Excellent! Exam ready!';gc='#1D9E75';}
  else if(pct>=80){grade='B — Good — review weak areas';gc='#2E75B6';}
  else if(pct>=70){grade='C — Passing, more review needed';gc='#BA7517';}
  else{grade='Below passing — intensive review needed';}
  const rev=Qs.map((q,i)=>{
    const ok=cor[i],ua=sel[i]>=0?String.fromCharCode(65+sel[i]):'—';
    return `<div class="review-item ${ok?'r-correct':'r-wrong'}"><div class="review-q">Q${i+1} (Mod ${q.mod}): ${q.stem.substring(0,90)}...</div><div class="review-detail">Your answer: ${ua} · Correct: ${String.fromCharCode(65+q.ans)} · ${ok?'✓ Correct':'✗ Incorrect'}</div></div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('qarea').innerHTML=`<div class="score-card"><div class="score-big" style="color:${gc}">${pct}%</div><div class="score-label">${tot} of 50 correct</div><div class="grade" style="color:${gc}">${grade}</div></div><div style="margin-bottom:1rem"><button class="btn" onclick="go(0)">← Review questions</button></div>${rev}`;
}

render();
</script>
</body>
</html>
