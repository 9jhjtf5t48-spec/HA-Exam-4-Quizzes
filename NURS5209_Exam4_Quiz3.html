<script>
const Qs=[
{mod:10,vignette:"A 26-year-old woman presents with painful genital lesions, fever, and swollen groin lymph nodes for 5 days. You note multiple small, shallow bilateral vulvar ulcers. She had a similar episode 8 months ago that resolved on its own.",stem:"Which feature MOST characterizes HSV-2 and distinguishes it from syphilis?",opts:["A single painless indurated ulcer with nontender inguinal lymphadenopathy","Bilateral painful vesicular clusters progressing to ulcers, with recurrence due to viral latency in dorsal root ganglia","A tender fluctuant mass at the 5 or 7 o'clock posterior labial position","A small deep red mass protruding from the urethral meatus that bleeds on contact"],ans:1,rat:"HSV-2 is characterized by bilateral painful vesicular clusters progressing to ulcers then hemorrhagic crusts. The virus establishes latency in dorsal root ganglia, causing recurrence — ~70–90% in year 1. The bilateral painful distribution and recurrent nature distinguish it from syphilis (single painless indurated chancre), Bartholin abscess (posterior labia unilateral), and urethral caruncle (meatus mass)."},
{mod:10,vignette:"A 28-year-old woman has a solitary, painless genital ulcer with a yellowish serous discharge. The ulcer base is firm and indurated — like a button when elevated between thumb and finger. Bilateral inguinal nodes are enlarged but non-tender.",stem:"What is the most important teaching point if this condition is left untreated?",opts:["The lesion will become increasingly painful requiring antiviral therapy within 72 hours","The primary chancre resolves spontaneously, but untreated disease progresses to secondary syphilis with systemic fever, rash (including palms and soles), and lymphadenopathy","The lesion indicates HPV infection requiring colposcopy","Without treatment the Bartholin gland will rupture"],ans:1,rat:"Classic syphilitic chancre of primary syphilis. Critical teaching: the chancre resolves spontaneously, but the disease does NOT go away. It progresses to secondary syphilis (fever, generalized lymphadenopathy, mucocutaneous rash on palms and soles), then latent, and potentially tertiary syphilis (cardiovascular, gummatous, neurosyphilis). Patients must understand that lesion resolution ≠ cure."},
{mod:10,vignette:"During a pelvic exam you palpate a smooth, non-tender, round 2 cm swelling in the posterior right labia majora at the 5 o'clock position. No erythema or warmth is present.",stem:"How should this finding be interpreted?",opts:["Normal — Bartholin glands of this size are expected in reproductive-age women","Abnormal — Bartholin glands are not normally palpable; any swelling, even non-tender, warrants further evaluation","Bartholin gland abscess — requires immediate incision and drainage","Urethral caruncle — refer to urology"],ans:1,rat:"Bartholin glands are NEVER normally palpable. Any swelling is abnormal. A non-tender cyst represents a blocked duct with accumulated secretions and can become infected. Palpation technique: index finger in vagina, thumb outside, at 5 and 7 o'clock positions of the posterior labia majora. An abscess would additionally show induration, erythema, and exquisite tenderness."},
{mod:10,vignette:"A 63-year-old postmenopausal woman has dyspareunia, urinary frequency, and spotting after urination. You see a small bright red soft mass at the urethral meatus that bleeds when touched with a cotton swab.",stem:"What distinguishes a urethral caruncle clinically, and what is its primary treatment approach?",opts:["It is premalignant and requires immediate biopsy and oncology referral","It is a benign estrogen-deficiency lesion most common in postmenopausal women; treatment may include topical estrogen to reverse atrophic changes; not malignant","It represents primary HSV infection requiring antiviral therapy","It is caused by HPV requiring colposcopy and cryotherapy"],ans:1,rat:"Urethral caruncles are benign masses at the urethral meatus caused by urethral atrophy from estrogen deficiency — most common in postmenopausal women. They are NOT premalignant. The contact bleeding can alarm patients who fear malignancy — reassurance and correct diagnosis are key. Treatment: topical estrogen cream or surgical removal if symptomatic. Symptoms include dysuria, frequency, hematuria, dyspareunia, or may be asymptomatic."},
{mod:10,vignette:"A 10-year-old girl has sparse, slightly pigmented, straight pubic hair growing only on the labia, and a small breast mound with widened areola. The nipple is flush with the breast surface.",stem:"What Tanner stage describes BOTH her breast and pubic hair development, and is this within normal limits?",opts:["Stage 1 breast, Stage 2 pubic hair — requires evaluation","Stage 2 breast and Stage 2 pubic hair — within normal limits for a 10-year-old; onset varies by race/ethnicity","Stage 3 breast and Stage 3 pubic hair — advanced for her age","Stage 4 breast and Stage 2 pubic hair — requires endocrinology referral"],ans:1,rat:"Stage 2 breast = breast bud with widened areola, nipple flush with breast. Stage 2 pubic hair = sparse, slightly pigmented, straight hair mostly on labia only (not yet spreading to mons). Both Stage 2. Mean age for Stage 2 breast onset: Black 8.8 yr, Hispanic 9.2 yr, White 9.6 yr, Asian 9.9 yr. A 10-year-old is within normal limits for all groups. Delayed puberty = no development by age 14–15."},
{mod:10,vignette:"An NP student asks how to distinguish Stage 4 from Stage 5 breast development on Tanner staging.",stem:"Which correctly distinguishes Tanner breast Stage 4 from Stage 5?",opts:["Stage 4: Only nipple protrudes, areola flush with breast. Stage 5: Areola and nipple form secondary mound","Stage 4: Areola and nipple form a SECONDARY MOUND projecting above the breast level. Stage 5: Mature breast — only nipple protrudes; areola is flush with breast contour","Stage 4: Breast budding with widened areola. Stage 5: Breast and areola enlarge with nipple flush","Stage 4 and 5 are identical; only timing distinguishes them"],ans:1,rat:"Stage 4: areola and nipple form a SECONDARY MOUND that projects ABOVE the level of the breast — the key distinguishing feature. Stage 5 (mature): the areola flattens back to breast level and ONLY the nipple protrudes. Some women remain at Stage 4 as a normal variant. This distinction is high-yield — know it cold."},
{mod:10,vignette:"A 50-year-old woman reports her bladder 'feels full all the time.' She leaks small amounts constantly without urge or physical strain. She strains to start urinating and has a weak stream.",stem:"Which type of incontinence and underlying mechanism does this describe?",opts:["Stress incontinence — weak pelvic floor","Urge incontinence — overactive detrusor","Overflow incontinence — incomplete bladder emptying causing chronic overdistension and constant overflow dribbling","Mixed incontinence — stress and urge combined"],ans:2,rat:"Overflow incontinence: bladder cannot empty properly → chronic overdistension → constant leakage of small amounts. Key features: no urge or strain associated with leakage, difficulty initiating stream, weak stream, constant feeling of fullness. Causes: bladder outlet obstruction or underactive/neurogenic detrusor (diabetes, MS, spinal injury). Distinctly different from stress (strain-related) and urge (sudden uncontrollable urge)."},
{mod:10,vignette:"A woman describes her grandmother who leaks urine both when she sneezes AND when she gets a sudden urge that she cannot control.",stem:"What type of incontinence does the grandmother have and what is its clinical significance?",opts:["Overflow incontinence — requires urodynamic testing immediately","Urge incontinence only — the sneezing is coincidental","Mixed incontinence — combination of stress AND urge components; most common type in older women","Functional incontinence — mobility limitations prevent reaching the toilet"],ans:2,rat:"Mixed incontinence combines stress incontinence (leakage with sneezing/physical strain) AND urge incontinence (sudden uncontrollable urge with leakage). It is the MOST COMMON type of incontinence in older women. Treatment addresses both components: pelvic floor exercises for stress component, bladder retraining and/or anticholinergics for urge component. This vignette reviews all four types in one scenario."},
{mod:10,vignette:"A 31-year-old postpartum woman whose cycles have returned asks when to perform her next BSE. Her cycle is 30 days and her last period started 12 days ago.",stem:"When is the optimal BSE timing, and what is the rationale?",opts:["Today — day 12 is ideal mid-cycle","Wait until day 1 of her next cycle to begin counting","Days 4–7 of her NEXT cycle — breast volume is at minimum and nodularity lowest, making lump detection most accurate","3 days before her next period when she is most aware of her breasts"],ans:2,rat:"Optimal BSE = days 4–7 of the menstrual cycle counting from day 1 (first day of FLOW). At day 12 she is in the late follicular phase with rising estrogen — breast volume and nodularity are increasing. She should wait for her next period and perform BSE days 4–7 of that cycle, when breasts are smallest and least congested. Premenstrual breast engorgement and nodularity make palpation less accurate."},
{mod:10,vignette:"The NP asks the patient to sit and press both hands into her hips firmly during the breast inspection phase of the exam.",stem:"What is the clinical purpose of this maneuver?",opts:["To relax the pectoralis major and improve visualization","To CONTRACT the pectoralis major — this accentuates skin dimpling or retraction caused by tumor tethering to underlying tissue or Cooper's ligaments","To assess axillary lymph nodes by elevating the arm","To perform bimanual palpation for large breasts"],ans:1,rat:"Pressing hands firmly into hips CONTRACTS the pectoralis major. This maneuver accentuates ANY skin dimpling, retraction, or asymmetry caused by tumor tethering to Cooper's ligaments or underlying muscle. A tumor not visible with arms relaxed may appear as a dimple when the pectoralis contracts. This is one of four key breast inspection positions: arms at sides, arms raised overhead, hands on hips pressing in, and leaning forward."},
{mod:10,vignette:"You palpate a breast lump that is 1.8 cm, oval, smooth, freely mobile, soft, and slightly tender before the patient's period.",stem:"Which feature is MOST reassuring for a benign etiology?",opts:["Size of 1.8 cm — malignant tumors are always larger than 2 cm","Freely mobile with smooth well-defined borders — most consistent with benign lesion","Location in the upper outer quadrant — cancer only occurs in the lower inner quadrant","Non-tender — benign lumps are never tender"],ans:1,rat:"Most reassuring benign features: freely mobile (not fixed), smooth and well-defined borders, soft or rubbery consistency, cyclic tenderness (hormonal responsiveness), and oval/round shape. Malignant features: hard, irregular, fixed, non-tender, poorly defined borders, skin dimpling. Note: upper outer quadrant has the most breast tissue and HIGHEST cancer incidence — location is not a reassuring feature. Any palpable lump warrants appropriate follow-up regardless of characteristics."},
{mod:10,vignette:"A 17-year-old uncircumcised male has never been able to retract his foreskin. On exam the foreskin cannot be retracted over the glans. He has no pain at rest but reports pain with erections.",stem:"What condition is present, and what is the appropriate clinical approach?",opts:["Paraphimosis — retracted foreskin stuck behind glans; urologic emergency","Phimosis — narrowed preputial opening preventing foreskin retraction; in adolescents/adults causes pain with erections and impairs hygiene; treatment options include topical steroids or circumcision","Hypospadias — meatus on ventral surface; no treatment needed","Epispadias — meatus on dorsal surface; elective repair indicated"],ans:1,rat:"Phimosis = inability to retract foreskin over glans due to narrowed preputial opening. Physiologic phimosis is normal in infants (most foreskins retract by ages 2–4). Pathologic phimosis in adolescents/adults causes: pain with erections, impaired hygiene, recurrent UTIs, and balanitis. Treatment: topical steroid cream (first-line), gradual manual stretching, or circumcision. Paraphimosis = foreskin retracted but cannot be returned forward (emergency with ischemia risk)."},
{mod:10,vignette:"On DRE a 66-year-old man's prostate is approximately 4 cm, smooth, rubbery (like the tip of the nose), non-tender, with palpable median sulcus dividing two lobes.",stem:"What is the most accurate interpretation of this DRE?",opts:["BPH — obliterated median sulcus indicates hyperplasia","Normal prostate examination — all described characteristics are within expected norms","Suspicious for prostate cancer — rubbery consistency requires biopsy","Chronic prostatitis — smooth surface indicates chronic inflammation"],ans:1,rat:"Normal prostate DRE: walnut-sized (~4 cm), smooth surface, rubbery consistency (TIP OF THE NOSE), non-tender, palpable median sulcus. ALL findings described are normal. BPH = symmetric enlargement with OBLITERATED median sulcus. Cancer = stone-hard, irregular, fixed nodule. Prostatitis = exquisitely tender. The palpable median sulcus confirms this is NOT BPH."},
{mod:10,vignette:"A 74-year-old man has urinary frequency, nocturia 4 times nightly, hesitancy, and a weak stream. DRE shows the prostate is smoothly and symmetrically enlarged, firm-rubbery, non-tender. The median sulcus is no longer palpable.",stem:"What is the KEY DRE finding that distinguishes BPH from a normal prostate?",opts:["Firm-rubbery consistency — normal prostates are always soft","Non-tenderness — normal prostates are always tender","Obliterated median sulcus — as the prostate enlarges symmetrically in BPH the central groove disappears","Size — any prostate larger than 3 cm is hypertrophic"],ans:2,rat:"The KEY BPH finding on DRE is the OBLITERATED MEDIAN SULCUS. As both lateral lobes enlarge symmetrically, they grow toward each other and the central groove disappears. Surface remains smooth and consistency remains rubbery-to-firm. Stone-hard consistency = cancer. Exquisite tenderness = prostatitis. Obliterated sulcus = BPH's single most specific distinguishing DRE finding."},
{mod:10,vignette:"A 30-year-old man has fever 38.8°C, perineal pressure, painful urination, and urethral discharge. DRE reveals a warm, exquisitely tender, boggy prostate. You perform the exam briefly and gently.",stem:"Why must DRE in acute prostatitis be brief and gentle?",opts:["Prolonged DRE is painful but carries no clinical risk","Vigorous prostate massage in acute bacterial prostatitis can force bacteria into the bloodstream causing bacteremia and sepsis","The prostate is too small to palpate accurately","DRE is contraindicated — diagnosis must be made by laboratory testing only"],ans:1,rat:"In acute bacterial prostatitis the prostate is heavily colonized with bacteria. Vigorous massage or prolonged DRE forces bacteria into the bloodstream → BACTEREMIA → potential sepsis. Perform briefly and gently — confirm the diagnosis (exquisitely tender, swollen) then stop. DRE is NOT contraindicated, but vigorous massage IS dangerous. This is a patient safety-critical clinical pearl."},
{mod:10,vignette:"A 45-year-old man has no urinary symptoms but is found to have a single firm nodule on the right posterior prostate lobe on DRE. PSA is 6.8 ng/mL.",stem:"What is the appropriate next step?",opts:["Most likely chronic prostatitis — treat with antibiotics and recheck PSA in 6 weeks","Hard posterior nodule plus elevated PSA is highly suspicious for prostate cancer — refer to urology for TRUS-guided biopsy","Normal variant in men over 40 — calcification of median sulcus","Likely BPH — reassure and repeat in 1 year"],ans:1,rat:"A hard, firm, or nodular area on the posterior prostate plus elevated PSA = STRONG indication for urologic referral and TRUS-guided biopsy to rule out prostate cancer. Early prostate cancer is ASYMPTOMATIC — no symptoms does not equal no cancer. Stone-hard, irregular, fixed nodule is the most suspicious DRE finding. The NP's role: recognize the abnormal finding, correlate with PSA, and refer promptly."},
{mod:10,vignette:"A 22-year-old male asks how to perform testicular self-examination and when to do it.",stem:"Which instructions correctly describe TSE technique and timing?",opts:["Annually at a clinic visit; look for skin color changes","Monthly in a warm shower; gently feel each testicle with thumb and first two fingers for any new lump, change in size, or hardness — report any change immediately","Weekly; look for dilated veins on the scrotum surface","Only if symptoms develop — most testicular cancers are painful"],ans:1,rat:"TSE mnemonic: T = Timing (MONTHLY), S = Shower (warm water relaxes cremasteric muscle, lowering testes for easier palpation), E = Examine (thumb and first two fingers, gentle; report any changes immediately). Normal testicle: smooth, rubbery, egg-shaped. Epididymis on top is softer. Testicular cancer often presents as PAINLESS solid mass — waiting for pain = delayed diagnosis. Early detection = nearly 100% cure rate."},
{mod:10,vignette:"A 23-year-old male has gradual left scrotal heaviness and dull aching. Palpation of the left spermatic cord reveals a soft, tortuous, worm-like mass that does not transilluminate. It is more prominent when standing.",stem:"What is this condition, what anatomic reason makes it predominantly left-sided, and what is the fertility implication?",opts:["Hydrocele — present bilaterally; no fertility implications","Epididymitis — painful, indurated; treated with antibiotics","Varicocele — left testicular vein drains at 90° into left renal vein creating higher venous pressure; dilation of pampiniform plexus; associated with male infertility","Inguinal hernia — bowel sounds auscultated over the mass"],ans:2,rat:"Varicocele = dilation of pampiniform plexus veins ('bag of worms'). Predominantly LEFT-SIDED (85–90%) because the LEFT testicular vein drains at a RIGHT ANGLE into the left renal vein (higher hydrostatic pressure). The right testicular vein drains obliquely into the IVC at lower pressure. Venous pooling → increased scrotal temperature → impaired spermatogenesis → associated with male infertility. More prominent standing (increased venous pressure), may reduce recumbent."},
{mod:10,vignette:"A 16-year-old girl is at Tanner Stage 3 breast and pubic hair development. Her mother asks when to expect menarche.",stem:"When is menarche typically expected based on Tanner staging, and what is the median age?",opts:["Menarche always occurs at Stage 2 breast development around age 9","Menarche typically occurs in Tanner Stage 3 or 4, just after peak adolescent growth spurt; overall median age is 12.25 years","Menarche does not occur until Stage 5 in most girls","Menarche occurs at the same time as axillary hair at Stage 5"],ans:1,rat:"Menarche occurs in Tanner Stage 3 or 4, just after peak growth velocity. Overall median age: 12.25 years. By race: Black 12.0 yr (earliest), Latina 11.83 yr, White 12.67 yr, Asian 12.75 yr (latest). Thelarche precedes menarche by ~2 years. Obesity/higher BMI is associated with earlier menarche across all groups. This Stage 3 patient is likely approaching or near menarche."},
{mod:10,vignette:"A 58-year-old woman, 8 years postmenopausal, reports her breasts seem 'different.' They appear pendulous and flattened. On palpation the tissue feels more granular and the terminal ducts near the nipple are prominent and stringy.",stem:"What postmenopausal physiologic change explains these findings?",opts:["Increased estrogen from adipose tissue causes breast engorgement","Decreased estrogen causes glandular atrophy replaced by fibrous tissue, fat atrophy, decreased elasticity, drooping, and more prominent palpable terminal ducts due to fibrosis and calcification","Breast tissue becomes uniformly dense making all structures more palpable","Stringy ducts indicate fibrocystic disease requiring ultrasound"],ans:1,rat:"Postmenopausal breast changes from decreased estrogen: glandular tissue atrophy (replaced by fibrous connective tissue), fat atrophy (beginning mid-years, marked by 70s–80s), decreased elasticity, breast drooping/flattening, and more prominent stringy terminal ducts from fibrosis and calcification. These are NORMAL postmenopausal changes. Clinical implication: surrounding tissue atrophy makes pre-existing lumps more prominent — facilitating cancer detection but making every finding more clinically significant."},
{mod:11,vignette:"A 40-year-old dental hygienist has right thumb, index, and middle finger numbness waking her at night. 'Shaking out' her hand temporarily relieves it. You tap over the volar right wrist.",stem:"What test was performed, what constitutes a positive finding, and which nerve is affected?",opts:["McMurray test — click at knee — femoral nerve","Tinel sign — burning/tingling along median nerve distribution with percussion at volar wrist — median nerve compression at carpal tunnel","Phalen test — reproduction of symptoms with sustained wrist flexion — ulnar nerve","Lasègue test — sciatic pain below knee — nerve root compression"],ans:1,rat:"Tinel sign = direct percussion over the carpal tunnel at the VOLAR WRIST. Positive = burning/tingling ('electric shock') along the median nerve distribution: thumb, index, middle finger, and radial half of ring finger. Affected nerve: MEDIAN nerve (C6-C7-C8) compressed at the wrist. Classic history: nocturnal paresthesias (worse sleeping with wrists flexed), relieved by shaking the hand ('flick sign'). Dental hygienists and office workers at high risk from repetitive wrist flexion."},
{mod:11,vignette:"A 26-year-old soccer midfielder reports her knee 'gives out' when pivoting. Lachman test at 20–30° flexion shows significant anterior tibial translation with a soft, mushy endpoint.",stem:"What does this indicate, and why is Lachman preferred over the anterior drawer test?",opts:["Positive PCL tear — tibia moves anteriorly due to PCL laxity","Positive ACL tear — Lachman at 20–30° is preferred because hamstrings are relaxed at this angle, allowing more accurate isolated ACL assessment versus the 90° anterior drawer test where hamstring tension can falsely stabilize the tibia","Positive MCL tear — valgus laxity with anterior translation","Positive meniscal tear — anterior tibial translation indicates torn posterior horn"],ans:1,rat:"Positive Lachman = ACL tear. Performed at 20–30° flexion where hamstrings are RELAXED — allowing accurate isolated ACL assessment. Increased anterior tibial translation with soft/absent endpoint = ACL rupture. Anterior drawer test uses 90° flexion where hamstring tension can falsely stabilize the tibia (reduced sensitivity). Lachman sensitivity: 85–98%. It is the PREFERRED clinical test for ACL integrity."},
{mod:11,vignette:"A 55-year-old postal worker twisted his knee stepping off a curb. He reports clicking and occasional locking. McMurray test: supine, flex knee and hip, externally rotate tibia, apply valgus stress, slowly extend. A palpable click is felt.",stem:"What does the positive McMurray test indicate and what is the preferred imaging?",opts:["Click indicates ACL tear — MRI first-line","Positive McMurray = TORN MENISCUS — MRI is preferred imaging; refer to orthopedics","Click is a normal finding in adults over 50","Click indicates a loose body — immediate arthroscopy required"],ans:1,rat:"Positive McMurray = palpable or audible 'click' (or pain) during knee extension with external tibial rotation and valgus stress = TORN MENISCUS (medial meniscus with external rotation technique). History clues: trauma + locking + giving way + joint line pain. MRI is the gold-standard for meniscal tears. Apply Ottawa Knee Rules for plain X-ray decision: age ≥55, isolated patellar/fibular head pain, cannot flex to 90°, or cannot bear weight 4 steps."},
{mod:11,vignette:"An NP student asks about the difference between shoulder hyperextension and adduction ROM values.",stem:"Which correctly states normal ROM for BOTH shoulder hyperextension and adduction?",opts:["Hyperextension 90°, Adduction 90°","Hyperextension 50°, Adduction 50°","Hyperextension 180°, Adduction 50°","Hyperextension 50°, Adduction 90°"],ans:1,rat:"Normal shoulder ROM: Forward flexion = 180°, Hyperextension = 50° (arm behind body), Abduction = 180°, Adduction = 50° (arm crosses midline), Internal rotation = 90°, External rotation = 90°. Memory system: Flex/Abduct = 180°, Rotate (internal/external) = 90°, Extend/Adduct = 50°. Both hyperextension AND adduction = 50°."},
{mod:11,vignette:"A student remembers the SITS rotator cuff muscles but cannot recall which one is the primary internal rotator.",stem:"Which SITS muscle is the PRIMARY internal rotator of the shoulder?",opts:["Supraspinatus — initiates abduction, also internally rotates","Infraspinatus — primarily externally rotates","Teres Minor — works with infraspinatus to externally rotate","Subscapularis — the only ANTERIOR rotator cuff muscle; the primary INTERNAL rotator"],ans:3,rat:"SITS primary actions: Supraspinatus = initiates ABDUCTION (first 15°), most commonly torn. Infraspinatus = EXTERNAL rotation (large posterior muscle). Teres Minor = EXTERNAL rotation and adduction. Subscapularis = PRIMARY INTERNAL ROTATION (only anterior rotator cuff muscle — on the anterior scapula surface, pulls arm anteriorly/inward). Memory: Subscapularis is anterior → Internal rotation. The other three are posterior → External rotators. 'Sir' = Subscapularis = Internal Rotation."},
{mod:11,vignette:"A 62-year-old woman has DIP joint bony knobby enlargements bilaterally. Morning stiffness lasts ~10 minutes and pain worsens throughout the day with hand use.",stem:"What are the DIP enlargements called, and how does OA morning stiffness differ from RA?",opts:["Bouchard nodes at DIP; OA stiffness lasts >1 hour","Heberden nodes at DIP; OA morning stiffness <30 minutes vs. RA morning stiffness >1 hour","Tophi at DIP; associated with elevated uric acid","Rheumatoid nodules at DIP; OA and RA have identical stiffness patterns"],ans:1,rat:"Heberden nodes = bony enlargements at DISTAL interphalangeal (DIP) joints = hallmark of OA. Bouchard nodes = PIP joints, also OA. OA morning stiffness: characteristically <30 MINUTES ('gelling' that quickly resolves with movement). RA: >1 HOUR (often 2+ hours, reflects systemic inflammation). OA: pain worsens with activity, improves with rest. RA: symmetric MCP/PIP involvement, warm boggy swelling, systemic features. Memory: Heberden before Bouchard alphabetically = DIP before PIP."},
{mod:11,vignette:"A 60-year-old woman with family history of osteoporosis, menopause at age 52, asks when she should have her first DEXA scan.",stem:"When should this patient be screened, and what tool estimates her fracture risk?",opts:["Wait until age 70 — DEXA only for women >70 without prior fracture","All women should have DEXA by age 65; the FRAX algorithm can calculate 10-year fracture probability to guide treatment decisions","DEXA only after a fragility fracture","Annual DEXA starting at menopause (age 52)"],ans:1,rat:"All women should have a DEXA by age 65. Women <65 with risk factors (family history, early menopause, steroid use, low body weight, smoking, alcohol, prior fracture) should be screened earlier. This patient at 60 with family history and early menopause (52) may warrant earlier screening. FRAX (WHO Fracture Risk Assessment Tool) calculates 10-year probability of major osteoporotic and hip fracture using clinical risk factors ± BMD, guiding treatment decisions."},
{mod:11,vignette:"During a 3-month-old well-infant exam, you adduct the hip and apply gentle posterior pressure. You feel a subtle 'clunk' on the left side.",stem:"What does a positive Barlow maneuver indicate and what is the next step?",opts:["Normal sound of femoral head seating into acetabulum — no action needed","Positive Barlow = left hip can be DISLOCATED posteriorly = developmental dysplasia of the hip (DDH); refer to pediatric orthopedics and obtain imaging","Normal cremasteric reflex in a male infant","Congenital muscular torticollis — refer to physical therapy"],ans:1,rat:"Barlow maneuver tests for HIP INSTABILITY — can the hip BE dislocated? Technique: adduct + posterior pressure. Positive = 'clunk' as femoral head slips OUT of acetabulum posteriorly. Contrast with Ortolani (abduction) which REDUCES a dislocated hip (clunk = going back IN). Both positive tests indicate DDH — refer to pediatric orthopedics. Treatment if caught early: Pavlik harness. Imaging: ultrasound (<6 months) or X-ray (>6 months)."},
{mod:12,vignette:"A right-handed woman post-left-hemisphere stroke speaks in short, effortful, telegraphic sentences ('Go store... need milk'). She understands you and follows commands but is frustrated by her inability to express herself.",stem:"What type of aphasia, which structure is damaged, and which lobe?",opts:["Wernicke's aphasia — temporal lobe — fluent but nonsensical speech","Broca's aphasia — Broca's area in the LEFT FRONTAL LOBE — non-fluent effortful speech with INTACT comprehension; patient is aware and frustrated","Global aphasia — frontal and temporal lobes — cannot speak or understand","Anomic aphasia — parietal lobe — cannot find nouns but otherwise speaks normally"],ans:1,rat:"Broca's aphasia (expressive/non-fluent) = damage to BROCA'S AREA in the FRONTAL LOBE of the dominant (left) hemisphere. Non-fluent, halting, effortful speech; simplified grammar (telegraphic); intact COMPREHENSION; patient is AWARE and typically FRUSTRATED. Wernicke's aphasia (temporal lobe): fluent but nonsensical; IMPAIRED comprehension; patient UNAWARE of errors. Left hemisphere is dominant in ~95% of people. Upper motor neuron lesions from stroke also often produce contralateral weakness."},
{mod:12,vignette:"A 67-year-old man suddenly cannot understand language and speaks in rapid, fluent strings of nonsensical words. He seems unaware anything is wrong. Onset was 2 hours ago.",stem:"Which lobe and area is damaged, and what type of aphasia is this?",opts:["Left frontal lobe — Broca's area — non-fluent speech with intact comprehension","Left temporal lobe — Wernicke's area — fluent but nonsensical speech with impaired comprehension; patient unaware of errors","Right parietal lobe — neglect syndrome","Left occipital lobe — alexia without agraphia"],ans:1,rat:"Wernicke's aphasia (receptive/fluent) = TEMPORAL LOBE — WERNICKE'S AREA in the dominant hemisphere. Features: fluent, rapid, well-articulated speech filled with paraphasias and jargon; severely IMPAIRED comprehension; patient UNAWARE of errors (anosognosia). Sudden onset 2 hours ago = ischemic stroke until proven otherwise — neurologic emergency. Temporal lobe also mediates hearing, taste, smell."},
{mod:12,vignette:"A patient has RIGHT-sided facial droop affecting BOTH the upper face (cannot raise eyebrow) AND lower face (drooping mouth corner). She has no limb weakness.",stem:"What type of lesion does complete facial involvement including the forehead indicate?",opts:["Central (UMN) stroke — spares the forehead due to bilateral cortical representation","Peripheral (LMN) lesion (Bell's palsy) — affects ALL ipsilateral facial muscles including forehead because the peripheral nerve carries fibers to both upper and lower face","Bilateral cortical lesion — pseudobulbar palsy","CN V lesion — trigeminal damage causes facial drooping"],ans:1,rat:"FOREHEAD INVOLVEMENT is the KEY differentiator. CN VII (facial nerve) controls all ipsilateral facial muscles. UMN/central lesion (stroke): FOREHEAD SPARED — bilateral cortical representation of the forehead means the intact contralateral hemisphere continues to innervate forehead muscles → only LOWER face weak. LMN/peripheral lesion (Bell's palsy): FOREHEAD INVOLVED — entire peripheral nerve to ALL ipsilateral facial muscles is damaged → upper AND lower face affected. Rule: Forehead involved = peripheral. Forehead spared = central (stroke)."},
{mod:12,vignette:"During the finger-nose-finger test, a 70-year-old's hand trembles MORE as it approaches your finger (the target) and LESS when at rest.",stem:"What type of tremor is described, what does it indicate, and which system is involved?",opts:["Resting tremor — present at rest, improves with action — basal ganglia (Parkinson's)","Intention tremor — worsens as limb APPROACHES a target, diminished at rest — cerebellar dysfunction","Essential tremor — present with both action and rest equally","Asterixis — flapping tremor — metabolic encephalopathy"],ans:1,rat:"INTENTION TREMOR worsens as the limb approaches a target (final phase of reaching) and is diminished/absent at rest. Hallmark of CEREBELLAR dysfunction. Cerebellar signs: intention tremor (finger-nose test), dysdiadochokinesia (rapid alternating movements), ataxic wide-based gait, nystagmus, dysarthria (scanning speech), past-pointing. Contrast: RESTING tremor (Parkinson's — worse at rest, improves with movement); essential tremor (action/postural tremor without worsening toward target)."},
{mod:12,vignette:"A 75-year-old woman completes the TUG test in 24 seconds. During the task her steps are small and shuffling and she is unsteady during the turn.",stem:"What does this TUG score indicate, and what do the qualitative findings suggest?",opts:["24 seconds = moderate fall risk (12–20 seconds); no additional workup needed","24 seconds = HIGH fall risk (>20 seconds); shuffling gait and unsteadiness during turning suggest possible Parkinson's disease or other neurologic cause — further neurologic assessment is indicated","24 seconds = normal for a 75-year-old","24 seconds = low fall risk; repeat in 6 months"],ans:1,rat:"TUG: <12 sec = low fall risk; 12–20 sec = moderate; >20 sec = HIGH fall risk. At 24 seconds = HIGH risk requiring fall prevention. Qualitative TUG observations are also clinically meaningful: shuffling steps (festinating gait), small stride length, and turning unsteadiness are characteristic of PARKINSON'S DISEASE or other basal ganglia/cerebellar disorders. The TUG is both quantitative (time) and qualitative (gait quality observation) assessment tool."},
{mod:12,vignette:"A construction worker sustains arm trauma. Numbness is found over his right thumb. Reflexes and motor strength are intact.",stem:"Which spinal nerve root dermatomal level corresponds to the thumb, and what is the clinical implication?",opts:["C8 — thumb numbness indicates C8 root compression","C6 — thumb numbness indicates C6 nerve root compression, most commonly from herniated disc at C5-C6","C7 — thumb numbness indicates C7 root compression","T1 — thumb is a T1 dermatomal finding"],ans:1,rat:"Key upper extremity dermatomes: C6 = THUMB, C7 = MIDDLE FINGER, C8 = LITTLE FINGER. Thumb numbness = C6 territory. Most common cause: C6 nerve root compression from herniated disc at C5-C6 intervertebral level. C6 also mediates biceps reflex and wrist extensor strength — testing these helps localize the level. Other landmarks: T1 = axilla, T4 = nipple, T10 = umbilicus, L1 = groin, L4 = knee."},
{mod:12,vignette:"A family reports a 79-year-old man forgets 5-minute-old conversations, left a pot on the stove, got confused about what year it is, and called a neighbor by his dead brother's name. This has worsened over 2 years.",stem:"Which features are most consistent with Alzheimer's disease rather than normal aging?",opts:["Occasionally forgetting names — normal aging not requiring workup","Forgetting recent conversations unable to be recalled later, functional impairment (stove incident), time disorientation, progressive 2-year deterioration — Alzheimer's warning signs, not normal aging","Confusing the day of week occasionally — the most concerning sign","All findings consistent with normal aging in a 79-year-old"],ans:1,rat:"AD warning signs present here: (1) Forgetting recent conversations and UNABLE TO RECALL LATER — disrupts daily life. (2) Functional impairment — stove incident (safety risk, cannot complete familiar tasks). (3) Time disorientation — not knowing the year. (4) Confabulation — calling living person by deceased name. (5) Progressive over 2 years. Normal aging: forgetting but later remembering; occasionally losing keys but retracing steps. AD imaging: asymmetric atrophy in temporal and parietal lobes, especially hippocampus."},
{mod:12,vignette:"A 55-year-old woman's right eye fails to ADDUCT when she looks left. Her left eye abducts normally but shows nystagmus. She has MS.",stem:"What is this finding called and what structure is damaged?",opts:["Right CN III palsy — oculomotor nerve cannot adduct right eye","Internuclear ophthalmoplegia (INO) — RIGHT medial longitudinal fasciculus (MLF) lesion causes failure of right eye adduction on leftward gaze with nystagmus in the abducting left eye; highly associated with MS","Left CN VI palsy — cannot abduct left eye","Horner syndrome — ptosis, miosis, anhidrosis"],ans:1,rat:"Internuclear ophthalmoplegia (INO) = lesion of the MEDIAL LONGITUDINAL FASCICULUS (MLF), a brainstem tract coordinating conjugate horizontal gaze by connecting the CN VI nucleus (one side) to CN III nucleus (other side). Right MLF lesion: looking LEFT — signal cannot cross from left CN VI nucleus to right CN III nucleus → right eye FAILS TO ADDUCT; left eye abducts with nystagmus. INO = CLASSIC sign of MS in young adults and brainstem stroke in older adults. Bilateral INO in a young person = strongly suggestive of MS."},
{mod:12,vignette:"A patient's tongue deviates to the RIGHT when protruded during a cranial nerve exam.",stem:"Which cranial nerve is affected, on which side, and why does the tongue deviate toward the right?",opts:["Left CN XII LMN lesion — tongue deviates AWAY from lesion toward the right because intact contralateral muscles push tongue toward the weak side","Right CN XII LMN lesion — tongue deviates TOWARD the side of the lesion because the healthy left muscles push the tongue right","Left CN XI lesion — tongue deviation is CN XI finding","Right CN X lesion — vagus controls tongue movement"],ans:1,rat:"CN XII (Hypoglossal) controls all tongue muscles. LMN lesion: tongue deviates TOWARD the side of the lesion when protruded — intact contralateral muscles push the tongue toward the weak (lesioned) side. Right CN XII LMN → tongue deviates RIGHT. Memory: 'Lick your lesion' — tongue points toward the damaged side in LMN. UMN lesion: tongue deviates contralateral (away from lesion). CN XII is purely MOTOR. CN XI = trapezius/SCM. CN X = pharynx/larynx/visceral parasympathetics."},
{mod:12,vignette:"A 35-year-old patient cannot perform rapid alternating hand movements smoothly — the movements are irregular, clumsy, and arrhythmic.",stem:"What is this finding called, what does it indicate, and which system is involved?",opts:["Asterixis — flapping tremor — hepatic encephalopathy","Dysdiadochokinesia — inability to perform rapid alternating movements smoothly — cerebellar dysfunction","Bradykinesia — slowness — basal ganglia (Parkinsonism)","Resting tremor — essential tremor, managed with propranolol"],ans:1,rat:"DYSDIADOCHOKINESIA = inability to perform rapid alternating movements smoothly (alternating palm/back-of-hand on knee). The HALLMARK of CEREBELLAR dysfunction. Normal cerebellum allows smooth, rhythmic alternating movements. Other cerebellar signs: intention tremor (worsens approaching target), ataxic wide-based gait, nystagmus, dysarthria (scanning speech). Asterixis = metabolic (hepatic/renal) encephalopathy. Bradykinesia = Parkinson's (basal ganglia). Resting tremor = Parkinson's."},
{mod:12,vignette:"An 8-month-old still has palmar grasp and Moro reflexes. A 15-month-old still has a positive Babinski sign (upgoing toes).",stem:"Which statement correctly interprets these findings using motor maturation knowledge?",opts:["Both abnormal — immediate neurology referral for both","The 8-month-old's primitive reflexes may still be present as cortical myelination continues through year 1; the 15-month-old's Babinski may be normal up to age 2 as corticospinal tract continues to mature","All primitive reflexes should disappear by 3 months — both require urgent evaluation","Primitive reflexes never disappear in healthy individuals"],ans:1,rat:"Primitive reflexes: present at birth, mediated by BRAINSTEM. As the cerebral cortex MYELINATES (cephalocaudal, proximodistal) during year 1, cortical inhibition suppresses them at predictable times. Palmar grasp and Moro: typically disappear by 4–6 months — at 8 months they should be diminishing but may still be present. Babinski: NORMAL in infants up to ~12–24 months because the corticospinal tract continues myelinating into year 2. In adults = Babinski positive = UMN lesion. Persistence BEYOND expected disappearance = CNS dysfunction."},
{mod:13,vignette:"A 15-year-old female swimmer has palpitations during races. On exam, a systolic murmur at the left sternal border INCREASES with standing and DECREASES with squatting.",stem:"What condition does this murmur pattern suggest, and what is required before sports clearance?",opts:["Innocent flow murmur — clear for full participation","Hypertrophic cardiomyopathy (HCM) — murmur increases with standing (decreased preload) and decreases with squatting (increased preload) indicating dynamic outflow obstruction; do NOT clear until cardiology evaluation with ECG and echocardiogram","Mitral valve prolapse — benign; clear with counseling","Aortic stenosis — murmur increases with squatting in AS; clear with annual follow-up"],ans:1,rat:"HCM murmur is DYNAMIC. STANDING: decreases venous return → decreased preload → smaller LV → more obstruction → LOUDER. SQUATTING: increases venous return → increased preload → bigger LV → less obstruction → SOFTER. Pattern: louder standing, softer squatting = pathognomonic for HCM dynamic outflow obstruction. HCM = #1 cause of sudden cardiac death in young athletes. Do NOT clear until cardiology (ECG + echocardiogram showing asymmetric septal hypertrophy)."},
{mod:13,vignette:"During a sports physical, a 16-year-old male bends forward at the waist. Viewed from behind, his right thoracic region creates a prominent rib hump while the left side remains flat.",stem:"What causes the rib hump in scoliosis, and what Cobb angle threshold requires bracing?",opts:["Kyphosis — excessive thoracic curvature; bracing needed for >10°","Scoliosis with right thoracic curve — rib hump appears on the CONVEX side because vertebrae rotate toward the convex side carrying ribs posteriorly; bracing typically considered for Cobb angles 25–40° in growing adolescents","Lordosis — pelvic tilt compensation; no bracing needed","Leg length discrepancy — hump disappears with heel lift"],ans:1,rat:"In scoliosis, vertebrae ROTATE toward the CONVEX side of the curve, carrying attached ribs posteriorly → RIB HUMP on the convex side. Right thoracic scoliosis = right rib hump (most common pattern in idiopathic scoliosis). Cobb angle thresholds: <10° = normal; 10–24° = monitor; 25–40° = BRACING typically indicated (growing adolescents); >40–50° = surgical evaluation. Adams forward bend test = standard screening tool."},
{mod:13,vignette:"A 17-year-old female basketball player has right arm BP 126/78 and left arm BP 88/56.",stem:"What does this BP difference suggest, and what additional finding would support the diagnosis?",opts:["HCM — confirmed by dynamic murmur increasing with Valsalva","Coarctation of the aorta — significant BP difference between arms AND diminished or absent femoral pulses would support this; requires cardiology referral before sports clearance","Marfan syndrome — confirmed by arachnodactyly and high palate","Atrial septal defect — confirmed by fixed split S2"],ans:1,rat:"Coarctation of the aorta = congenital aortic narrowing creating obstruction to blood flow. Significant BP difference between arms (>10–15 mmHg systolic) and/or DIMINISHED or ABSENT FEMORAL PULSES. AHA preparticipation screening specifically includes BILATERAL ARM BP and femoral pulse assessment for this reason. More classically: HIGH BP in upper extremities, LOW BP in lower extremities. Requires echocardiography and cardiology referral. HCM = dynamic murmur. Marfan = tall, long limbs, arachnodactyly, pectus excavatum."},
{mod:13,vignette:"Parents of a 14-year-old female gymnast ask whether the PPE is designed to prevent their daughter from competing.",stem:"What is the PRIMARY purpose of the pediatric PPE and what is its most important component?",opts:["To exclude as many athletes as possible to reduce liability","To IDENTIFY conditions that may predispose the athlete to injury or death — NOT to exclude; the medical HISTORY (identifies ~75% of problems) and targeted physical exam are the tools used","A fitness assessment to determine performance standards","To update immunizations and screen for drug use"],ans:1,rat:"PPE purpose: IDENTIFY — not exclude — athletes with conditions increasing injury/death risk. Goal = SAFE PARTICIPATION. Medical HISTORY is the most important component, identifying ~75% of all problems — thorough history is essential. Physical exam targets cardiac, musculoskeletal, and neurologic findings from history. Very few athletes are ultimately disqualified — most can participate with modifications or treatment."},
{mod:14,vignette:"A 68-year-old man was normal at breakfast but developed sudden right arm weakness and slurred speech around noon. He partially recovered. It has been approximately 2 hours since symptom onset.",stem:"What is this presentation, and why does the 2-hour timing matter critically?",opts:["Migraine with motor aura — treat with sumatriptan","TIA or acute ischemic stroke — timing is CRITICAL because IV tPA is indicated for ischemic stroke within 4.5 hours of symptom onset; this patient is within the window and requires IMMEDIATE transfer to a stroke-capable ED","Bell's palsy with arm weakness — treat with prednisone","Hemiplegic migraine — does not require emergent transfer"],ans:1,rat:"Sudden focal neurologic deficits (unilateral arm weakness + speech difficulty) in an older adult = stroke or TIA until proven otherwise. Time is CRITICAL: IV tPA (alteplase) for ischemic stroke must be given within 4.5 HOURS of symptom onset. Mechanical thrombectomy: up to 6–24 hours in selected patients. 'Time is brain' — ~1.9 million neurons die per minute during stroke. 'Last known well' time = reference point. 2-hour onset = WITHIN the treatment window → IMMEDIATE transfer to stroke center."},
{mod:14,vignette:"A 6-week-old infant has rectal temperature 38.4°C. She appears mildly irritable but feeds well and has good color. No obvious infection source on exam. Parents want to go home and monitor.",stem:"Why can the NP NOT simply observe and discharge this infant?",opts:["NP can discharge since infant appears well and is feeding","Any fever ≥38°C in infant <3 months requires full sepsis evaluation regardless of appearance: CBC, blood culture, UA, urine culture, LP in most cases, hospital admission for IV antibiotics — well appearance is NOT sufficient reassurance in this age group","Infant should get antibiotics in urgent care then discharge with 7-day oral course","Only UA needed — if negative, safe to discharge"],ans:1,rat:"In infants <3 MONTHS, the immune system is immature — serious bacterial infections (bacteremia, UTI, meningitis) can be LIFE-THREATENING and may present with NO obvious source and a WELL-APPEARING infant. A well appearance is NOT reassuring enough to forgo workup. Standard evaluation: CBC with diff, blood culture (blood), UA + urine culture (catheter — NOT bag specimen), and LP (CSF) in most cases. Hospital admission + IV antibiotics pending cultures. This is non-negotiable standard of care."},
{mod:14,vignette:"A 6-year-old fell from a bicycle without a helmet. He briefly lost consciousness for 30 seconds, now is alert and oriented but has a headache. GCS 14. He is vomiting.",stem:"Which combination of findings places this child at HIGH RISK for intracranial injury requiring CT?",opts:["Headache alone — common, not an indication for CT","Loss of consciousness + GCS <15 + post-traumatic vomiting — all high-risk indicators for intracranial injury; requires immediate CT head and transfer to an ED","Alert and oriented — CT unnecessary regardless of other findings","Post-traumatic vomiting is normal — monitor at home with return precautions"],ans:1,rat:"Pediatric head trauma red flags requiring CT: ANY loss of consciousness (even brief), GCS <15, post-traumatic vomiting (suggests increased ICP), severe headache, amnesia, skull fracture on exam, high-impact mechanism (bicycle fall without helmet at speed), age <2. PECARN rule helps risk-stratify pediatric head trauma. This child has MULTIPLE high-risk features. Requires immediate CT head and emergency department transfer — NOT home observation. Ibuprofen is contraindicated in acute head injury (bleeding risk)."},
{mod:14,vignette:"A SOAP note reads: S — 'Patient appears anxious, BP 148/92, HR 102.' O — 'Patient reports substernal chest pressure for 2 hours, radiating to left arm, rated 8/10, with diaphoresis and nausea.'",stem:"What documentation errors were made and how should they be corrected?",opts:["Correctly formatted — vital signs and appearance can go in Subjective","Two errors: (1) Vital signs (BP, HR) and clinical observations belong in OBJECTIVE — measured/observed by the clinician. (2) Patient's symptoms (chest pressure, radiation, severity, associated symptoms) are patient-reported and belong in SUBJECTIVE — the sections are completely switched","The Plan is too brief","Assessment should be in the Plan section"],ans:1,rat:"SOAP errors — sections reversed: SUBJECTIVE should contain: what the PATIENT REPORTS — chest pressure, left arm radiation, 8/10 severity, diaphoresis, nausea (all patient-reported symptoms). OBJECTIVE should contain: what the CLINICIAN MEASURES — BP 148/92, HR 102, anxious appearance, physical exam findings, EKG results, labs. Vital signs are OBJECTIVE measurements taken by the provider. This is a complete section reversal and a commonly tested documentation error on NP exams."},
{mod:14,vignette:"A 72-year-old woman with advanced COPD has a written advance directive stating she does not want mechanical ventilation. Her O2 saturation drops to 82% and she is increasingly lethargic. Her adult son (without healthcare proxy designation) demands intubation.",stem:"What is the NP's ethical and legal obligation?",opts:["Honor the son's request — family members always supersede written advance directives","Honor the advance directive — do NOT intubate; explain to the son that the written directive represents his mother's legally documented wishes made with decision-making capacity; provide comfort-focused respiratory support (high-flow O2, anxiolytics, opioids for air hunger)","Intubate temporarily and extubate once the ethics committee meets","Await attending physician orders before deciding about the advance directive"],ans:1,rat:"A written advance directive (living will) is LEGALLY BINDING — represents the patient's autonomous decision made with capacity. It takes precedence over family requests. The son WITHOUT designated healthcare proxy authority does NOT have legal authority to override it. Healthcare proxy role = make decisions when NO directive exists, not override existing ones. NP obligations: (1) Honor directive — do not intubate. (2) Comfort-focused care. (3) Respectfully explain to son. (4) Document thoroughly. Violating a valid advance directive = battery and violation of patient autonomy."},
{mod:10,vignette:"On external genital exam of a 29-year-old woman you note: symmetric plump labia majora; dark pink, moist labia minora; no clitoral inflammation; stellate-shaped urethral meatus that is midline; visible vaginal introitus; smooth perineum with no episiotomy scar.",stem:"Which finding should be documented as ABNORMAL?",opts:["Symmetric plump labia majora — abnormal; labia should be flat","Dark pink, moist labia minora — all labia should be pale pink","Stellate or slit-like urethral meatus that is midline — this is NORMAL; no further evaluation needed","Smooth perineum with no episiotomy scar in a nulliparous woman — abnormal"],ans:2,rat:"ALL findings described are NORMAL: symmetric plump labia majora (normal); dark pink moist labia minora (normal color/moisture); no clitoral inflammation (normal); stellate or slit-like urethral meatus MIDLINE (normal — midline placement is correct); smooth perineum without episiotomy scar in a NULLIPAROUS woman (normal — episiotomy scars only expected after vaginal delivery). This question tests knowledge of NORMAL female external genitalia to enable recognition of abnormalities."},
{mod:11,vignette:"A colleague asks for one clinical example of each joint type for a patient education handout.",stem:"Which correctly matches each joint type with its movement and a clinical example?",opts:["Fibrous = freely movable, knee; Cartilaginous = immovable, skull sutures; Synovial = slightly movable, vertebrae","Fibrous = immovable (synarthrosis), skull sutures; Cartilaginous = slightly movable (amphiarthrosis), intervertebral discs/pubic symphysis; Synovial = freely movable (diarthrosis), knee/shoulder/hip","Fibrous = slightly movable, vertebral discs; Cartilaginous = freely movable, hip; Synovial = immovable, skull","All three joint types are freely movable — distinguished only by the material connecting bones"],ans:1,rat:"Joint classification: FIBROUS = united by fibrous tissue; IMMOVABLE (synarthrosis); examples: skull SUTURES, tooth sockets. CARTILAGINOUS = separated by fibrocartilage; SLIGHTLY MOVABLE (amphiarthrosis); examples: INTERVERTEBRAL DISCS, PUBIC SYMPHYSIS, manubriosternal joint. SYNOVIAL = freely movable (diarthrosis); joint cavity + synovial membrane + synovial fluid (lubricant) + articular cartilage; examples: KNEE, SHOULDER, HIP, elbow, wrist. Synovial joints most clinically relevant. Cartilage is AVASCULAR — nourished by synovial fluid during movement."},
{mod:14,vignette:"An NP student asks what distinguishes a comprehensive H&P from a SOAP note and where the Review of Systems (ROS) belongs.",stem:"Which statement correctly distinguishes the H&P from SOAP AND correctly places the ROS?",opts:["H&P and SOAP are identical; ROS belongs in Objective","H&P used for comprehensive new patient evaluations includes all past history, complete ROS across all body systems, and detailed physical exam; SOAP used for episodic/follow-up visits focuses on the current problem. ROS (patient-reported symptoms across body systems) belongs in the SUBJECTIVE/history section in both","ROS belongs in Assessment to help establish differential diagnosis","SOAP is more comprehensive than H&P; ROS is placed in Plan to guide further workup"],ans:1,rat:"H&P vs. SOAP: H&P = comprehensive, for new patients/annual exams. Includes: identifying info, CC, HPI, PMH, medications, allergies, family history, social history, REVIEW OF SYSTEMS (ROS — inquiry across all body systems: constitutional, HEENT, CV, respiratory, GI, GU, musculoskeletal, neurologic, psychiatric, skin, endocrine, hematologic, allergic), and complete physical exam. SOAP = episodic, focused on the current problem with pertinent history. ROS in BOTH documents = patient-reported symptoms across body systems → belongs in SUBJECTIVE/history section (it is what the patient REPORTS, not what the clinician measures)."},
];

let cur=0,sel=Array(50).fill(-1),sub=Array(50).fill(false),cor=Array(50).fill(false);

function render(){
  const q=Qs[cur],isSub=sub[cur],s=sel[cur],ca=q.ans;
  const opts=q.opts.map((o,i)=>{
    let c='option';
    if(isSub){c+=' locked';if(i===ca)c+=' correct';else if(i===s&&s!==ca)c+=' wrong';}
    else if(i===s)c+=' selected';
    return `<div class="${c}" onclick="pick(${i})"><span class="option-letter">${String.fromCharCode(65+i)}.</span><span>${o}</span></div>`;
  }).join('');
  const rat=isSub?`<div class="rationale ${s===ca?'correct-r':'wrong-r'}"><div class="rationale-label">${s===ca?'Correct!':'Incorrect. Correct answer: '+String.fromCharCode(65+ca)+'.'}</div><div>${q.rat}</div></div>`:'';
  const nav=`<div class="nav">
    <button class="btn" onclick="go(cur-1)" ${cur===0?'disabled':''}>&#8592; Back</button>
    ${!isSub?`<button class="btn primary" onclick="doSub()" ${s===-1?'disabled':''}>Submit answer</button>`:''}
    ${cur<49?`<button class="btn" onclick="go(cur+1)">Next &#8594;</button>`:''}
    ${cur===49&&isSub?`<button class="btn primary" onclick="results()">View final score</button>`:''}
  </div>`;
  const done=sub.filter(Boolean).length,corr=cor.filter(Boolean).length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/50)*100)+'%';
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('ans-count').textContent=done;
  document.getElementById('cor-count').textContent=corr;
  document.getElementById('qarea').innerHTML=`<div class="qcard"><div class="q-meta">Module ${q.mod} &middot; Question ${cur+1} of 50</div><div class="vignette">${q.vignette}</div><div class="stem">${q.stem}</div>${opts}${rat}</div>${nav}`;
}

function pick(i){if(sub[cur])return;sel[cur]=i;render();}
function doSub(){if(sel[cur]===-1)return;sub[cur]=true;cor[cur]=(sel[cur]===Qs[cur].ans);render();}
function go(i){if(i<0||i>49)return;cur=i;render();}

function results(){
  const tot=cor.filter(Boolean).length,pct=Math.round((tot/50)*100);
  let grade='',gc='#A32D2D';
  if(pct>=90){grade='A — Exam ready! Outstanding work!';gc='#1D9E75';}
  else if(pct>=80){grade='B — Good — review missed topics';gc='#2E75B6';}
  else if(pct>=70){grade='C — Passing, more review needed';gc='#BA7517';}
  else{grade='Below passing — intensive review recommended';}
  const baseline=89;
  const diff=pct-baseline;
  const trend=`${diff>=0?'+'+diff:diff}% vs. your Set 1 baseline (${baseline}%)`;
  const rev=Qs.map((q,i)=>{
    const ok=cor[i],ua=sel[i]>=0?String.fromCharCode(65+sel[i]):'&#8212;';
    return `<div class="review-item ${ok?'r-correct':'r-wrong'}"><div class="review-q">Q${i+1} (Mod ${q.mod}): ${q.stem.substring(0,90)}...</div><div class="review-detail">Your answer: ${ua} &middot; Correct: ${String.fromCharCode(65+q.ans)} &middot; ${ok?'&#10003; Correct':'&#10007; Incorrect'}</div></div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('qarea').innerHTML=`
    <div class="score-card">
      <div class="score-big" style="color:${gc}">${pct}%</div>
      <div class="score-label">${tot} of 50 correct</div>
      <div class="grade" style="color:${gc}">${grade}</div>
      <div class="trend">${trend}</div>
    </div>
    <div style="margin-bottom:1rem"><button class="btn" onclick="go(0)">&#8592; Review questions</button></div>
    ${rev}`;
}

render();
</script>
</body>
</html>
