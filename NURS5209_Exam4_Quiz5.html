<script>
const Qs=[
// ── PROSTATE (Dr. Andelman emphasis) ─────────────────────────────────────────
{mod:10,tag:'Prostate DRE',vig:"A 66-year-old man presents for an annual health maintenance exam. He has no urinary complaints. You perform a DRE as part of the exam.",stem:"Which of the following BEST describes a NORMAL prostate on digital rectal examination?",opts:["Walnut-sized, smooth surface, rubbery consistency (like the tip of the nose), nontender, with a palpable median sulcus dividing two lobes","Walnut-sized, nodular surface, stone-hard consistency, with obliterated median sulcus","Enlarged, smooth, rubbery, nontender, with the median sulcus obliterated by symmetric growth","Exquisitely tender, boggy, slightly asymmetric with normal sulcus"],ans:0,rat:"The normal prostate on DRE is: walnut-sized (~4 cm), smooth surface, rubbery consistency (classically compared to the TIP OF THE EXAMINER'S OWN NOSE), nontender, and the MEDIAN SULCUS IS PALPABLE dividing two lateral lobes. Obliterated sulcus = BPH. Stone-hard nodule = cancer. Exquisitely tender = prostatitis."},

{mod:10,tag:'Prostate DRE',vig:"Dr. Andelman's discussion board post emphasized: 'On exam, you will feel an obliteration of the central groove for BPH.'",stem:"A 72-year-old man reports urinary frequency, nocturia 3 times nightly, weak stream, and hesitancy for 6 months. On DRE the prostate is smoothly and symmetrically enlarged, firm-rubbery, and nontender. The median sulcus (central groove) is no longer palpable. Which finding is the KEY distinguishing sign of BPH versus a normal prostate?",opts:["The firm-rubbery consistency — a normal prostate is always soft and spongy","The symmetric nontender enlargement — any enlargement is pathologic","The obliterated median sulcus — as the lateral lobes enlarge symmetrically in BPH they grow together and the central groove disappears","The size alone — any prostate larger than 3 cm is considered hypertrophic"],ans:2,rat:"The KEY DRE finding that distinguishes BPH from a normal prostate is the OBLITERATED MEDIAN SULCUS (central groove). As both lateral lobes enlarge symmetrically in BPH they grow toward each other and eliminate the central groove. Surface remains smooth and consistency remains rubbery-to-firm — similar to normal. Dr. Andelman specifically emphasized this finding on the discussion board."},

{mod:10,tag:'Prostate DRE',vig:"Dr. Andelman's personal story: her father had prostate cancer for 10 years, then developed urinary frequency with pain and low back pain. The urologist kept treating him for UTIs. It was prostate cancer that had returned more severely.",stem:"Which of the following BEST explains why Dr. Andelman's father's new symptoms of urinary frequency, pain with urination, and low back pain represented advanced prostate cancer rather than a UTI?",opts:["Early prostate cancer almost always causes urinary frequency, pain, and back pain from the start","These symptoms represent LATE/EXTENSIVE prostate cancer: urinary symptoms occur when tumor invades the bladder or urethra, and CONTINUOUS LOWER BACK AND PELVIC PAIN indicates osseous metastases — a pattern completely different from a UTI","UTIs in older men always cause back pain and this is identical to prostate cancer symptoms","Prostate cancer never causes urinary symptoms — only back pain is specific to prostate malignancy"],ans:1,rat:"EARLY prostate cancer is ASYMPTOMATIC — this is why screening is critical. Symptoms appear with EXTENSIVE disease: (1) urinary symptoms (frequency, hesitancy, hematuria, weak stream, burning) occur when tumor invades the bladder neck or urethra; (2) CONTINUOUS pain in the lower back, pelvis, and thighs = osseous metastases. Dr. Andelman's clinical pearl: back pain in a patient with known prostate cancer = metastatic disease until proven otherwise, NOT a UTI."},

{mod:10,tag:'Prostate DRE',vig:"On DRE of a 68-year-old man you feel a single hard, irregular, fixed nodule on the RIGHT posterior surface of the prostate. The left lobe is normal. His PSA is elevated at 8.2 ng/mL.",stem:"What is the most appropriate IMMEDIATE next step in management?",opts:["Prescribe a 2-week course of ciprofloxacin and recheck PSA in 6 weeks","Reassure the patient — a nodule on the right posterior surface is a normal anatomic variant in men over 65","Refer to urology for transrectal ultrasound (TRUS)-guided biopsy — a stone-hard, irregular, fixed posterior nodule combined with elevated PSA is highly suspicious for prostate cancer","Repeat DRE in 6 months — asymmetric nodules often represent calcification"],ans:2,rat:"A stone-hard, irregular, FIXED nodule on the posterior prostate surface — the zone most accessible to DRE — combined with an elevated PSA is a STRONG indication for urologic referral and TRUS-guided biopsy. The posterior zone is where ~70% of prostate cancers arise. Prostate cancer is asymptomatic at early stages, and the NP's role is to recognize this finding and refer promptly. A 2-week antibiotic course is appropriate for prostatitis (exquisitely tender), not a suspicious nodule."},

{mod:10,tag:'Prostate DRE',vig:"A 35-year-old man presents with fever 38.9°C, severe perineal pressure, painful urination, and urethral discharge. DRE reveals a warm, exquisitely tender, swollen prostate. You perform the exam very briefly.",stem:"Why MUST the DRE in acute bacterial prostatitis be performed briefly and very gently?",opts:["Prolonged DRE is painful for the patient but carries no clinical risk beyond discomfort","Vigorous prostate massage in acute bacterial prostatitis can force bacteria into the bloodstream causing BACTEREMIA and potentially SEPSIS","The prostate in acute prostatitis is too tender to obtain useful diagnostic information — DRE should be avoided completely","Brief examination prevents the development of Prehn sign"],ans:1,rat:"In acute bacterial prostatitis, the prostate is heavily colonized with bacteria. VIGOROUS MASSAGE or prolonged DRE can force bacteria into the bloodstream → BACTEREMIA → systemic sepsis. The exam should be performed briefly and gently — just enough to confirm the exquisitely tender, swollen presentation. DRE is NOT contraindicated (the diagnosis must be confirmed clinically), but it must be brief and gentle. This is a patient safety-critical clinical pearl."},

// ── CEREBRAL LOBES (Dr. Andelman emphasis) ───────────────────────────────────
{mod:12,tag:'Cerebral Lobes',vig:"Dr. Andelman posted: 'Each hemisphere is divided into four lobes. What are the specific functions of each lobe?'",stem:"Which of the following CORRECTLY matches each cerebral lobe to its PRIMARY function?",opts:["Frontal = sensation; Parietal = vision; Temporal = behavior/personality; Occipital = hearing","Frontal = personality, behavior, emotions, and intellectual function; Parietal = sensation; Occipital = visual reception; Temporal = hearing, taste, and smell","Frontal = hearing and taste; Parietal = vision; Temporal = personality; Occipital = sensation","All four lobes contribute equally to all functions — no lobe is specialized"],ans:1,rat:"Dr. Andelman's exact teaching from the discussion board — know these four lobes: FRONTAL = personality, behavior, emotions, and intellectual function. PARIETAL = sensation (somatosensory cortex). OCCIPITAL = visual reception. TEMPORAL = hearing, taste, and smell. Also: frontal lobe contains Broca's area (speech production) and motor cortex. Temporal lobe contains Wernicke's area (language comprehension) and auditory cortex."},

{mod:12,tag:'Aphasia',vig:"Dr. Andelman asked: 'Where is Wernicke's area? It affects language comprehension. What might your patient present with if this area is damaged?'",stem:"A 70-year-old man suddenly begins speaking rapidly but his speech is filled with nonsensical words, made-up words, and phrases that make no sense. He seems unaware that his speech is abnormal and does not understand what you say to him. Where is the lesion and what type of aphasia is this?",opts:["LEFT FRONTAL lobe (Broca's area) — Broca's (expressive) aphasia — non-fluent, effortful speech with intact comprehension","LEFT TEMPORAL lobe (Wernicke's area) — Wernicke's (receptive) aphasia — fluent but nonsensical speech with IMPAIRED comprehension; patient is UNAWARE of errors","RIGHT PARIETAL lobe — hemispatial neglect — patient ignores left side of environment","LEFT OCCIPITAL lobe — alexia — patient cannot read but speech is normal"],ans:1,rat:"WERNICKE'S AREA is located in the LEFT TEMPORAL LOBE. Damage produces Wernicke's (receptive/fluent) aphasia: rapid, well-articulated speech FILLED with paraphasias and jargon; severely IMPAIRED comprehension of spoken and written language; patient is UNAWARE of errors (anosognosia). This contrasts with Broca's aphasia (frontal lobe): non-fluent, halting speech; intact comprehension; patient is AWARE and frustrated. Dr. Andelman specifically asked: where is Wernicke's area and what happens when it is damaged."},

{mod:12,tag:'Aphasia',vig:"Dr. Andelman asked: 'Where is Broca's area located, and when injured, what might your patient's symptoms be?'",stem:"A 58-year-old right-handed woman has a stroke. She now speaks in short, effortful, telegraphic phrases — 'Go store... buy milk... want home.' She understands commands perfectly and follows them correctly, but is visibly frustrated by her inability to express herself. What type of aphasia is this and what lobe is damaged?",opts:["Wernicke's aphasia — temporal lobe — fluent speech with impaired comprehension","Broca's (expressive) aphasia — LEFT FRONTAL lobe — non-fluent, effortful, telegraphic speech with INTACT comprehension; patient is aware of the deficit and frustrated","Global aphasia — both frontal and temporal lobes — patient cannot speak or understand","Anomic aphasia — parietal lobe — only word-finding difficulty"],ans:1,rat:"BROCA'S AREA is in the LEFT FRONTAL LOBE. Broca's (expressive/non-fluent) aphasia: halting, effortful, telegraphic speech (content words without grammar); INTACT COMPREHENSION (patient understands and follows commands); patient is AWARE of the deficit and typically FRUSTRATED. The left hemisphere is dominant in ~95% of people. Dr. Andelman specifically asked about Broca's area location and symptoms when injured."},

{mod:12,tag:'Cerebral Lobes',vig:"A patient sustains a traumatic brain injury to the right parietal lobe.",stem:"Which sensory deficit would you MOST likely find on examination?",opts:["Loss of hearing in the right ear — the parietal lobe controls ipsilateral hearing","Contralateral (LEFT-sided) sensory loss — loss of discrimination including graphesthesia, stereognosis, and two-point discrimination","Visual field defect in the left half of the visual field — hemianopia","Non-fluent, effortful speech with intact comprehension"],ans:1,rat:"The PARIETAL LOBE's primary function is SENSATION — Dr. Andelman's teaching. A right parietal lesion produces LEFT-SIDED (contralateral) sensory deficits because the sensory pathways cross. Deficits include: loss of cortical discriminatory sensations (graphesthesia — cannot identify letters drawn on palm; stereognosis — cannot identify objects by touch; two-point discrimination). Crude pain, vibration, and touch are mediated by the thalamus and may be relatively spared. Hemianopia = occipital. Non-fluent speech = frontal."},

{mod:12,tag:'Cerebral Lobes',vig:"A 35-year-old with multiple sclerosis develops sudden diplopia and the finding of internuclear ophthalmoplegia (INO). The right eye fails to adduct when looking left; the left eye abducts but shows nystagmus.",stem:"What structure is damaged in INO, and why is this finding classic for multiple sclerosis?",opts:["Left CN III nucleus — damage at the midbrain prevents left eye adduction","RIGHT medial longitudinal fasciculus (MLF) in the brainstem — INO is the classic finding in MS because the MLF is a heavily myelinated brainstem pathway prone to demyelination; affects young adults in their productive years (onset 20–40)","Left CN VI nucleus — prevents abduction of the left eye","Right temporal lobe — Wernicke's area lesion affecting eye movement pathways"],ans:1,rat:"Internuclear ophthalmoplegia (INO) results from a lesion in the MEDIAL LONGITUDINAL FASCICULUS (MLF), the brainstem tract coordinating conjugate horizontal gaze. Right MLF lesion: when looking LEFT, the signal cannot cross from left CN VI nucleus to right CN III nucleus → right eye fails to ADDUCT. INO is the CLASSIC neurologic sign of MS in young adults because the MLF is a heavily myelinated tract prone to demyelinating plaques. MS affects the optic nerve, oculomotor nerve, corticospinal tract, posterior columns, and cerebellum — producing nystagmus, diplopia, weakness, spasticity, and Babinski sign."},

// ── VERTIGO/NYSTAGMUS (Dr. Andelman emphasis) ────────────────────────────────
{mod:12,tag:'Vertigo/CN VIII',vig:"Dr. Andelman shared her daughter's story of debilitating vertigo, eventual diagnosis of Meniere's disease, and emphasized: 'What would you find with nystagmus? Which cranial nerves are affected?'",stem:"A patient presents with episodic vertigo ('room is spinning'), unilateral LEFT-sided hearing loss, and tinnitus. She has had multiple episodes requiring her to pull over while driving. Which diagnosis is MOST consistent and what is the FIRST-LINE treatment?",opts:["Benign paroxysmal positional vertigo (BPPV) — treated with the Epley maneuver permanently","Ménière's disease — vertigo + UNILATERAL hearing loss + tinnitus is the classic triad; first-line treatment is a DIURETIC (to reduce endolymphatic pressure)","Acoustic neuroma — treated only with surgical resection","Vertebrobasilar insufficiency — requires immediate anticoagulation"],ans:1,rat:"Dr. Andelman's daughter's case: MÉNIÈRE'S DISEASE is characterized by the CLASSIC TRIAD of (1) episodic vertigo, (2) UNILATERAL sensorineural hearing loss (fluctuating), and (3) tinnitus ± aural fullness. It results from endolymphatic hydrops (excess fluid pressure in the inner ear). First-line treatment: DIURETIC (e.g., hydrochlorothiazide or acetazolamide) to reduce endolymphatic pressure. BPPV responds to the Epley maneuver but does NOT cause hearing loss. The combination of vertigo + unilateral hearing loss = MUST investigate for Ménière's vs. acoustic neuroma (MRI to rule out tumor — as was done in Dr. Andelman's daughter's case)."},

{mod:12,tag:'Vertigo/CN VIII',vig:"Dr. Andelman asked: 'On the physical exam, what would you find with nystagmus? Which cranial nerves are affected?'",stem:"During a neurologic exam, you observe that the patient's eyes are making repetitive, involuntary, rhythmic oscillating movements — a fast phase in one direction and a slow drift back. Which cranial nerve and system does this PRIMARILY involve, and what does the presence of nystagmus indicate?",opts:["CN VII (Facial nerve) — indicates Bell's palsy affecting eye closure","CN VIII (Vestibulocochlear nerve) — vestibular component; nystagmus indicates dysfunction of the vestibular system or cerebellum — must assess direction, whether it is horizontal/vertical/rotatory, and whether it changes with gaze position","CN III (Oculomotor nerve) — indicates complete CN III palsy with the eye deviated 'down and out'","CN II (Optic nerve) — indicates optic neuritis from multiple sclerosis"],ans:1,rat:"Nystagmus = involuntary rhythmic eye oscillations with a FAST phase (jerk) in one direction and a slow drift back. CN VIII (vestibular branch) is the primary nerve affected. Nystagmus indicates vestibular dysfunction (peripheral or central) or cerebellar disease. Assessment: (1) Direction of fast phase, (2) Horizontal vs. vertical vs. rotatory, (3) Does it change with gaze position (gaze-evoked = central; fixed direction = peripheral). Peripheral nystagmus (inner ear/CN VIII) = horizontal, fatigues, associated with vertigo. Central nystagmus (brainstem/cerebellum) = often vertical, does not fatigue, more ominous."},

{mod:12,tag:'Vertigo/CN VIII',vig:"A patient presents with sudden onset of intense vertigo, nausea, and vomiting. She felt like the room was spinning when she turned over in bed this morning. Symptoms last about 30–60 seconds and have been recurring all day. No hearing loss.",stem:"This presentation is MOST consistent with which condition, and what is the NP's role in management?",opts:["Ménière's disease — prescribe a diuretic and refer to ENT","Benign paroxysmal positional vertigo (BPPV) — caused by dislodged otoconia in the semicircular canals; the NP should perform or refer for the EPLEY MANEUVER (canalith repositioning); episodic, positional, brief episodes, NO hearing loss","Vertebrobasilar stroke — emergent CT scan and neurology referral","Acoustic neuroma — schedule MRI and refer to ENT"],ans:1,rat:"BPPV is the most common cause of vertigo: episodic, provoked by changes in head position (rolling over in bed, looking up), brief episodes (seconds to <1 minute), NO hearing loss. Caused by dislodged otoconia (calcium carbonate crystals) in the posterior semicircular canal. Diagnosis confirmed by the Dix-Hallpike test (provokes nystagmus). Treatment: EPLEY MANEUVER (canalith repositioning procedure) — the NP can perform this in the office. Dr. Andelman specifically stated: 'It is important that we are able to perform the Epley maneuver to help our patients with vertigo.' No hearing loss distinguishes BPPV from Ménière's."},

// ── MUSCULOSKELETAL (Dr. Andelman emphasis) ───────────────────────────────────
{mod:11,tag:'Shoulder ROM',vig:"Dr. Andelman posted: 'Be sure to know the degree of rotation for the shoulder exam. With joint pain, limitation in range of motion is the most sensitive sign you will see.'",stem:"During a shoulder exam you ask the patient to rotate their arms externally and internally. What is the NORMAL range of motion for BOTH shoulder internal and external rotation?",opts:["Internal rotation = 180°; External rotation = 180°","Internal rotation = 50°; External rotation = 50°","Internal rotation = 90°; External rotation = 90°","Internal rotation = 45°; External rotation = 135°"],ans:2,rat:"Normal shoulder ROM: Forward flexion = 180°, Hyperextension = 50°, Abduction = 180°, Adduction = 50°, INTERNAL ROTATION = 90°, EXTERNAL ROTATION = 90°. Dr. Andelman specifically emphasized knowing degrees of shoulder rotation. Memory: Flex/Abduct = 180°; Rotate (both directions) = 90°; Hyperextend/Adduct = 50°. Limitation of ROM — especially internal rotation — is the MOST SENSITIVE sign of shoulder pathology."},

{mod:11,tag:'Shoulder ROM',vig:"Dr. Andelman posted: 'Extra-articular disease is more specific to a tendon, ligament, or nerve and will produce swelling and pain in one spot in the joint, affecting only certain planes of ROM. Articular disease is inside the joint, like arthritis, and will produce swelling and tenderness around the whole joint, and is more limiting on all planes of ROM.'",stem:"A patient with rheumatoid arthritis of the shoulder has symmetric swelling around the entire joint, warmth, tenderness circumferentially, and limitation of ROM in ALL planes. This pattern is MOST consistent with what type of disease?",opts:["Extra-articular disease — tendon or ligament pathology producing pain in one specific location","Articular (intra-articular) disease — inflammation INSIDE the joint produces diffuse swelling, circumferential tenderness, and limitation of ALL planes of ROM","Bursitis only — limited to subacromial area with pain on abduction only","Neuropathic disease — nerve involvement produces swelling but no ROM limitation"],ans:1,rat:"Dr. Andelman's distinction: ARTICULAR disease (inside the joint, e.g., arthritis) = DIFFUSE swelling and tenderness around the WHOLE JOINT + limitation of ALL planes of ROM. EXTRA-ARTICULAR disease (tendon, ligament, bursa, nerve) = pain and swelling in ONE SPOT + affects only CERTAIN PLANES of ROM (the ones that use the affected structure). This distinction is high-yield: a patient with rotator cuff tear (extra-articular) will have pain specifically with abduction (supraspinatus) but other planes may be intact."},

{mod:11,tag:'Rotator Cuff',vig:"Dr. Andelman asked about examining a patient for shoulder pain or rotator cuff tears or lesions.",stem:"A 52-year-old office worker cannot raise her right arm above 90 degrees and has pain specifically with shoulder abduction. The DROP ARM TEST is performed: her arm is passively abducted by the examiner; when released, she cannot hold it up and it drops. Which structure is MOST likely involved?",opts:["Subscapularis tendon — the primary internal rotator of the shoulder","Supraspinatus tendon — initiates the first 15° of abduction and continues through the arc; a complete tear produces a POSITIVE DROP ARM TEST (cannot sustain abduction)","Biceps tendon — responsible for elbow flexion and forearm supination","Infraspinatus tendon — responsible for external rotation"],ans:1,rat:"The SUPRASPINATUS is the most commonly torn rotator cuff muscle. It runs through the subacromial space (most vulnerable to impingement). It initiates abduction (first 15°) and continues through the arc. A complete supraspinatus tear = POSITIVE DROP ARM TEST: arm is passively abducted; when released the patient CANNOT sustain the position and the arm drops. This is also called the 'characteristic hunched position' in Jarvis. SITS: Supraspinatus (abduction), Infraspinatus (external rotation), Teres Minor (external rotation + adduction), Subscapularis (internal rotation — the only ANTERIOR rotator cuff muscle)."},

{mod:11,tag:'MS Abnormals',vig:"Dr. Andelman emphasized articular vs. extra-articular disease and asked students to differentiate findings on shoulder exam.",stem:"A 30-year-old tennis player presents with pain SPECIFICALLY at the LATERAL EPICONDYLE of the right humerus. The pain radiates down the extensor surface of the forearm and is reproduced by resisting extension of the hand. Which condition is this?",opts:["Olecranon bursitis — localized swelling over the olecranon process from gout or RA","Epicondylitis (Tennis elbow) — chronic pain at the lateral epicondyle from inflammation along flexor/extensor tendons from excessive pronation/supination with extended wrist (e.g., racquet sports)","Carpal tunnel syndrome — median nerve compression at the wrist","Dupuytren contracture — palmar fascia hyperplasia causing digital flexion contracture"],ans:1,rat:"Lateral EPICONDYLITIS (tennis elbow) = chronic disabling pain at the LATERAL EPICONDYLE of the humerus, radiating down the extensor forearm surface. Pain is located with one finger. Resisted extension of the hand INCREASES the pain. Caused by excessive pronation/supination with extended wrist — racquet sports, screwdriver use. This is an EXTRA-ARTICULAR condition (tendon/ligament pathology) — affecting specific planes of motion, not the entire joint — consistent with Dr. Andelman's distinction."},

// ── INFANT MS EXAM (Dr. Andelman emphasis) ───────────────────────────────────
{mod:11,tag:'Infant MS',vig:"Dr. Andelman posted: 'Palpate the clavicle. Did you know the clavicle is the bone most frequently fractured during birth? Also, look for equal ROM of arms during the Moro reflex.'",stem:"You are examining a 2-day-old newborn. While palpating the clavicle, you note crepitus and tenderness over the right midclavicle. The infant's right arm shows DECREASED movement during the Moro reflex compared to the left. What does this finding indicate?",opts:["This is a normal finding — all newborns have asymmetric Moro reflexes","Crepitus over the clavicle + decreased arm movement on the SAME SIDE during Moro reflex = CLAVICLE FRACTURE — the most common birth injury to bone","This indicates a dislocated shoulder from the delivery — requires immediate orthopedic referral","Erb's palsy — brachial plexus injury at C5-C6 — produces the same findings"],ans:1,rat:"The CLAVICLE is the most frequently fractured bone during birth (Dr. Andelman's teaching). Crepitus + point tenderness over the clavicle + ASYMMETRIC MORO REFLEX (decreased movement on the affected side) = clavicle fracture. The Moro reflex (startle reflex) involves symmetric abduction and extension of both arms — asymmetry is ABNORMAL and indicates unilateral pathology on the decreased-movement side. Treatment: usually minimal — gentle handling, occasionally light immobilization. Most heal without intervention. Erb's palsy also causes asymmetric Moro but involves the entire C5-C6 distribution."},

{mod:11,tag:'Infant MS',vig:"Dr. Andelman posted about examining infant hips: 'The Ortolani maneuver is used for checking for developmental dysplasia of the hip. This should be done at every visit until the infant is one year old.'",stem:"During a well-infant check at 4 months of age, you perform the Ortolani maneuver by flexing the infant's knees and hips to 90° and gently ABDUCTING the hips. You hear and feel a subtle 'clunk' on the right side. What does this indicate and what is the next step?",opts:["A normal finding — the clunk is the sound of the femoral head normally seating in the acetabulum at this age","Positive Ortolani sign — the 'clunk' represents the dislocated femoral head being REDUCED back into the acetabulum during abduction = developmental dysplasia of the hip (DDH); refer to pediatric orthopedics and obtain imaging","The clunk indicates a fractured femoral neck — immobilize and refer to ED","A normal variant — mild hip laxity resolves by age 6 months without treatment"],ans:1,rat:"ORTOLANI MANEUVER tests for REDUCTION — can the dislocated hip be put back? Technique: ABDUCT the hips. Positive = clunk as the femoral head is RELOCATED into the acetabulum = the hip was dislocated. Compare with BARLOW (ADDUCT + posterior pressure = checks if the hip can be DISlocated). Dr. Andelman emphasized performing this at EVERY visit until 1 year. DDH treatment: Pavlik harness if caught early. Untreated = long-term limp, leg-length discrepancy, hip OA. Imaging: ultrasound (<6 months), X-ray (>6 months)."},

{mod:11,tag:'Infant MS',vig:"Dr. Andelman posted: 'Metatarsus adduction is when the hindfoot is in alignment with the lower leg. This usually resolves by age 3.'",stem:"During a well-infant exam you note that the forefoot curves inward relative to the heel but the HINDFOOT is in normal alignment with the lower leg. The deformity is FLEXIBLE and correctable with gentle manual pressure. What is this condition and what is the appropriate management?",opts:["Talipes equinovarus (clubfoot) — requires immediate serial casting; cannot be corrected manually","Metatarsus adductus — hindfoot in alignment with the lower leg; forefoot curves inward; FLEXIBLE and correctable passively; usually resolves by age 3 without treatment; refer if rigid or not improving by 6 months","Pes planus (flat feet) — treated with arch supports","Genu varum (bowlegs) — normal finding in infants under 18 months"],ans:1,rat:"METATARSUS ADDUCTUS (Dr. Andelman's term): forefoot adduction WITH hindfoot in NORMAL alignment with the lower leg. Key: it is FLEXIBLE (the forefoot can be passively corrected — a positive indicator for resolution). Usually resolves spontaneously by age 3. Management: observation and passive stretching exercises. Refer if RIGID or not improving by 6 months. Distinguish from CLUBFOOT (talipes equinovarus): rigid + fixed triplane deformity (inversion + forefoot adduction + equinus) — CANNOT be passively corrected — requires Ponseti casting."},

{mod:11,tag:'Scoliosis/Lordosis',vig:"Dr. Andelman posted: 'During your MS and Sports exam, you will be looking at the spine. What might you find with lordosis? What would you find with scoliosis?'",stem:"During a sports physical for a 14-year-old girl, you ask her to perform the Adams forward bend test. Viewed from behind, you observe a RIB HUMP on the right thoracic region as she bends forward. What is this finding, what causes the rib hump, and what imaging is ordered?",opts:["Kyphosis — excessive thoracic curve caused by poor posture; no imaging needed","Scoliosis — the rib hump appears on the CONVEX side of the curve because vertebrae rotate toward the convex side, carrying the ribs posteriorly; order a full-spine X-ray to measure the Cobb angle","Lordosis — excessive lumbar curve; rib hump is from compensatory thoracic flattening","A normal finding — rib asymmetry during forward bending is seen in 30% of healthy adolescents"],ans:1,rat:"The ADAMS FORWARD BEND TEST is the standard scoliosis screening tool. A RIB HUMP on the CONVEX side of the curve is pathognomonic for structural scoliosis — because the vertebrae ROTATE toward the convex side, carrying the attached ribs POSTERIORLY to create the hump. Dr. Andelman asked what you would find with scoliosis. X-ray is ordered to measure the COBB ANGLE: <10° = normal; 10–24° = monitor; 25–40° = bracing; >40–50° = surgical evaluation. Scoliosis is most common in adolescent females during the peak growth spurt (age 10 through adolescence)."},

// ── ABNORMAL GAITS TABLE 24.6 (Dr. Andelman emphasis) ─────────────────────────
{mod:12,tag:'Abnormal Gaits',vig:"Dr. Andelman specifically asked: 'Make a chart using the Abnormal Gaits Table 24.6. Differentiate the characteristic appearance of abnormal gaits.'",stem:"A 65-year-old man walks with stooped posture, trunk pitched forward, elbows, hips, and knees flexed. His steps are SHORT and SHUFFLING. He hesitates before starting to walk and has difficulty stopping. He holds his body rigid and turns as one fixed unit. What gait is this and what is the underlying cause?",opts:["Cerebellar ataxia — staggering, wide-based gait; caused by cerebellar tumor or alcohol","Parkinsonian (Festinating) gait — caused by PARKINSONISM; stooped posture + trunk pitched forward + short shuffling steps + hesitation to start/stop + rigid body","Spastic hemiparesis gait — arm immobile against body + circumduction of leg; caused by stroke","Steppage gait — knee and foot lifted HIGH + slapping quality; caused by footdrop from LMN lesion"],ans:1,rat:"PARKINSONIAN (FESTINATING) GAIT — Dr. Andelman specifically asked students to know ALL gait types from Table 24.6. Parkinsonian features: stooped posture; trunk PITCHED FORWARD; elbows, hips, knees FLEXED; steps SHORT and SHUFFLING; HESITATION to begin walking; DIFFICULT to stop suddenly; body held RIGID; turns as ONE FIXED UNIT; difficulty with ANY change in direction. Cause: PARKINSONISM (loss of dopamine-producing neurons in substantia nigra and basal ganglia). Additional Parkinson's signs: resting tremor, bradykinesia, cogwheel rigidity, loss of balance."},

{mod:12,tag:'Abnormal Gaits',vig:"Dr. Andelman asked students to differentiate abnormal gaits from Table 24.6.",stem:"A 45-year-old man is recovering from a stroke affecting his LEFT motor cortex. He presents with his RIGHT arm immobile against his body, shoulder adducted, elbow flexed, wrist pronated, fingers flexed. His RIGHT LEG is stiff and extended. When walking, his right leg SWINGS OUTWARD IN A SEMICIRCLE with each step (drags the toe). What gait pattern is this?",opts:["Parkinsonian (Festinating) — bilateral symmetric short shuffling steps","Spastic Hemiparesis gait — arm immobile against body with flexion posture; leg stiff and extended; CIRCUMDUCTS (drags toe in semicircle) with each step; caused by UMN lesion (stroke) affecting CONTRALATERAL side","Steppage (Footdrop) gait — lifts foot high and slaps it down; caused by LMN peroneal weakness","Waddling gait — hip drops on opposite side when stepping; caused by hip girdle weakness"],ans:1,rat:"SPASTIC HEMIPARESIS GAIT — caused by UMN lesion of the CORTICOSPINAL TRACT (stroke, trauma). Findings: arm IMMOBILE against body with FLEXION of shoulder, elbow, wrist, fingers + adduction of shoulder (the classic stroke posture — arm 'held against chest'); leg STIFF and EXTENDED; CIRCUMDUCTS (drags toe in a semicircle) with each step. Dr. Andelman emphasized knowing all gait types. Note: UMN (stroke) affects the CONTRALATERAL side (stroke to left motor cortex → right-sided weakness). This is the most clinically common pathologic gait."},

{mod:12,tag:'Abnormal Gaits',vig:"From Dr. Andelman's discussion board: 'Make a chart of characteristics to differentiate between upper and lower motor neuron lesions — Table 24.7.'",stem:"You are examining two patients. Patient A has a stroke and presents with spastic paralysis of the right leg, hyperreflexia, positive Babinski sign, and no muscle atrophy. Patient B has a herniated disc at L4-L5 with foot weakness, hyporeflexia at the ankle, significant calf MUSCLE ATROPHY, and fasciculations. Which correctly identifies the type of lesion each patient has?",opts:["Patient A = LMN; Patient B = UMN","Patient A = UMN (stroke → spastic + hyperreflexia + Babinski positive + no atrophy); Patient B = LMN (herniated disc → flaccid + hyporeflexia + ATROPHY + fasciculations)","Both patients have UMN lesions — strokes and disc herniations both cause hyperreflexia","Both patients have LMN lesions — any lower-extremity weakness indicates LMN pathology"],ans:1,rat:"Dr. Andelman specifically asked students to make a chart differentiating UMN vs. LMN lesions (Table 24.7). UMN LESION (Patient A — stroke): SPASTICITY (increased tone), HYPERREFLEXIA + ankle clonus, POSITIVE BABINSKI, NO significant atrophy (or disuse atrophy only), NO fasciculations, weakness in pyramidal distribution. LMN LESION (Patient B — herniated disc): FLACCIDITY (decreased tone), HYPOREFLEXIA or areflexia, NO Babinski, SIGNIFICANT MUSCLE ATROPHY (may be marked), FASCICULATIONS, weakness in specific muscles served by damaged nerve. This table is the most important UMN/LMN comparison in the neurologic chapter."},

{mod:12,tag:'Abnormal Gaits',vig:"Dr. Andelman asked about abnormal gait types including waddling and steppage.",stem:"A child lifts his knee and foot HIGH with each step, then SLAPS the foot down flat — as if walking up stairs and finding no stair there. This gait compensates for his inability to dorsiflex his foot. What is this gait and what is the underlying neurologic cause?",opts:["Waddling gait — weak hip girdle muscles causing the opposite hip to drop when stepping","Steppage (Footdrop) gait — caused by WEAKNESS OF PERONEAL AND ANTERIOR TIBIAL MUSCLES from a LOWER MOTOR NEURON LESION (e.g., peroneal nerve injury, poliomyelitis, foot drop from L4-L5 disc herniation)","Cerebellar ataxia — wide-based staggering gait from cerebellar disease","Scissors gait — knees cross or contact during walking from paraparesis"],ans:1,rat:"STEPPAGE (FOOTDROP) GAIT — caused by weakness of peroneal and anterior tibial muscles from a LOWER MOTOR NEURON LESION (at the spinal cord, nerve root, or peripheral nerve). The patient compensates for FOOTDROP (inability to dorsiflex) by lifting the knee high to clear the ground, then the foot SLAPS down flat. It looks as if the person is 'walking up stairs and finding no stair.' Causes: peroneal nerve injury (lateral knee trauma), L4-L5 disc herniation, poliomyelitis. Distinguish from cerebellar ataxia (wide-based, uncoordinated — BOTH legs affected)."},

// ── REMAINING BLUEPRINT TOPICS ────────────────────────────────────────────────
{mod:10,tag:'Female GU',vig:"A 24-year-old sexually active woman presents with intense vaginal pruritus and a thick, white, 'cottage cheese' discharge. The vulva and vagina appear red and edematous. Vaginal pH is 4.2.",stem:"Which vaginal infection is MOST consistent with this presentation, and what microscopic finding confirms the diagnosis?",opts:["Bacterial vaginosis — thin, gray-white, malodorous discharge; clue cells on saline wet mount; pH >4.5","Trichomoniasis — frothy yellow-green discharge; flagellated cells on saline wet mount; pH >4.5","Candidiasis (vulvovaginal yeast infection) — thick white curdy discharge; red edematous vulva; pH NORMAL (<4.5); KOH wet mount shows BRANCHED HYPHAE","Atrophic vaginitis — pale dry mucosa; occurs in postmenopausal women"],ans:2,rat:"CANDIDIASIS: intense PRURITUS + thick WHITE CURDY ('cottage cheese') discharge + red edematous vulva + vaginal pH NORMAL (<4.5) + KOH wet mount showing BRANCHED HYPHAE. Trichomoniasis: FROTHY yellow-green MALODOROUS + pH >4.5 + flagellated cells + 'strawberry cervix.' BV: THIN gray-white FISHY + pH >4.5 + CLUE CELLS + positive whiff test. Atrophic vaginitis: pale dry mucosa + postmenopausal. The pH and microscopy distinguish all three infectious types."},

{mod:10,tag:'Female GU',vig:"A 27-year-old woman is brought to urgent care with fever >38°C, severe suprapubic pain, and a rigid boardlike lower abdomen. On bimanual exam, moving the cervix causes INTENSE pain.",stem:"What is this finding called and what does it indicate?",opts:["Goodell sign — cervical softening indicating early pregnancy","Chadwick sign — bluish cervical discoloration indicating pregnancy or hypoxia","Cervical motion tenderness (CMT) — 'Chandelier sign' — intense pain with cervical movement indicating PERITONEAL IRRITATION = PID until proven otherwise","Hegar sign — lower uterine segment softening at 10–12 weeks gestation"],ans:2,rat:"CERVICAL MOTION TENDERNESS (CMT) = the 'CHANDELIER SIGN' — named because the patient 'jumps up toward the chandelier' when the cervix is moved during bimanual exam. This indicates PERITONEAL IRRITATION and is the hallmark finding of PELVIC INFLAMMATORY DISEASE (PID) until proven otherwise. PID is caused by ascending infection (chlamydia, gonorrhea, BV) from cervix/vagina to endometrium and fallopian tubes. Goodell sign = cervical softening (pregnancy). Chadwick sign = bluish cervix (pregnancy). Hegar sign = lower uterine segment softening (pregnancy)."},

{mod:10,tag:'Tanner Staging',vig:"An NP student asks how to distinguish Tanner Stage 4 from Stage 5 breast development when examining a 16-year-old girl.",stem:"Which description correctly distinguishes Tanner breast Stage 4 from Stage 5?",opts:["Stage 4: only the nipple protrudes with the areola flush with the breast. Stage 5: the areola and nipple form a secondary mound","Stage 4: the areola and nipple form a SECONDARY MOUND projecting ABOVE the level of the breast. Stage 5 (mature): the areola flattens back to breast level and ONLY the nipple protrudes. Some women remain at Stage 4 as a normal variant","Stage 4 and Stage 5 are identical in appearance — only age distinguishes them","Stage 4: breast budding with widened areola — no secondary mound. Stage 5: same as Stage 4 but larger"],ans:1,rat:"STAGE 4 breast: areola and nipple form a SECONDARY MOUND that PROJECTS ABOVE the level of the breast — this is the KEY distinguishing feature. STAGE 5 (mature): the areola flattens back to breast level and ONLY the nipple protrudes. Some women remain at Stage 4 as a normal variant and never fully reach Stage 5 — this is normal. This distinction is high-yield."},

{mod:10,tag:'Incontinence',vig:"A 55-year-old woman leaks urine in small amounts CONSTANTLY throughout the day without any urge or physical strain. She reports her bladder 'always feels full' and she strains to initiate urination with a weak stream.",stem:"Which type of urinary incontinence does this represent and what is the underlying mechanism?",opts:["Stress incontinence — weakened pelvic floor from prior vaginal deliveries causes leakage with coughing/sneezing","Urge incontinence — overactive detrusor muscle causes sudden uncontrollable urge with large-volume leakage","Overflow incontinence — incomplete bladder emptying causes chronic overdistension; the bladder overflows in small constant amounts; associated with straining to void and weak stream","Functional incontinence — mobility limitations prevent reaching the toilet in time"],ans:2,rat:"OVERFLOW INCONTINENCE: bladder cannot empty properly → chronic OVERDISTENSION → constant small-amount dribbling WITHOUT urge or physical strain. Key features: constant dribbling, difficulty initiating stream (straining), weak stream, sensation of fullness never resolving. Causes: bladder outlet obstruction or underactive/neurogenic detrusor (diabetes, MS, spinal injury). Contrast: STRESS = leakage with physical strain (coughing, sneezing). URGE = sudden uncontrollable urge with large-volume loss. MIXED = combination of stress + urge."},

{mod:10,tag:'BSE',vig:"A 32-year-old postpartum woman whose menstrual cycles have returned asks the NP when she should perform her next breast self-examination. Her last period started 10 days ago.",stem:"What is the optimal timing for BSE and why?",opts:["Today — day 10 is in the late follicular phase which is ideal for breast examination","Day 1 of her next menstrual period","Days 4–7 of her NEXT cycle, counting from day 1 (first day of menstrual flow) — breasts are smallest and least congested during this window; premenstrual engorgement and nodularity make accurate palpation more difficult","3 days before her next expected period when she is most aware of her breast tissue"],ans:2,rat:"Optimal BSE timing: DAYS 4–7 of the menstrual cycle counting from DAY 1 (first day of menstrual FLOW). During this window, estrogen and progesterone levels are lowest → breasts are SMALLEST and LEAST CONGESTED → any discrete lump is easiest to detect. At day 10 she is in the late follicular phase with rising estrogen — increasing breast volume and nodularity. Premenstrual phase (day 21+) has maximum engorgement, making lump detection least accurate."},

{mod:11,tag:'MS Special Tests',vig:"A 28-year-old woman injures her knee while playing soccer. She reports her knee 'gives out' when she pivots. On examination, with the knee at 20–30° flexion, you stabilize the femur and pull the tibia anteriorly. There is significant anterior tibial translation with no firm endpoint.",stem:"What test was performed, what does the positive finding indicate, and WHY is this test preferred over the anterior drawer test at 90° flexion?",opts:["McMurray test — positive for torn meniscus — preferred because it is less painful","Lachman test — positive for ACL TEAR — preferred because at 20–30° flexion the HAMSTRINGS ARE RELAXED, allowing accurate isolated ACL assessment; at 90° (anterior drawer), hamstring tension can falsely stabilize the tibia reducing sensitivity","Valgus stress test — positive for MCL tear — performed with knee extended","Tinel sign — positive for carpal tunnel — tests median nerve at volar wrist"],ans:1,rat:"LACHMAN TEST is performed at 20–30° knee flexion. At this angle, the HAMSTRINGS are RELAXED → allows accurate isolated ACL integrity assessment. Positive: increased anterior tibial translation + SOFT or ABSENT ENDPOINT = ACL tear. Sensitivity 85–98%. The ANTERIOR DRAWER TEST uses 90° of flexion where hamstring tension can falsely stabilize the tibia, reducing sensitivity. The Lachman test is the PREFERRED clinical test for ACL assessment."},

{mod:11,tag:'MS Special Tests',vig:"A 50-year-old woman has right thumb, index, and middle finger numbness that wakes her at night. She reports 'shaking out' her hand provides temporary relief.",stem:"Which TWO clinical tests confirm carpal tunnel syndrome and what is the affected nerve?",opts:["McMurray and Lachman tests — femoral nerve at the knee","Phalen test (wrist flexion for 60 seconds) and Tinel sign (percussion at volar wrist) — both reproduce burning/tingling in the MEDIAN nerve distribution (thumb, index, middle, and radial half of ring finger)","Straight leg raise and Kernig's sign — sciatic nerve at the lumbar spine","Drop arm test and empty can test — supraspinatus tendon tear"],ans:1,rat:"CARPAL TUNNEL SYNDROME diagnostic tests: (1) PHALEN TEST: both wrists flexed back-to-back at 90° for 60 seconds → POSITIVE = reproduction of burning and tingling in median nerve distribution. (2) TINEL SIGN: percussion/tapping over the VOLAR wrist (carpal tunnel) → POSITIVE = burning and tingling ('electric shock') along median nerve distribution. AFFECTED NERVE: MEDIAN nerve (C6-C7-C8) compressed at the wrist. Distribution: thumb, index, middle, radial half of ring finger. Classic history: nocturnal paresthesias relieved by 'shaking out' the hand (flick sign). More common in women ages 40–60."},

{mod:12,tag:'Reflex Testing',vig:"You are testing a 40-year-old woman's reflexes. You strike the patellar tendon and she has a 4+ brisk patellar reflex with clonus. On plantar stimulation, her great toe extends upward and the other toes fan out.",stem:"What do these findings indicate and what is the clinical significance?",opts:["Normal findings — 4+ reflexes and toe fanning are normal in women over 40","Hyperreflexia (4+ with clonus) + POSITIVE BABINSKI SIGN (dorsiflexion of great toe + fanning) = UPPER MOTOR NEURON (UMN/corticospinal tract) lesion — indicative of a central nervous system problem such as stroke, MS, or spinal cord injury","Hyporeflexia and Babinski sign together = LOWER MOTOR NEURON disease","4+ reflexes alone are always diagnostic of Parkinson's disease"],ans:1,rat:"HYPERREFLEXIA (3+–4+) + ankle CLONUS + POSITIVE BABINSKI SIGN (dorsiflexion of great toe + fanning) = UPPER MOTOR NEURON (UMN) LESION = corticospinal (pyramidal) tract disease. Causes: stroke, MS, ALS, spinal cord injury. Normal Babinski = plantar FLEXION of toes (downgoing). POSITIVE Babinski = dorsiflexion of great toe + toe fanning = UMN disease in adults (normal in infants up to 12–24 months). This triad — hyperreflexia + clonus + Babinski — is the UMN signature."},

{mod:13,tag:'Sports PPE',vig:"A 15-year-old female swimmer has heart palpitations during races. On exam a systolic murmur at the LEFT sternal border is LOUDER when she stands and SOFTER when she squats.",stem:"What condition does this dynamic murmur pattern indicate, and what is required before sports clearance?",opts:["An innocent flow murmur — common in athletes; clear for full participation without restriction","Hypertrophic cardiomyopathy (HCM) — the murmur INCREASES with standing (decreased preload → smaller LV → more outflow obstruction) and DECREASES with squatting (increased preload → bigger LV → less obstruction); do NOT clear until cardiology evaluation with ECG and echocardiogram","Mitral valve prolapse — benign; clear with counseling","Aortic stenosis — murmur increases with squatting"],ans:1,rat:"HCM dynamic murmur: LOUDER STANDING (decreased venous return → decreased preload → smaller LV → more obstruction) + SOFTER SQUATTING (increased venous return → increased preload → larger LV → less obstruction). HCM = #1 cause of SUDDEN CARDIAC DEATH in young athletes. DO NOT CLEAR until cardiology evaluation with ECG (may show LVH) and ECHOCARDIOGRAM (asymmetric septal hypertrophy). Palpitations during exertion in a young athlete + dynamic murmur = HCM until proven otherwise."},

{mod:14,tag:'Urgent Assessment',vig:"A 69-year-old man with right arm weakness and slurred speech that began 1.5 hours ago is brought to urgent care. He partially recovered but speech is still mildly slurred.",stem:"Why does TIMING matter critically in this presentation, and what is the immediate management?",opts:["This is likely a complicated migraine — treat with sumatriptan and observe for 4 hours","TIA or acute ischemic stroke — timing is CRITICAL because IV tPA (alteplase) must be administered within 4.5 HOURS of symptom onset; this patient is within the window; requires IMMEDIATE transfer to a stroke-capable emergency department","Bell's palsy with ipsilateral arm weakness — treat with prednisone","Partial seizure — administer benzodiazepine and monitor"],ans:1,rat:"Sudden focal neurologic deficits in an older adult = STROKE or TIA until proven otherwise. TIMING is CRITICAL: IV tPA (alteplase) for ischemic stroke must be given within 4.5 HOURS of SYMPTOM ONSET. 'TIME IS BRAIN' — ~1.9 million neurons die per minute during a stroke. This patient at 1.5 hours is WITHIN the treatment window → IMMEDIATE transfer to a stroke center. Use the 'last known well' time as the reference. Mechanical thrombectomy can be considered up to 6–24 hours in selected patients. The NP's role: recognize, do NOT delay, transfer emergently."},

{mod:14,tag:'Urgent Assessment',vig:"A 4-week-old infant has a rectal temperature of 38.2°C. She appears mildly irritable but is feeding and has good color. The urgent care NP wants to discharge the infant with return precautions.",stem:"Why is this NOT appropriate management for a febrile infant under 3 months of age?",opts:["It is appropriate — a well-appearing infant with mild fever and good feeding can be safely discharged with 24-hour follow-up","Fever ≥38°C in ANY infant under 3 months requires a FULL SEPSIS EVALUATION regardless of appearance: CBC, blood culture, UA + urine culture (catheter), LP (CSF), and hospital admission for IV antibiotics pending cultures — a 'well appearance' is NOT sufficient reassurance in this age group","Only a urinalysis is required — if negative, discharge is safe","IV antibiotics should be started in the urgent care and the infant discharged home to complete a 10-day course"],ans:1,rat:"In infants <3 MONTHS, the immune system is immature and cannot contain bacterial infections. Serious bacterial infections (bacteremia, UTI, meningitis) CAN PRESENT WITH A WELL-APPEARING INFANT. A well appearance is NOT reassuring enough to forgo a full sepsis workup in this age group. Standard evaluation: CBC with differential, blood culture, UA + urine culture (CATHETER specimen — NOT bag), LP (CSF for cell count, protein, glucose, Gram stain, culture) in most cases. Hospital admission + IV antibiotics pending culture results. This is non-negotiable standard of care."},

{mod:10,tag:'Male GU',vig:"A 22-year-old male presents with sudden, excruciating left testicular pain that began while sleeping 2 hours ago. He has nausea and vomiting. On exam the left testis is elevated and the cremasteric reflex is ABSENT on the left.",stem:"What is the diagnosis, how does it differ from epididymitis, and what is the time-sensitive management?",opts:["Epididymitis — treat with doxycycline and supportive care; lifting the scrotum (Prehn sign) relieves pain","Testicular torsion — ABSENT CREMASTERIC REFLEX + sudden severe pain + HIGH-RIDING TESTIS + no fever distinguishes it from epididymitis; surgical emergency — testis can become gangrenous within hours; immediate urology consult","Varicocele — soft tortuous mass; dull dragging ache; not an emergency","Hydrocele — transilluminates; fluid collection around testis; not painful"],ans:1,rat:"TESTICULAR TORSION = SURGICAL EMERGENCY. Distinguishing features: SUDDEN SEVERE unilateral pain (often during sleep or after minor trauma), HIGH-RIDING TESTIS (testis rotates and shortens the cord), ABSENT CREMASTERIC REFLEX on affected side, NO FEVER (vs. epididymitis which has fever), nausea/vomiting. PREHN SIGN is NEGATIVE in torsion (elevating scrotum does NOT relieve pain — positive Prehn = epididymitis). Testis can become gangrenous in HOURS. Immediate urology consultation and Doppler ultrasound (shows absent blood flow). Do NOT delay for imaging if torsion is strongly suspected."},

{mod:10,tag:'Male GU',vig:"During a male genital exam, you note a soft, tortuous, worm-like mass along the LEFT spermatic cord that is more prominent when the patient stands and reduces when he lies down.",stem:"What is this finding, why is it predominantly LEFT-sided, and what is its clinical significance?",opts:["Hydrocele — a collection of fluid around the testis that transilluminates","Varicocele — dilation of the pampiniform plexus veins; predominantly LEFT-sided because the LEFT testicular vein drains at a RIGHT ANGLE into the left renal vein (higher hydrostatic pressure); right testicular vein drains obliquely into the IVC (lower pressure); associated with male INFERTILITY","Epididymitis — acute infection of the epididymis; exquisitely tender","Scrotal hernia — indirect inguinal hernia descending into scrotum"],ans:1,rat:"VARICOCELE = dilation of the pampiniform plexus veins = 'bag of worms.' PREDOMINANTLY LEFT (85–90%): the left testicular vein drains at a RIGHT ANGLE (90°) into the left RENAL VEIN → higher hydrostatic pressure → dilation. Right testicular vein drains obliquely into the IVC at lower pressure. More prominent STANDING (increased venous pressure), reduces SUPINE (venous drainage with gravity). Associated with male INFERTILITY from increased scrotal temperature impairing spermatogenesis. Screen at early adolescence; scrotal ultrasound; early treatment important."},

{mod:10,tag:'Female GU',vig:"A 65-year-old postmenopausal woman has a small, bright red, soft mass protruding from her urethral meatus. It bleeds when touched with a cotton swab.",stem:"What is this lesion, what causes it, and how is it distinguished from malignancy?",opts:["Genital herpes — requires antiviral therapy immediately","Urethral caruncle — a BENIGN mass at the urethral meatus caused by ESTROGEN DEFICIENCY and urethral atrophy in postmenopausal women; NOT malignant; bleeds on contact; treated with topical estrogen or surgical removal if symptomatic","Vaginal prolapse — requires pelvic floor physical therapy","Bartholin gland abscess — requires incision and drainage"],ans:1,rat:"URETHRAL CARUNCLE: small, deep red, BENIGN mass at the urethral meatus. Caused by ESTROGEN DEFICIENCY → urethral atrophy in postmenopausal women. Symptoms: dysuria, frequency, hematuria, dyspareunia, contact bleeding. NOT malignant — but the contact bleeding can alarm patients. Treatment: topical estrogen cream (treats the atrophy) or surgical removal if symptomatic. Distinguish from urethral carcinoma (rare, more irregular, may have obstructive symptoms). Key fact: most common in POSTMENOPAUSAL women."},

{mod:12,tag:'TUG / Fall Risk',vig:"A 78-year-old woman completes the Timed Get Up and Go (TUG) test in 23 seconds. During the test her steps are small and shuffling and she is unsteady when turning.",stem:"What does this score indicate and what do the qualitative observations suggest about the underlying cause?",opts:["23 seconds = normal for her age — no further evaluation needed","23 seconds = MODERATE fall risk (12–20 seconds) — advise a cane","23 seconds = HIGH fall risk (>20 seconds); shuffling steps and difficulty turning suggest PARKINSONISM or other basal ganglia/cerebellar disorder — further neurologic assessment is indicated","23 seconds = low fall risk — repeat TUG annually"],ans:2,rat:"TUG interpretation: <12 sec = low fall risk; 12–20 sec = MODERATE; >20 sec = HIGH fall risk. At 23 seconds = HIGH fall risk requiring fall prevention intervention. QUALITATIVE observations during TUG are clinically meaningful: shuffling small steps + difficulty turning = PARKINSONIAN GAIT pattern. The TUG provides both QUANTITATIVE (time) and QUALITATIVE (gait quality) data. Further neurologic assessment is indicated to evaluate for Parkinson's disease or other contributing neurologic conditions."},

{mod:12,tag:'CN Testing',vig:"You test cranial nerve function. For CN V testing you ask the patient to clench their teeth while you palpate the masseter muscles. For CN VII you ask the patient to raise their eyebrows, close their eyes tightly, smile, and puff their cheeks.",stem:"A patient has LEFT-sided facial droop affecting BOTH the upper face (cannot raise left eyebrow) AND lower face (left mouth droops). No limb weakness is noted. What type of lesion is this?",opts:["Central (UMN) lesion — stroke — spares the forehead because the upper face has bilateral cortical representation","PERIPHERAL (LMN) lesion (e.g., Bell's palsy) — affects ALL ipsilateral facial muscles including the FOREHEAD because the peripheral CN VII carries fibers to BOTH upper and lower face; the entire left CN VII is damaged","Contralateral cortical stroke — would produce right-sided weakness","Left CN V lesion — trigeminal nerve damage causes facial droop through sensory loss"],ans:1,rat:"FOREHEAD INVOLVEMENT is the KEY DIFFERENTIATOR. PERIPHERAL (LMN) lesion (Bell's palsy, Ramsay Hunt): the peripheral nerve carries fibers to ALL ipsilateral facial muscles including the forehead → BOTH upper AND lower face are affected on the same side. UMN lesion (stroke): FOREHEAD IS SPARED because the forehead muscles receive BILATERAL cortical representation — the intact contralateral hemisphere continues to innervate the forehead → only LOWER face weakness contralateral to the stroke. Rule: Forehead involved = PERIPHERAL. Forehead spared = CENTRAL."},

{mod:10,tag:'Incontinence',vig:"A nursing student asks the NP to explain the difference between functional incontinence and the other types.",stem:"A 78-year-old woman with severe arthritis is continent between bathroom trips but leaks urine because she cannot unbutton her pants quickly enough after walking slowly to the bathroom. She has no urge symptoms, no leakage with coughing, and her post-void residual is normal. What type of incontinence is this?",opts:["Stress incontinence — involuntary leakage with physical exertion","Overflow incontinence — bladder overdistension with constant dribbling","Urge incontinence — overactive detrusor causing sudden uncontrollable urge","Functional incontinence — the URINARY SYSTEM IS INTACT but the patient cannot reach the toilet in time due to PHYSICAL OR COGNITIVE BARRIERS (mobility impairment, arthritis, dementia, environmental barriers)"],ans:3,rat:"FUNCTIONAL INCONTINENCE: the urinary tract is FUNCTIONING NORMALLY but the patient cannot reach the toilet in time due to external barriers. Causes: mobility impairment (arthritis, Parkinson's, stroke), cognitive impairment (dementia — patient may not recognize the need to void), environmental barriers (bed rails, restraints, distance to bathroom). Key: no urge symptoms, no leakage with exertion, normal post-void residual — the problem is the PATHWAY to the bathroom, not the bladder. Management: environmental modifications, scheduled toileting, mobility aids."},

{mod:14,tag:'Documentation',vig:"A SOAP note reads: S — 'Patient appears anxious, BP 148/92, HR 102.' O — 'Patient reports substernal chest pressure for 2 hours, radiating to left arm, 8/10 pain, with diaphoresis and nausea.'",stem:"What documentation errors are present and how should this note be corrected?",opts:["The note is correctly formatted — vital signs and patient appearance can be placed in the Subjective section when observed by the NP","Two critical errors: (1) BP, HR, and NP-observed appearance belong in OBJECTIVE (clinician-measured data). (2) Patient-reported symptoms (chest pressure, radiation, severity, associated symptoms) belong in SUBJECTIVE. The S and O sections are REVERSED","The Plan section is too brief — it needs a differential diagnosis","Only the Assessment is missing — a diagnosis should be added to the Objective section"],ans:1,rat:"SOAP note documentation: SUBJECTIVE = what the PATIENT REPORTS (symptoms, history) — chest pressure, left arm radiation, 8/10 pain, diaphoresis, nausea. OBJECTIVE = what the CLINICIAN MEASURES or OBSERVES — BP 148/92, HR 102, anxious appearance, physical exam findings, EKG results. Vital signs are OBJECTIVE measurements taken by the provider. In this case the S and O sections are COMPLETELY REVERSED — a common documentation error. The NP should document: S: 'Patient reports substernal chest pressure…' O: 'BP 148/92, HR 102, patient appears anxious…'"},

{mod:14,tag:'Advance Directives',vig:"A 74-year-old woman with advanced COPD has a written advance directive clearly stating she does NOT want mechanical ventilation. Her oxygen saturation drops to 80% and she is increasingly lethargic. Her adult son (who is NOT designated as healthcare proxy) insists you intubate her.",stem:"What is the NP's correct ethical and legal obligation?",opts:["Honor the son's request — family members always supersede written advance directives","Honor the ADVANCE DIRECTIVE — do NOT intubate; explain to the son that his mother's written directive represents her legally binding wishes made with decision-making capacity; provide comfort-focused respiratory support; document thoroughly","Intubate temporarily and extubate once the ethics committee convenes","Await a physician's order before making any decision about the advance directive"],ans:1,rat:"A written advance directive (living will) is LEGALLY BINDING — it represents the patient's autonomous decision made WITH capacity. It takes PRECEDENCE over family requests. The son WITHOUT designated healthcare proxy authority does NOT have legal authority to override it. NP obligations: (1) HONOR the directive — do not intubate; (2) COMFORT care (high-flow O2, anxiolytics, opioids for air hunger, positioning); (3) RESPECTFULLY explain the framework to the son; (4) DOCUMENT thoroughly. Violating a valid advance directive constitutes battery and violates patient autonomy."},

{mod:12,tag:'Alzheimers vs Aging',vig:"A 78-year-old man's family reports a 2-year pattern of progressive forgetfulness. He recently forgot a conversation 5 minutes after it occurred and could not recall it later when prompted. He left a stove burner on and did not remember doing so. He asked what year it is.",stem:"Which features of this history represent ALZHEIMER'S DISEASE WARNING SIGNS rather than normal aging?",opts:["Occasionally forgetting where he put his keys — this is a warning sign requiring immediate neuropsychological testing","Forgetting recent conversations and being UNABLE TO RECALL THEM LATER (disrupts daily life), FUNCTIONAL IMPAIRMENT (stove incident — safety risk), TIME DISORIENTATION (not knowing the year), and PROGRESSIVE DETERIORATION over 2 years — these are Alzheimer's warning signs, NOT normal aging","Getting confused about the day of the week occasionally — most concerning AD sign in this history","All findings are consistent with normal aging in a 78-year-old"],ans:1,rat:"Normal aging: may forget but LATER REMEMBERS; misplaces things but can retrace steps; occasionally confused about day but figures it out. ALZHEIMER'S warning signs: (1) Forgetting recent conversations and UNABLE TO RECALL LATER even with prompting — disrupts daily life; (2) FUNCTIONAL IMPAIRMENT — cannot complete familiar tasks safely (stove incident); (3) TIME DISORIENTATION — not knowing the year; (4) PROGRESSIVE decline over 2 years. AD pathology: asymmetric atrophy of TEMPORAL and PARIETAL lobes, especially the HIPPOCAMPUS (memory consolidation). Assess with standardized cognitive screening tools (MMSE, MoCA)."},

{mod:13,tag:'Sports PPE',vig:"The purpose of the preparticipation physical evaluation (PPE) is reviewed during a clinical rotation. The supervising NP states the PPE is NOT primarily designed to exclude athletes from participation.",stem:"What is the PRIMARY purpose of the PPE and what component identifies the most problems?",opts:["The primary purpose is to exclude as many high-risk athletes as possible to protect schools from liability","The primary purpose is to IDENTIFY conditions that may predispose the athlete to injury or death — NOT to exclude; the MEDICAL HISTORY identifies approximately 75% of all problems and is the most important component of the PPE","The primary purpose is to screen for performance-enhancing drug use","The primary purpose is to document baseline fitness levels for insurance purposes"],ans:1,rat:"PPE PURPOSE: IDENTIFY (not exclude) athletes with conditions that may increase their risk of injury or death during participation. The goal is SAFE participation, not disqualification. KEY FACT: the MEDICAL HISTORY identifies approximately 75% of ALL problems discovered during the PPE — making thorough history-taking the single most important component. The targeted physical exam focuses on cardiac, musculoskeletal, and neurologic findings identified by history. Very few athletes are ultimately excluded; most can participate with modifications or treatment."},

{mod:11,tag:'DEXA',vig:"A 61-year-old woman with family history of osteoporosis, menopause at age 50, and BMI of 21 asks when she should have her first bone density scan.",stem:"Based on current guidelines, when should this patient have a DEXA scan, and what tool estimates fracture risk?",opts:["She should wait until age 70 — DEXA is only recommended for women ≥70 without prior fracture","All women should have a DEXA by age 65; women younger than 65 with additional risk factors (family history, early menopause at age 50, low BMI) should be screened EARLIER than 65. The FRAX ALGORITHM calculates 10-year fracture probability to guide treatment decisions","DEXA is only recommended after a fragility fracture has occurred","Annual DEXA scans should begin at menopause"],ans:1,rat:"DEXA guidelines: All women should have a DEXA by age 65. Women YOUNGER than 65 with risk factors — family history, early menopause (<45), low BMI, smoking, alcohol, steroid use, prior fragility fracture — should be screened EARLIER. This patient at 61 with family history AND early menopause (50) AND low BMI (21) has multiple risk factors and warrants earlier screening. The FRAX ALGORITHM (WHO Fracture Risk Assessment Tool) calculates 10-year probability of major osteoporotic fracture and hip fracture using clinical risk factors ± BMD, guiding treatment decisions."},

{mod:10,tag:'Bartholin/Herpes',vig:"During a pelvic exam of a 28-year-old woman you palpate a smooth, non-tender, 2 cm round swelling in the posterior right labia majora at the 5 o'clock position. No erythema or warmth is present.",stem:"How should this finding be interpreted and what is the palpation technique for assessing Bartholin glands?",opts:["Normal — Bartholin glands of this size are palpable in all reproductive-age women","ABNORMAL — Bartholin glands are NOT normally palpable; technique: place index finger INSIDE the vagina and thumb OUTSIDE at the 5 or 7 o'clock position of the posterior labia majora; any swelling even if non-tender is abnormal and warrants evaluation; a non-tender cyst may become infected (abscess)","Normal variant — Bartholin glands swell with sexual arousal and may be palpable for 24 hours","A urethral caruncle at the posterior labia — refer to urology"],ans:1,rat:"Bartholin glands are NEVER normally palpable. Any swelling = ABNORMAL. TECHNIQUE: index finger INSIDE vagina + thumb OUTSIDE at 5 and 7 o'clock positions of the POSTERIOR labia majora. A non-tender cyst = blocked duct with accumulated secretions → may become infected (abscess — very painful, fluctuant, erythematous, requiring incision and drainage). A non-tender Bartholin cyst warrants evaluation and close follow-up even without signs of infection."},

{mod:14,tag:'Pediatric Red Flags',vig:"A 7-year-old boy fell off his bike without a helmet. He lost consciousness briefly (about 45 seconds), is now alert and oriented but has a severe headache. He vomited twice. GCS is 14.",stem:"What combination of findings places this child at HIGH RISK for intracranial injury requiring IMMEDIATE CT scan and ED transfer?",opts:["Headache alone after head trauma — common and does not warrant CT unless it worsens","Loss of consciousness (even brief) + GCS <15 + post-traumatic vomiting (>1 episode = increased ICP) = HIGH-RISK indicators — IMMEDIATE CT head and ED transfer; do NOT discharge for home observation","The child is alert and oriented — CT is unnecessary regardless of other findings","Vomiting after head trauma is expected and does not change management"],ans:1,rat:"Pediatric head trauma RED FLAGS requiring CT evaluation (PECARN criteria): ANY loss of consciousness, GCS <15, post-traumatic vomiting (suggests elevated ICP), severe headache, amnesia, skull fracture on exam, high-impact mechanism (bicycle without helmet at speed), age <2. This child has MULTIPLE high-risk features: LOC + GCS 14 + vomiting. Ibuprofen is contraindicated in acute head trauma (bleeding risk). Do NOT discharge for home observation. IMMEDIATE CT head + ED transfer. The PECARN decision rule helps risk-stratify pediatric head trauma patients."},

{mod:10,tag:'Hypospadias vs Epispadias',vig:"During a newborn exam of a male infant you note that the urethral meatus opens on the VENTRAL (underside) surface of the glans penis. The foreskin appears as an incomplete 'hood' on the dorsal surface only.",stem:"What condition is present, what is important to tell the parents about circumcision, and when is surgical correction performed?",opts:["Epispadias — meatus on the dorsal surface; circumcision is safe to perform before repair","Hypospadias — urethral meatus on the VENTRAL surface; the FORESKIN MUST NOT BE REMOVED (it will be used for surgical reconstruction); surgical repair is best between ages 6–12 months","Normal variant — the meatus is always slightly ventral in newborn males","Phimosis — the foreskin is too tight; topical steroids will resolve this"],ans:1,rat:"HYPOSPADIAS: urethral meatus opens on the VENTRAL (under) side of the glans or shaft (1 in 150–300 baby boys — most common congenital penile disorder). Critical teaching: the FORESKIN is crucial for surgical reconstruction — CIRCUMCISION IS CONTRAINDICATED until after surgical repair. Surgical repair: best at ages 6–12 months. EPISPADIAS: meatus opens on the DORSAL (upper) surface — rare, more disabling because of associated urinary incontinence. Distinguish: hypospadias = ventral = COMMON. Epispadias = dorsal = RARE."},

{mod:12,tag:'Dermatomes',vig:"A 42-year-old construction worker reports numbness over his LEFT thumb and lateral forearm after a fall on his outstretched arm. Reflexes and motor strength are intact.",stem:"Which cervical nerve root dermatome corresponds to the thumb, and what is the clinical implication?",opts:["C8 — the little finger dermatomal level; disc herniation at C7-T1","C7 — the middle finger dermatomal level; disc herniation at C6-C7","C6 — the THUMB dermatomal level; indicates C6 nerve root compression most commonly from a herniated disc at the C5-C6 intervertebral level","T1 — the axilla dermatomal level; indicates brachial plexus injury"],ans:2,rat:"Key upper extremity dermatomes: C6 = THUMB (and lateral forearm, index finger), C7 = MIDDLE FINGER, C8 = LITTLE FINGER. Numbness over the thumb + lateral forearm = C6 dermatomal territory. Most common cause: C6 nerve root compression from herniated disc at C5-C6 interspace. C6 also mediates: biceps reflex, biceps strength, wrist extensor strength. Other landmarks: T1 = axilla, T4 = nipple, T10 = umbilicus, L1 = groin, L4 = knee, S1 = lateral foot/heel."},

{mod:11,tag:'Joint Types',vig:"An NP student asks for examples of fibrous, cartilaginous, and synovial joints to understand the difference between immovable, slightly movable, and freely movable joints.",stem:"Which correctly matches each joint type with its degree of movement and ONE clinical example?",opts:["Fibrous = freely movable (e.g., knee); Cartilaginous = immovable (e.g., skull sutures); Synovial = slightly movable (e.g., intervertebral discs)","Fibrous = IMMOVABLE (synarthrosis), e.g., skull sutures; Cartilaginous = SLIGHTLY MOVABLE (amphiarthrosis), e.g., intervertebral discs or pubic symphysis; Synovial = FREELY MOVABLE (diarthrosis), e.g., knee, shoulder, hip","All three joint types are freely movable — distinguished only by the material connecting the bones","Fibrous = slightly movable (e.g., hip); Synovial = immovable (e.g., skull); Cartilaginous = freely movable (e.g., vertebral discs)"],ans:1,rat:"JOINT TYPES: FIBROUS = united by fibrous connective tissue; IMMOVABLE (synarthrosis); examples: skull SUTURES, tooth sockets (gomphoses). CARTILAGINOUS = separated by fibrocartilage; SLIGHTLY MOVABLE (amphiarthrosis); examples: INTERVERTEBRAL DISCS, PUBIC SYMPHYSIS, manubriosternal joint. SYNOVIAL = enclosed in joint cavity with synovial membrane + synovial fluid; FREELY MOVABLE (diarthrosis); examples: KNEE, SHOULDER, HIP, elbow, wrist. Articular cartilage in synovial joints is AVASCULAR — nourished by synovial fluid during movement (not at rest)."},

{mod:14,tag:'EMTALA / Transfer',vig:"A rural urgent care receives a 58-year-old woman in acute respiratory distress. Oxygen saturation is 78%. The clinic has oxygen and a nurse but no mechanical ventilation or ICU capabilities.",stem:"What does EMTALA require in this situation, and what are the NP's obligations?",opts:["EMTALA prohibits transferring any unstable patient — the clinic must treat the patient until she stabilizes completely on her own","EMTALA requires: (1) STABILIZE the patient to the best of the current facility's ability (apply oxygen, IV access, address immediately reversible causes), (2) TRANSFER appropriately to a facility with the needed capabilities — benefits of transfer must outweigh the risks; receiving facility must accept; transport must match acuity (ALS ambulance or air transport)","EMTALA only applies to emergency departments — urgent care clinics are exempt","Call the receiving hospital and wait for a physician order before initiating any oxygen or treatment"],ans:1,rat:"EMTALA (Emergency Medical Treatment and Labor Act) requires: (1) STABILIZE — provide emergency treatment to stabilize the patient to the BEST OF THE SENDING FACILITY'S ABILITY before transfer. (2) APPROPRIATE TRANSFER — when the current facility lacks necessary capabilities, transfer to a higher-level facility is REQUIRED (not prohibited); benefits must outweigh risks; receiving facility must accept; transport must match acuity (ALS ambulance for this patient). EMTALA does NOT prohibit transferring unstable patients — it requires stabilization first, THEN appropriate transfer. All records and treatments given must accompany the patient."},

{mod:13,tag:'Sports PPE',vig:"A 17-year-old female basketball player is found to have a significant blood pressure DIFFERENCE between her right arm (BP 128/76) and left arm (BP 86/52) during her preparticipation physical evaluation.",stem:"What congenital condition should be suspected, and what additional physical examination finding would support this diagnosis?",opts:["Hypertrophic cardiomyopathy — confirmed by a dynamic murmur that increases with Valsalva","Coarctation of the aorta — a significant BP difference between arms AND DIMINISHED OR ABSENT FEMORAL PULSES would support the diagnosis; requires echocardiography and cardiology referral before sports clearance","Atrial septal defect — confirmed by a fixed split S2","Marfan syndrome — confirmed by arachnodactyly and high-arched palate"],ans:1,rat:"COARCTATION OF THE AORTA = congenital narrowing of the aortic arch creating obstruction to blood flow. A significant BP difference between arms (>10–15 mmHg systolic) AND DIMINISHED OR ABSENT FEMORAL PULSES = classic presentation. The AHA preparticipation screening specifically includes: bilateral arm BP and femoral pulse assessment for this reason. Classic pattern: HIGH BP in upper extremities, LOW BP in lower extremities. Requires echocardiography + cardiology referral before sports clearance. A missed coarctation can lead to aortic dissection during high-intensity exercise."},
];

let cur=0,sel=Array(50).fill(-1),sub=Array(50).fill(false),cor=Array(50).fill(false);

function render(){
  const q=Qs[cur],s=sel[cur],ca=q.ans,submitted=sub[cur];
  const opts=q.opts.map((o,i)=>{
    let c='opt';
    if(submitted){c+=' locked';if(i===ca)c+=' correct';else if(i===s&&s!==ca)c+=' wrong';}
    else if(i===s)c+=' sel';
    return `<div class="${c}" onclick="pick(${i})"><span class="ol">${'ABCD'[i]}.</span><span>${o}</span></div>`;
  }).join('');
  const rat=submitted?`<div class="rat ${s===ca?'ok':'ng'}"><div class="rat-lbl">${s===ca?'✓ Correct!':'✗ Incorrect — Correct answer: '+('ABCD'[ca])+'.'}</div>${q.rat}</div>`:'';
  const nav=`<div class="nav">
    <button class="btn" onclick="go(cur-1)" ${cur===0?'disabled':''}>← Back</button>
    ${!submitted?`<button class="btn primary" onclick="doSub()" ${s===-1?'disabled':''}>Submit answer</button>`:''}
    ${cur<49?`<button class="btn" onclick="go(cur+1)">Next →</button>`:''}
    ${cur===49&&submitted?`<button class="btn primary" onclick="results()">View final score →</button>`:''}
  </div>`;
  const done=sub.filter(Boolean).length,corr=cor.filter(Boolean).length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/50)*100)+'%';
  document.getElementById('qn').textContent=cur+1;
  document.getElementById('ac').textContent=done;
  document.getElementById('cc').textContent=corr;
  document.getElementById('qa').innerHTML=`<div class="card">
    <div class="qmeta"><span>Q${cur+1} of 50</span><span class="mtag">Mod ${q.mod}</span><span class="ftag">${q.tag}</span></div>
    ${q.vig?`<div class="vig">${q.vig}</div>`:''}
    <div class="stem">${q.stem}</div>
    ${opts}${rat}
  </div>${nav}`;
}

function pick(i){if(sub[cur])return;sel[cur]=i;render();}
function doSub(){if(sel[cur]===-1)return;sub[cur]=true;cor[cur]=(sel[cur]===Qs[cur].ans);render();}
function go(i){if(i<0||i>49)return;cur=i;render();}

function results(){
  const tot=cor.filter(Boolean).length,pct=Math.round((tot/50)*100);
  let grade='',gc='var(--red)';
  if(pct>=90){grade='A — Outstanding! Exam ready! 🎉';gc='var(--green)';}
  else if(pct>=80){grade='B — Good — review missed topics';gc='var(--teal)';}
  else if(pct>=70){grade='C — Passing — needs more review';gc='var(--gold)';}
  else{grade='Below passing — intensive review recommended';}
  const rv=Qs.map((q,i)=>{
    const ok=cor[i],ua=sel[i]>=0?'ABCD'[sel[i]]:'—';
    return `<div class="rv ${ok?'ok':'ng'}"><div class="rv-q">Q${i+1} [${q.tag}]: ${q.stem.substring(0,80)}...</div><div class="rv-d">Your answer: ${ua} · Correct: ${'ABCD'[q.ans]} · ${ok?'✓ Correct':'✗ Incorrect'}</div></div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('qa').innerHTML=`
    <div class="sc">
      <div class="sc-big" style="color:${gc}">${pct}%</div>
      <div class="sc-lbl">${tot} of 50 correct</div>
      <div class="sc-grade" style="color:${gc}">${grade}</div>
      <div class="sc-note">This set focused on Dr. Andelman's discussion board emphasis areas: prostate DRE, cerebral lobes, Broca's/Wernicke's, vertigo/CN VIII, shoulder ROM, articular vs. extra-articular disease, abnormal gaits, UMN vs. LMN, and infant MS exam.</div>
    </div>
    <div style="margin-bottom:1rem"><button class="btn" onclick="go(0)">← Review questions</button></div>
    ${rv}`;
}

render();
</script>
