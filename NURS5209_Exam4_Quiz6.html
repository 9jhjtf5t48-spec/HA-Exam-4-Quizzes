<script>
const Qs=[
// ── MODULE 10: FEMALE GU ──────────────────────────────────────────────────────
{mod:10,tag:'Tanner Staging',vig:"A mother brings her 9-year-old Black daughter for a well-child exam. On breast examination you palpate a small mound of glandular tissue with widened areola under the right nipple only. The left breast remains flat. No pubic hair is present.",stem:"How should you interpret these findings?",opts:["Precocious puberty requiring urgent endocrinology referral — no breast development should occur before age 10 in any child","Stage 2 breast development on the right with Stage 1 on the left — asymmetric breast development is NORMAL and EXPECTED during puberty; the mean age of Stage 2 onset in Black girls is 8.8 years, making this within normal limits","This finding represents a fibroadenoma requiring ultrasound and biopsy","Premature thelarche requiring suppression with hormonal therapy"],ans:1,rat:"ASYMMETRIC breast development is NORMAL and expected — one breast often buds before the other by weeks to months. Stage 2 = breast bud with small mound and widened areola. Mean age of Stage 2 onset by race: Black girls = 8.8 years (earliest), Latina = 9.2, White = 9.6, Asian = 9.9. A 9-year-old Black girl at Stage 2 is perfectly within normal limits. Premature thelarche = Stage 2 breast development WITHOUT other pubertal signs (no pubic hair, no menses) — it is a variant of normal, not an emergency. The threshold for evaluation is NO development by age 14–15."},

{mod:10,tag:'Tanner Staging',vig:"A 13-year-old girl asks when she should expect her first period. Her breast development shows an areola and nipple forming a secondary mound projecting above the level of the breast. Her pubic hair is coarse, curly, and spread over the mons pubis but has not yet reached the medial thighs.",stem:"What Tanner stage is she in for BOTH breast and pubic hair, and when should menarche be expected?",opts:["Stage 3 breast and Stage 3 pubic hair — menarche expected at Stage 5","Stage 4 breast and Stage 4 pubic hair — menarche typically occurs in Stage 3 or 4, just after the peak growth spurt; overall median age is 12.25 years — she may have already reached this or will soon","Stage 2 breast and Stage 3 pubic hair — menarche expected in 4–5 years","Stage 5 breast and Stage 4 pubic hair — menarche is overdue"],ans:1,rat:"STAGE 4 BREAST: areola and nipple form a SECONDARY MOUND above the breast level — the key Stage 4 feature. STAGE 4 PUBIC HAIR: coarse, curly, adult-type hair spread over mons pubis but NOT yet reaching medial thighs (Stage 5 = adult female triangle extending to medial thighs). Menarche occurs in Stage 3 or 4, just after peak growth velocity. Overall median age: 12.25 years. By race: Black 12.0, Latina 11.83, White 12.67, Asian 12.75. At 13 with Stage 4 development, menarche has likely occurred or is imminent."},

{mod:10,tag:'Female GU Abnormals',vig:"A 19-year-old woman presents with a 3-day history of painful bilateral vulvar lesions. She has fever, headache, and malaise. On exam you note bilateral clusters of small vesicles on the labia, some already eroded to shallow ulcers with surrounding erythema. Bilateral inguinal lymph nodes are tender.",stem:"Which feature of this presentation is MOST characteristic of HSV-2 and helps distinguish it from primary syphilis?",opts:["A single painless indurated ulcer that can be lifted between thumb and forefinger like a button — characteristic of both HSV-2 and syphilis","BILATERAL, PAINFUL clusters of vesicles progressing to ulcers with tender inguinal lymphadenopathy and systemic symptoms (fever, malaise) — HSV-2 is painful, bilateral, and associated with systemic illness on primary infection","Painless, soft, flat-topped papules in clusters around the genitalia — characteristic of HPV","A posterior labial fluctuant mass at the 5 o'clock position — Bartholin gland abscess"],ans:1,rat:"HSV-2 vs. syphilis: HSV-2 primary infection = BILATERAL, PAINFUL vesicles → ulcers + TENDER inguinal lymphadenopathy + systemic flu-like symptoms (fever, headache, malaise). Syphilitic chancre = SINGLE, PAINLESS, indurated ulcer with NONTENDER inguinal lymphadenopathy + NO systemic symptoms. Both can coexist. The bilateral painful vesicles + systemic symptoms are pathognomonic for primary HSV-2. Recurrence: virus stays dormant in dorsal root ganglia; symptomatic recurrence in ~70–90% in year 1."},

{mod:10,tag:'Incontinence',vig:"A 62-year-old woman reports that she leaks a large amount of urine every time she gets an intense, sudden urge to void. She cannot hold her urine long enough to reach the bathroom. She has no leakage with coughing or sneezing.",stem:"Which type of incontinence does this represent, and what is the underlying pathophysiology?",opts:["Stress incontinence — weakened urethral sphincter from pelvic floor muscle weakness","Urge incontinence — OVERACTIVE DETRUSOR MUSCLE causing uninhibited bladder contractions; the bladder contracts before the patient can reach the bathroom; treated with bladder retraining and/or anticholinergic medications","Overflow incontinence — chronic bladder overdistension causing constant dribbling","Functional incontinence — mobility or cognitive barriers preventing timely toileting"],ans:1,rat:"URGE INCONTINENCE = overactive bladder/detrusor. Pathophysiology: uninhibited detrusor contractions → sudden, intense, uncontrollable urge → LARGE VOLUME leakage before reaching the bathroom. No leakage with physical strain (distinguishes from stress). Causes: idiopathic (most common), neurologic disease (stroke, MS, Parkinson's), bladder irritants (caffeine, alcohol, infection). Treatment: bladder retraining (timed voiding), pelvic floor exercises, anticholinergics (oxybutynin), beta-3 agonists (mirabegron)."},

{mod:10,tag:'BSE Technique',vig:"During a well-woman exam, the NP teaches a 38-year-old patient how to perform breast self-examination while lying down.",stem:"Which instructions correctly describe the SUPINE BSE technique?",opts:["Lie flat on your back with both arms at your sides; use your fingernails to feel for lumps moving in a circular pattern","Place a pillow under the shoulder of the breast being examined and raise that arm over your head to flatten the tissue; use the PADS of the first 3 fingers with rotary motion varying light, medium, and deep pressure; use the vertical strip pattern moving from the axilla to the sternal edge in overlapping lines","Sit upright and press both hands into the hips before palpating each breast quadrant","Use your palm to press the breast firmly against the chest wall in a sweeping motion from the nipple outward"],ans:1,rat:"SUPINE BSE technique: (1) PILLOW under the ipsilateral shoulder to flatten breast tissue and displace it medially. (2) Raise arm over HEAD (same side as breast being examined). (3) PADS of first 3 fingers — not fingertips or nails. (4) ROTARY MOTION — vary pressure from light (superficial) to medium to deep at each location. (5) VERTICAL STRIP PATTERN (preferred): start high in the axilla, move down to the bra line, then medially in overlapping strips to the sternal edge. Cover every square inch including the tail of Spence into the axilla."},

{mod:10,tag:'Breast Lumps',vig:"A 45-year-old woman has a 2.5 cm breast mass at the 10 o'clock position, 3 cm from the nipple. It is stony hard, has irregular poorly defined borders, is fixed to the underlying tissue, and is nontender.",stem:"Using the BREAST acronym and lump characteristics, which features are MOST concerning for malignancy?",opts:["Nontender, mobile, smooth borders — the most concerning features for cancer","HARD consistency + IRREGULAR poorly defined borders + FIXED to underlying tissue = the classic triad of malignant features; the acronym BREAST identifies advanced cancer signs: Breast mass, Retraction, Edema, Axillary mass, Scaly nipple, Tender breast","Round shape + soft consistency + freely mobile = malignant features","Size alone (>2 cm) is the most reliable indicator of malignancy"],ans:1,rat:"Malignant breast lump characteristics: HARD (stony, dense) + IRREGULAR poorly defined borders + FIXED to underlying tissues or skin = classic triad of invasive cancer. The BREAST acronym lists signs of MORE ADVANCED cancer: Breast mass, Retraction (skin/nipple), Edema (peau d'orange), Axillary mass (nodal involvement), Scaly nipple (Paget disease), Tender breast. Contrast with BENIGN: rubbery/soft, smooth well-defined borders, FREELY MOVABLE (fibroadenoma = 'slippery'; fibrocystic = 'water balloon')."},

{mod:10,tag:'Male GU',vig:"During a scrotal exam, a 19-year-old male's LEFT testis is found to be HIGHER than the right, positioned almost horizontally. The cremasteric reflex is ABSENT on the left. He reports the pain began suddenly 3 hours ago while sleeping and rates it 10/10.",stem:"The NP correctly identifies this as a surgical emergency. Which additional finding distinguishes testicular torsion from epididymitis WITHOUT the need for imaging?",opts:["Positive Prehn sign — elevating the scrotum RELIEVES pain = torsion","Negative Prehn sign — elevating the scrotum does NOT relieve pain (in contrast to epididymitis where elevation RELIEVES pain = positive Prehn sign); the absent cremasteric reflex alone has high sensitivity for torsion","Fever above 38°C and pyuria on urinalysis = torsion","A 'bag of worms' feel to the spermatic cord = torsion"],ans:1,rat:"DISTINGUISHING TORSION from EPIDIDYMITIS: Torsion: ABSENT cremasteric reflex (highly sensitive), NEGATIVE Prehn sign (elevation does NOT relieve pain), sudden severe onset, NO fever, HIGH-RIDING testis, often during sleep. Epididymitis: POSITIVE Prehn sign (elevation RELIEVES pain), gradual onset, often WITH fever, WBC and bacteria in urine. The cremasteric reflex is the MOST IMPORTANT bedside distinguishing test — absent in torsion. Torsion is a surgical emergency: testis may become gangrenous within hours. Do NOT delay imaging if clinical picture strongly suggests torsion."},

{mod:10,tag:'Phimosis/Paraphimosis',vig:"A 25-year-old uncircumcised male presents to urgent care with a swollen, painful glans penis. His partner retracted his foreskin during sexual activity 4 hours ago and it has not returned to its normal position. The glans is markedly swollen and the foreskin forms a tight constricting ring behind the corona.",stem:"What is this emergency condition and why is IMMEDIATE reduction critical?",opts:["Phimosis — the foreskin opening is too narrow to retract over the glans; treat with topical steroids","Paraphimosis — the retracted foreskin CANNOT return to its original position; the constricting band prevents venous and lymphatic return → progressive glans swelling → potential arterial compromise and gangrene; requires IMMEDIATE manual reduction or emergency dorsal slit","Balanitis — inflammation of the glans; treat with antifungal cream","Priapism — prolonged painful erection; managed with aspiration of corpora cavernosa"],ans:1,rat:"PARAPHIMOSIS = the retracted foreskin becomes FIXED behind the glans and CANNOT return forward. The constricting band progressively impairs venous and lymphatic drainage → glans SWELLS → edema makes reduction harder → eventually arterial compromise → GANGRENE. MEDICAL EMERGENCY. Treatment: (1) Manual reduction: compress glans firmly for several minutes to reduce edema, then push glans back through foreskin. (2) Dorsal slit or emergency circumcision if manual reduction fails. Do NOT delay. Contrast with PHIMOSIS: foreskin cannot retract over glans (non-retractable) — NOT an emergency unless causing urinary obstruction."},

{mod:10,tag:'Race/Ethnicity Puberty',vig:"During a 10-year-old Hispanic girl's well-child exam, her mother is concerned because her daughter has begun developing pubic hair and breast buds. The mother states she did not start puberty until age 13.",stem:"Which statement BEST addresses the mother's concern using evidence-based knowledge of puberty timing across race and ethnicity?",opts:["The mother is right to be concerned — puberty before age 13 in any child requires immediate endocrinology referral","Puberty timing has a GENETIC and RACIAL/ETHNIC component; mean age of Stage 2 breast onset for Hispanic/Latina girls is 9.2 years; this 10-year-old is within normal limits; the threshold for evaluation is NO development by age 14–15","All girls should begin puberty at the same age — variations are always pathologic","Obesity alone explains early puberty; recommend dietary changes and return in 6 months"],ans:1,rat:"Puberty timing has strong racial/ethnic variation. Mean age of Stage 2 breast onset: BLACK 8.8 years (earliest), LATINA 9.2 years, WHITE 9.6 years, ASIAN 9.9 years (latest). A 10-year-old Latina girl at Stage 2 is perfectly within normal limits. The clinically meaningful threshold is NO secondary sex characteristics by age 14–15 (delayed puberty). Obesity is associated with earlier puberty onset across all groups — but is not the sole cause. The mother's own later puberty (age 13) reflects her individual genetics, not a universal standard."},

{mod:10,tag:'Developmental Competence GU',vig:"A 72-year-old postmenopausal woman presents for a pelvic exam. On inspection the labia majora appear flattened with less subcutaneous fat. The vaginal mucosa looks pale and dry, with loss of the normal rugae. The vaginal vault appears shortened.",stem:"These findings are MOST consistent with which normal physiologic change, and what complication do they predispose this patient to?",opts:["These are signs of vaginal cancer — immediate biopsy is required","These are normal postmenopausal changes from ESTROGEN DEFICIENCY: glandular tissue atrophy, loss of vaginal rugae, pale dry mucosa, shortened vault, alkaline pH — these changes predispose to dyspareunia, vaginal trauma, and INCREASED UTI RISK from thinned epithelium and alkaline pH","These findings indicate pelvic inflammatory disease — treat with antibiotics","These are normal findings at any age and require no further discussion"],ans:1,rat:"POSTMENOPAUSAL vaginal changes from estrogen deficiency: (1) Labia flatten and lose subcutaneous fat; (2) Vaginal mucosa: PALE, DRY, loss of rugae; (3) Vaginal vault shortens and narrows; (4) Vaginal pH becomes ALKALINE (normally acidic in reproductive years — the alkaline shift increases UTI risk); (5) Bartholin glands atrophy and produce less lubrication. Clinical implications: dyspareunia, vaginal trauma with minimal friction, INCREASED UTI RISK (thin epithelium + alkaline pH favors bacterial colonization). Treatment: topical vaginal estrogen, lubricants. Any postmenopausal vaginal BLEEDING requires immediate workup."},

// ── MODULE 11: MUSCULOSKELETAL ────────────────────────────────────────────────
{mod:11,tag:'Shoulder Exam',vig:"A 58-year-old right-handed painter presents with right shoulder pain for 3 months. He reports the pain is SPECIFICALLY reproduced when you ask him to elevate his arm between 60° and 120° of abduction. Below and above that arc, he has no pain.",stem:"What is this finding called, what structure is most likely involved, and what specific test confirms the diagnosis?",opts:["Full ROM limitation — arthritis of the glenohumeral joint affecting all planes equally","PAINFUL ARC (60°–120°) — classic sign of SUBACROMIAL IMPINGEMENT or rotator cuff pathology; the supraspinatus tendon is compressed between the humeral head and acromion in this range; the EMPTY CAN TEST (Jobe test): arm at 90° abduction, 30° forward flexion, internal rotation — thumbs down like emptying a can — weakness or pain = supraspinatus tear","Drop arm test alone confirms the diagnosis — no additional testing needed","Negative findings — pain with motion is always normal in a 58-year-old overhead worker"],ans:1,rat:"PAINFUL ARC = pain specifically between 60°–120° of shoulder abduction = hallmark of SUBACROMIAL IMPINGEMENT or supraspinatus pathology. The supraspinatus tendon runs through the subacromial space — it is compressed in this range between the greater tubercle and the acromion. EMPTY CAN TEST (Jobe): arm abducted 90°, 30° forward flexion, INTERNALLY ROTATED (thumbs pointing DOWN like emptying a can) — weakness or pain = positive = supraspinatus tear. DROP ARM TEST: arm passively abducted then released — inability to hold the position = complete rotator cuff tear."},

{mod:11,tag:'Special Tests',vig:"You are conducting an orthopedic sports physical for a 16-year-old male football player. To screen the knee you perform the McMurray test: supine, flex the hip and knee, EXTERNALLY rotate the tibia, apply valgus stress, and slowly extend the knee. You hear and feel a click at 30° of extension.",stem:"What does this positive McMurray test indicate and which meniscus is being tested with EXTERNAL tibial rotation?",opts:["Positive for ACL tear — the Lachman test is the same as McMurray","Positive for MEDIAL MENISCUS tear — external rotation of the tibia during extension stresses the MEDIAL meniscus; a palpable or audible click (or pain at the medial joint line) = positive McMurray for medial meniscus tear; refer to orthopedics for MRI","Positive for lateral meniscus tear — external rotation always tests the lateral meniscus","Positive for MCL tear — valgus stress tests the medial collateral ligament"],ans:1,rat:"McMURRAY TEST: EXTERNAL tibial rotation + valgus stress + knee extension = tests the MEDIAL meniscus (the medial meniscus is compressed and stressed with external rotation). INTERNAL tibial rotation + varus stress = tests the LATERAL meniscus. Positive = palpable/audible CLICK or pain at the joint line. This patient has a positive medial meniscus McMurray. Management: refer to orthopedics; MRI is gold standard. Ottawa Knee Rules determine if X-ray is needed first (age ≥55, patellar/fibular head tenderness, cannot flex to 90°, cannot bear weight 4 steps)."},

{mod:11,tag:'Arthritis',vig:"A 55-year-old woman has symmetric, warm, BOGGY swelling of the MCPs and PIPs of both hands bilaterally. She has morning stiffness lasting 2 hours and is fatigued. X-ray shows periarticular erosions. Lab: RF positive, anti-CCP positive, elevated CRP.",stem:"Which of the following correctly identifies her condition AND differentiates it from osteoarthritis?",opts:["Osteoarthritis — Heberden nodes at DIP joints, morning stiffness <30 minutes, no systemic features, asymmetric","Rheumatoid Arthritis — SYMMETRIC MCP and PIP involvement (NOT DIP), warm BOGGY swelling, morning stiffness >1 HOUR, systemic features (fatigue, fever, weight loss), RF and anti-CCP positive, periarticular erosions on X-ray; OA has Heberden (DIP) and Bouchard (PIP) HARD BONY nodes, stiffness <30 minutes, no systemic features","Psoriatic arthritis — always involves the spine","Gout — elevated uric acid with asymmetric MTP joint involvement"],ans:1,rat:"RA vs. OA HIGH-YIELD COMPARISON: RA: SYMMETRIC MCP/PIP (NOT DIP), BOGGY soft swelling, stiffness >1 HOUR, systemic features, RF+/anti-CCP+, X-ray erosions. OA: ASYMMETRIC, DIP joints (Heberden nodes) and PIP (Bouchard nodes) HARD BONY osteophytes, stiffness <30 MINUTES ('gelling'), no systemic features, RF negative, X-ray shows osteophytes and joint space narrowing. The warm BOGGY (synovial fluid) swelling vs. HARD BONY (osteophyte) swelling is the key physical exam distinguisher."},

{mod:11,tag:'Ankle/Foot',vig:"A 47-year-old obese male runner presents with right heel pain that is WORST WITH HIS FIRST STEPS IN THE MORNING and improves after walking for 10–15 minutes. Point tenderness is maximal at the MEDIAL PLANTAR HEEL. He has no swelling or erythema.",stem:"What is the diagnosis, what is the underlying anatomic structure involved, and what is first-line management?",opts:["Achilles tendinitis — tenderness at the posterior heel insertion of the Achilles tendon; treat with rest and NSAIDs","Plantar fasciitis — the plantar fascia (band extending from medial tubercle of heel to metatarsal heads) is inflamed from repetitive microtrauma; WORST WITH FIRST STEPS IN THE MORNING (after rest, fascia tightens); point tenderness at PLANTAR MEDIAL HEEL; first-line: REST, NSAIDs/steroids, calf stretching, orthotics, night splints; self-limiting (6–12 months)","Acute gout — asymmetric first MTP joint with hyperuricemia","Stress fracture — requires X-ray or MRI; constant pain not worse with first steps"],ans:1,rat:"PLANTAR FASCIITIS: Most frequent cause of heel pain. The plantar fascia = band of connective tissue from MEDIAL TUBERCLE of the heel to the metatarsal heads and proximal phalanges. Inflammation from repetitive microtrauma ('dying back' degeneration). Classic history: WORST WITH FIRST STEPS IN THE MORNING or after periods of rest (fascia shortens during rest, is stretched with first weight-bearing). Improves with activity then worsens again. Point tenderness at PLANTAR MEDIAL HEEL. Risk factors: obesity, high arch, running, prolonged standing on hard floors. Self-limiting but may take 6–12 months."},

{mod:11,tag:'Osteoporosis',vig:"A 67-year-old woman with no prior fractures asks about her bone health. She is White, 5'2\", 118 lbs, went through menopause at age 48, smokes half a pack per day, and drinks 2 glasses of wine nightly.",stem:"Which of her risk factors MOST significantly increase her fracture risk beyond her age, and what TWO tools are used to screen and guide treatment?",opts:["Her weight is the only significant risk factor; DEXA is the only tool needed","Multiple compounding risk factors: early menopause (age 48 = before 50), low body weight, smoking, alcohol use — all INCREASE fracture risk; DEXA (bone mineral density) measures bone density; FRAX ALGORITHM combines clinical risk factors ± BMD to calculate 10-year fracture probability and GUIDE TREATMENT DECISIONS (treat if 10-year hip fracture risk ≥3% or major osteoporotic fracture ≥20%)","Age alone is the only factor that matters for osteoporosis screening","DEXA should be delayed until age 70 regardless of risk factors"],ans:1,rat:"This patient has MULTIPLE osteoporosis risk factors beyond age: (1) EARLY MENOPAUSE at 48 (estrogen loss before 50 significantly accelerates bone loss); (2) LOW BODY WEIGHT/BMI (less mechanical loading, less adipose estrogen); (3) SMOKING (impairs bone formation, accelerates estrogen metabolism); (4) ALCOHOL (>2 drinks/day impairs osteoblast function). She should be screened with DEXA NOW (well before 65 due to multiple risk factors). FRAX algorithm: uses clinical risk factors ± BMD to calculate 10-year probability of major osteoporotic fracture and hip fracture → guides treatment threshold decisions."},

{mod:11,tag:'Hip Exam',vig:"During an infant exam at the 2-month well visit, you flex the infant's hips and knees to 90° and gently abduct the hips. You feel the RIGHT hip clunk back into the acetabulum.",stem:"What maneuver was performed, what does the clunk indicate, and what distinguishes this from the Barlow maneuver?",opts:["Barlow maneuver — the clunk indicates the hip is BEING DISLOCATED; performed with adduction and posterior pressure","Ortolani maneuver — the clunk indicates REDUCTION of a dislocated hip back into the acetabulum during ABDUCTION; Barlow tests if the hip CAN BE dislocated (adduction + posterior pressure → clunk = hip comes OUT); Ortolani tests if the hip IS dislocated and CAN BE REDUCED (abduction → clunk = hip goes BACK IN); both = DDH; refer to pediatric orthopedics","Galeazzi test — unequal knee heights indicating leg-length discrepancy","Thomas test — hip flexion contracture assessment"],ans:1,rat:"ORTOLANI vs. BARLOW — the most important infant hip distinction: ORTOLANI: ABDUCT the hip → 'clunk' = dislocated femoral head being REDUCED back into acetabulum (hip was OUT, now goes IN). The hip was dislocated. BARLOW: ADDUCT the hip + posterior pressure → 'clunk' = femoral head being DISLOCATED out of acetabulum (hip goes OUT). Tests instability/dislocatability. BOTH positive = DDH requiring pediatric orthopedics referral. Dr. Andelman emphasized performing at EVERY visit until 1 year. Pavlik harness if caught early. Untreated DDH → limp, leg-length discrepancy, early hip OA."},

// ── MODULE 12: NEUROLOGIC ─────────────────────────────────────────────────────
{mod:12,tag:'CN Testing',vig:"A 55-year-old woman is referred for evaluation of eye movement abnormalities. When you ask her to look to her RIGHT, her LEFT eye abducts normally but her RIGHT eye FAILS TO ADDUCT. The right eye remains in its resting position. Her left eye shows nystagmus during the movement.",stem:"What is this finding, what structure is damaged, and on which SIDE?",opts:["Left CN VI palsy — the left eye cannot abduct on rightward gaze","RIGHT medial longitudinal fasciculus (MLF) lesion — internuclear ophthalmoplegia (INO); the right MLF normally connects the left CN VI nucleus to the right CN III nucleus to coordinate rightward gaze; when the right MLF is damaged, the right eye cannot adduct during rightward gaze while the left eye abducts normally with compensatory nystagmus","Left CN III palsy — the left eye cannot adduct on rightward gaze","Right CN VI palsy — the right eye cannot abduct on rightward gaze"],ans:1,rat:"INTERNUCLEAR OPHTHALMOPLEGIA (INO): the RIGHT MLF connects the LEFT CN VI nucleus → RIGHT CN III nucleus for rightward CONJUGATE gaze. When the RIGHT MLF is damaged: rightward gaze command → left eye abducts ✓, but signal cannot cross to right CN III nucleus → right eye FAILS TO ADDUCT ✗. The abducting left eye develops nystagmus (compensatory overshoot). INO = hallmark of MS in young adults and brainstem stroke in older adults. Bilateral INO in a young person = STRONGLY suggests MS. Remember: the MLF ipsilateral to the adducting (failing) eye is the damaged structure."},

{mod:12,tag:'Sensory Testing',vig:"A 60-year-old with a 20-year history of poorly controlled type 2 diabetes reports numbness that started in both feet and has gradually moved up to his knees over the past 5 years. His ankle reflexes are absent bilaterally.",stem:"What is the neurologic pattern of sensory loss, what causes the distal-to-proximal progression, and what is the FIRST tendon reflex typically lost in peripheral neuropathy?",opts:["Dermatomal pattern — L4-L5 radiculopathy from bilateral disc herniation — the patellar reflex is first lost","Stocking-and-glove peripheral neuropathy — affects the LONGEST nerves first (dying back from distal to proximal); diabetic neuropathy is the most common cause; the ACHILLES (ankle) tendon reflex (S1-S2) is typically the FIRST reflex lost because it is mediated by the longest pathways","Hemisensory loss — cortical stroke affecting contralateral side — patellar reflex is first lost","Brown-Séquard syndrome — spinal cord hemisection with contralateral pain/temperature loss"],ans:1,rat:"PERIPHERAL NEUROPATHY (stocking-and-glove pattern): affects nerves by LENGTH — longest nerves die back first → starts at FEET (longest nerves), progresses PROXIMALLY to knees, thighs, then hands/fingertips. Causes: diabetes (#1), alcohol, B12 deficiency, chemotherapy, hypothyroidism. The ACHILLES TENDON REFLEX (ankle jerk, S1-S2) is mediated by the S1 nerve root via the longest pathways and is the FIRST reflex lost in peripheral neuropathy. This patient's absent ankle reflexes bilaterally + stocking distribution + 20 years of poorly controlled DM = classic diabetic peripheral neuropathy."},

{mod:12,tag:'Pathologic Reflexes',vig:"You are testing an adult patient's reflexes. When you stroke the lateral aspect of the sole of the foot and across the ball, the patient's great toe extends UPWARD and the other toes fan out.",stem:"What is this reflex called, what does it indicate in an adult, and what is the normal adult response?",opts:["Normal plantar reflex — upgoing toe and fanning is the expected adult response","POSITIVE BABINSKI SIGN (extensor plantar response) — in adults this indicates UPPER MOTOR NEURON (corticospinal tract) disease; NORMAL adult response = PLANTAR FLEXION of ALL toes (downgoing); the Babinski sign is NORMAL in infants up to 12–24 months (immature corticospinal tract) but ABNORMAL in adults","Kernig's sign — indicates meningeal irritation when the knee cannot be extended with the hip flexed","Brudzinski's sign — indicates meningeal irritation when flexing the neck causes hip and knee flexion"],ans:1,rat:"BABINSKI SIGN: Test — stroke lateral sole and across ball of foot. POSITIVE = dorsiflexion (extension upward) of great toe + FANNING of other toes = 'extensor plantar response.' In ADULTS = abnormal = indicates UPPER MOTOR NEURON (corticospinal/pyramidal tract) disease — stroke, MS, spinal cord injury, ALS. In INFANTS up to 12–24 months = NORMAL (immature corticospinal tract). Normal adult response = PLANTAR FLEXION (downgoing) of all toes. Other pathologic reflexes: Oppenheim (press anterior tibia), Gordon (squeeze calf), Hoffmann (flick middle finger nail) — all produce same extensor response = same UMN significance."},

{mod:12,tag:'Alzheimers',vig:"A 75-year-old retired engineer's wife states: 'He occasionally forgets where he put his glasses but always finds them later. He forgot our grandson's birthday last week but remembered it the next day when I mentioned it. He does still drive, manage his finances, and cook his own meals without any safety incidents.'",stem:"Based on this history, how should the NP categorize these findings?",opts:["These findings are consistent with Alzheimer's disease — forgetting any event is abnormal and requires immediate neuropsychological testing","These findings are CONSISTENT WITH NORMAL AGING: occasionally forgetting but LATER REMEMBERING, forgetting events but recalling with a PROMPT — these are benign memory lapses that do NOT disrupt daily function; no safety incidents, intact instrumental ADLs (driving, finances, cooking) support normal aging rather than dementia","Normal aging never involves any memory lapses — all memory problems are pathological","This patient has Lewy body dementia based on the driving behavior"],ans:1,rat:"NORMAL AGING vs. ALZHEIMER'S — critical distinction: NORMAL AGING: occasionally forget but LATER REMEMBER (the information is encoded, just needs retrieval cues); forget events but RECALL WITH PROMPTING; functional ADLs INTACT (driving, finances, cooking, safety). ALZHEIMER'S: forget and CANNOT RECALL EVEN WITH PROMPTING; functional IMPAIRMENT (safety incidents, cannot complete familiar tasks); time/place disorientation; progressive decline over months to years. This patient can be reassured with normal aging explanation, standard cognitive screening, and a plan to reassess periodically."},

{mod:12,tag:'UMN/LMN',vig:"A 44-year-old man develops left-sided foot weakness after a disc herniation at L4-L5. He has absent left patellar reflex, significant LEFT quadriceps muscle atrophy with visible wasting, and fasciculations of the left quadriceps. His Babinski sign is absent.",stem:"These findings indicate what type of lesion, and which features confirm this?",opts:["Upper motor neuron lesion — the absent patellar reflex and muscle wasting confirm UMN pathology","LOWER MOTOR NEURON (LMN) lesion — FLACCID weakness, ABSENT reflex (hyporeflexia/areflexia), SIGNIFICANT MUSCLE ATROPHY, and FASCICULATIONS are the four hallmarks of LMN disease; NO Babinski sign (Babinski is a UMN sign); LMN lesions affect specific muscles served by the damaged nerve root or peripheral nerve","This is a UMN lesion — disc herniation always causes upper motor neuron findings","Both UMN and LMN lesions cause identical findings — the level of the lesion determines management"],ans:1,rat:"LMN LESION hallmarks (the 4 F's and an A): FLACCID (decreased tone), HYPOREFLEXIA/AREFLEXIA, ATROPHY (marked, may be significant), FASCICULATIONS, and NO Babinski sign. L4-L5 disc herniation compresses the L4 nerve root → LMN lesion → affects specific muscles (quadriceps, hip flexors) served by L4. UMN lesion: SPASTIC (increased tone), HYPERREFLEXIA + clonus, minimal atrophy (disuse only), NO fasciculations, POSITIVE Babinski. This disc herniation case = classic LMN — all 4 LMN hallmarks are present and Babinski is absent."},

{mod:12,tag:'Frontal Release Signs',vig:"An 82-year-old woman with advanced Alzheimer's disease undergoes neurologic testing. When you gently tap the region around her mouth, she puckers her lips involuntarily. When you touch her palm with your finger, she grips it tightly without being able to release voluntarily.",stem:"What signs are being demonstrated and what do they indicate?",opts:["Kernig's and Brudzinski's signs — indicates meningeal irritation from meningitis","SNOUT REFLEX (lip puckering with perioral percussion) and GRASP REFLEX (uncontrolled grasping on palmar stimulation) are FRONTAL RELEASE SIGNS — primitive reflexes that re-emerge with FRONTAL LOBE DISEASE or cerebral degenerative conditions (Alzheimer's, ALS, corticobulbar lesions); the grasp reflex is typically the LAST to appear indicating the most advanced disease","These are normal reflexes in elderly adults over 80","Positive Babinski and Hoffmann signs — upper motor neuron disease"],ans:1,rat:"FRONTAL RELEASE SIGNS = primitive reflexes that re-emerge when the frontal lobes are damaged (the frontal lobes normally inhibit these reflexes): SNOUT REFLEX: gently percuss oral region → lips pucker = frontal lobe disease, cerebral degenerative disease (Alzheimer's), ALS, corticobulbar lesions. SUCKING REFLEX: touch oral region → sucking movements of lips, tongue, jaw. GRASP REFLEX: touch palm → uncontrolled forced grasping (last to appear = most severe disease). When BILATERAL = diffuse bifrontal lobe disease. When UNILATERAL = contralateral frontal lobe lesion. All three signs indicate frontal lobe pathology."},

// ── MODULE 13: SPORTS PHYSICALS ───────────────────────────────────────────────
{mod:13,tag:'Sports PPE Cardiac',vig:"During a preparticipation physical for an 18-year-old male basketball player, the NP asks about personal and family cardiac history. He reports his uncle died suddenly at age 32 during a recreational basketball game. The patient himself has had one episode of exercise-induced syncope that resolved spontaneously.",stem:"Which combination of history findings warrants IMMEDIATE cardiology referral and disqualification from participation PENDING evaluation?",opts:["A family history of cardiac disease in a relative over 50 and mild exercise-induced dizziness — common findings; clear for participation","Exercise-induced SYNCOPE + family history of SUDDEN DEATH IN A YOUNG RELATIVE (<50) = two of the highest-risk red flags on the AHA PPE cardiac screening history; do NOT clear for participation; refer to cardiology for ECG and echocardiogram to rule out HCM, arrhythmia syndromes (long QT, Brugada), and anomalous coronary arteries","Exercise-induced syncope alone is a normal variant in trained athletes","Family history of cardiac disease only requires dietary counseling"],ans:1,rat:"AHA PPE HIGH-RISK CARDIAC HISTORY ITEMS include: (1) EXERCISE-INDUCED SYNCOPE — fainting during exercise (vs. after = more benign) is a red flag for HCM, arrhythmia, or coronary anomaly; (2) FAMILY HISTORY of PREMATURE SUDDEN DEATH in a relative <50 = suggests genetic cardiac condition (HCM, arrhythmia syndrome, Marfan syndrome with aortic dissection). BOTH present = DO NOT CLEAR. Refer for: 12-lead ECG (may show LVH, delta waves, prolonged QTc), echocardiogram (HCM = asymmetric septal hypertrophy). HCM = #1 cause of sudden cardiac death in young athletes. Anomalous coronary arteries = #2 cause."},

{mod:13,tag:'Sports PPE MSK',vig:"During the musculoskeletal screening portion of a sports physical, the NP performs the 'duck walk' test: the athlete walks toward the examiner in a crouched squat position while rotating outward.",stem:"What joint and condition does the duck walk screen for, and what finding constitutes a positive test?",opts:["Shoulder instability — a positive test shows apprehension with arm abduction","HIP pathology and KNEE meniscal/cartilage pathology — a positive test = PAIN or INABILITY to perform the duck walk; inability suggests significant hip, knee, or ankle pathology requiring further orthopedic evaluation","Ankle instability — a positive test shows inversion of both feet","Spinal stenosis — inability to perform the squat indicates lumbar canal narrowing"],ans:1,rat:"The DUCK WALK test is a functional screening tool used in the PPE to identify significant HIP and KNEE pathology (particularly meniscal tears, cartilage damage, ligamentous instability). The athlete squats and walks toward the examiner. Positive = pain with the maneuver or INABILITY to perform the duck walk = warrants further evaluation. It can also reveal hip labral pathology and significant ligamentous instability. A normal duck walk suggests no major hip or knee structural pathology that would disqualify participation. It does NOT replace specific orthopedic tests (McMurray, Lachman) but is a quick functional screen."},

{mod:13,tag:'Sports PPE',vig:"A 15-year-old male wrestler has a 6-foot-1-inch height, arm span exceeding his height by 4 inches, long slender fingers (arachnodactyly), a high-arched palate, and mild pectus excavatum (concave chest wall). His vision requires thick corrective lenses.",stem:"What hereditary connective tissue disorder should be suspected, and what is the potentially FATAL complication that requires cardiology evaluation before sports clearance?",opts:["Klinefelter syndrome — extra X chromosome; the tall stature and long limbs are characteristic; no cardiac concerns","Marfan syndrome — tall stature, arm span > height, ARACHNODACTYLY, high-arched palate, pectus excavatum, and lens subluxation (causing severe myopia) are the classic features; the potentially FATAL complication is AORTIC ROOT DILATION and AORTIC DISSECTION during high-intensity exercise; requires echocardiography and cardiology clearance","Ehlers-Danlos syndrome — hypermobile joints; cardiac complications are not typically fatal","Normal athletic body habitus — tall athletes with long limbs commonly have these features"],ans:1,rat:"MARFAN SYNDROME: autosomal dominant connective tissue disorder (fibrillin-1 mutation). Classic features: TALL stature, arm span > height, ARACHNODACTYLY (long slender fingers — positive wrist sign and thumb sign), HIGH-ARCHED palate, pectus excavatum/carinatum, LENS SUBLUXATION causing severe myopia, scoliosis. POTENTIALLY FATAL COMPLICATION: AORTIC ROOT DILATION → AORTIC DISSECTION/RUPTURE during high-intensity physical activity. Requires echocardiography to measure aortic root diameter. If aortic root is dilated, restricted from collision sports and high-intensity activities. PPE screening identifies this before catastrophic events."},

// ── MODULE 14: URGENT ASSESSMENT ─────────────────────────────────────────────
{mod:14,tag:'Emergency vs Routine',vig:"The NP at an urgent care clinic sees the following patients in the same hour. Patient A: 8-year-old with a 38.1°C fever, ear pain, and a 2-day history of URI symptoms. Patient B: 72-year-old with sudden onset of the 'worst headache of my life,' stiff neck, and photophobia. Patient C: 45-year-old with a chronic 3-month history of mild lower back pain that is unchanged.",stem:"Which patient requires IMMEDIATE emergency management and transfer, and what is the presumptive diagnosis?",opts:["Patient A — fever in a school-age child always requires immediate transfer","Patient B — 'WORST HEADACHE OF LIFE' + stiff neck (meningismus) + photophobia = SUBARACHNOID HEMORRHAGE until proven otherwise; IMMEDIATE transfer to an emergency department for non-contrast CT head and LP; this is a life-threatening emergency","Patient C — chronic back pain is often a sign of aortic aneurysm requiring emergent imaging","All three patients require the same level of urgency"],ans:1,rat:"Patient B's presentation = CLASSIC subarachnoid hemorrhage (SAH): (1) 'WORST HEADACHE OF LIFE' = thunderclap headache from sudden onset of intense pressure (the aneurysm has ruptured); (2) STIFF NECK (meningismus) = blood in the subarachnoid space irritates the meninges; (3) PHOTOPHOBIA = meningeal irritation. IMMEDIATE transfer for non-contrast CT head (blood appears white in the subarachnoid space within first 6–12 hours). If CT negative but clinical suspicion remains → LUMBAR PUNCTURE for xanthochromia. This is a NEUROLOGIC EMERGENCY with high mortality. Patient A = routine urgent care. Patient C = routine management."},

{mod:14,tag:'Geriatric Red Flags',vig:"A 78-year-old woman with a UTI history is brought in by her daughter. She is confused, not oriented to time or place, and is not acting like herself. Temperature is 37.8°C. Urinalysis shows pyuria and bacteriuria.",stem:"Which statement best explains this clinical presentation?",opts:["This is normal — elderly patients always become confused with any illness","This is ATYPICAL PRESENTATION of UTI in an older adult — elderly patients may present with ALTERED MENTAL STATUS, CONFUSION, or behavioral changes (not the classic dysuria, frequency, urgency) as the PRIMARY or ONLY symptom of infection; this is a geriatric RED FLAG; the confusion in an otherwise-baseline elder + positive UA = UTI until proven otherwise; treat and monitor for resolution of confusion","This patient has dementia — the UTI is incidental and the confusion is baseline","Confusion with low-grade fever always indicates meningitis in elderly patients"],ans:1,rat:"GERIATRIC RED FLAG: Older adults often present with ATYPICAL symptoms of common conditions. UTI in the elderly: CLASSIC symptoms (dysuria, frequency, urgency) may be ABSENT. Instead, ALTERED MENTAL STATUS, CONFUSION, acute behavioral change, falls, or functional decline may be the ONLY presenting symptom. This is the most clinically important atypical presentation to recognize. Other atypical presentations in elderly: MI without chest pain (may present as fatigue or jaw pain), appendicitis without rebound tenderness, pneumonia without fever. Treat the UTI and monitor for resolution of the confusion — if confusion persists after treatment, investigate further."},

{mod:14,tag:'Pediatric Red Flags',vig:"A 14-year-old female gymnast presents with her mother. The NP notices she is very thin, her hair is thinning, and she has fine lanugo hair on her arms. The mother states 'she eats perfectly fine.' The patient avoids eye contact and gives minimal answers. Her BMI is 15.2.",stem:"What pediatric red flags are present, and what is the MOST likely diagnosis?",opts:["This is normal for a competitive gymnast — low BMI is expected in elite female athletes","Multiple RED FLAGS for ANOREXIA NERVOSA: severely low BMI (15.2 = significantly underweight), lanugo hair (body's response to extreme malnutrition — fine downy hair to maintain warmth), thinning scalp hair, avoidance behavior, minimization by patient AND mother; this is a life-threatening eating disorder requiring immediate evaluation including labs (electrolytes, EKG for QTc prolongation), nutritional assessment, and mental health referral","The patient likely has hypothyroidism — order TSH and reassure","Gymnasts are expected to have BMI below 16 — this is a training requirement"],ans:1,rat:"ANOREXIA NERVOSA red flags: (1) SEVERELY LOW BMI (<17.5 in adults; age/sex-specific in adolescents — BMI 15.2 at 14 years = significantly underweight); (2) LANUGO (fine downy hair on arms/face) = body's thermoregulation response to extreme fat and muscle loss; (3) HAIR THINNING (protein deficiency); (4) MINIMIZATION by patient and family; (5) Avoidance behavior. This is a MEDICAL EMERGENCY: can cause cardiac arrhythmias (QTc prolongation from electrolyte abnormalities), refeeding syndrome, multi-organ failure. Labs: CBC, CMP, magnesium, phosphorus, EKG. Immediate referral to eating disorder team."},

{mod:14,tag:'POLST/Advance Directives',vig:"An NP is discussing advance care planning with a 68-year-old man with stage IV lung cancer. He wants to ensure his wishes are honored if he becomes incapacitated during a medical crisis. His wife disagrees with his wishes to avoid aggressive resuscitation.",stem:"Which document is MOST ACTIONABLE in an emergency medical situation and travels with the patient across care settings?",opts:["A standard advance directive (living will) — this is the most immediately actionable document in any emergency","POLST (Physician Orders for Life-Sustaining Treatment) — a physician-signed medical ORDER (not just a directive) that specifies resuscitation wishes, feeding tube preferences, and level of medical intervention; it is actionable BY EMERGENCY RESPONDERS and travels with the patient across ALL care settings; his wife cannot override a valid POLST signed with capacity","A Do Not Resuscitate (DNR) order — only valid in the hospital where it was written","A healthcare proxy form alone — gives the wife the authority to make decisions regardless of the patient's wishes"],ans:1,rat:"POLST vs. ADVANCE DIRECTIVE: ADVANCE DIRECTIVE (living will) = states preferences for future care; signed by patient; NOT a medical order; may not be immediately actionable in a crisis (EMTs may not follow it). POLST = actual PHYSICIAN-SIGNED MEDICAL ORDER specifying: CPR/no CPR, feeding tube, level of medical intervention; actionable by EMERGENCY RESPONDERS, nursing homes, hospitals; travels WITH THE PATIENT across ALL settings. For patients with serious illness or advanced age, a POLST is more practical in emergencies. The patient's wife CANNOT override a valid POLST — it represents the patient's own decisions made WITH capacity."},

{mod:14,tag:'Documentation H&P',vig:"A new NP graduate is learning to write a comprehensive History and Physical (H&P) for a new patient. She asks where to document the patient's responses to a 14-system Review of Systems (ROS).",stem:"In which section of the H&P does the Review of Systems belong, and what does it contain?",opts:["Objective section — the ROS contains clinician-observed findings across all body systems","SUBJECTIVE section / History section — the ROS is patient-REPORTED symptoms across all body systems (constitutional, HEENT, cardiovascular, respiratory, GI, GU, musculoskeletal, neurologic, psychiatric, skin, endocrine, hematologic, allergic/immunologic); it is what the PATIENT REPORTS, not what the clinician finds on exam","Assessment section — the ROS helps build the differential diagnosis","Plan section — the ROS guides which further workup is ordered"],ans:1,rat:"The REVIEW OF SYSTEMS (ROS) is a systematic inquiry asking the patient about symptoms across all body systems. Because it consists of what the PATIENT REPORTS, it belongs in the SUBJECTIVE/HISTORY section of both the H&P and SOAP note. H&P structure: Identifying information → CC → HPI → PMH → Medications → Allergies → Family history → Social history → ROS → Physical examination (Objective) → Assessment → Plan. The ROS is the most COMPREHENSIVE part of the history — covering 14 systems. Distinguish from the physical examination findings (Objective) and from past medical history (PMH)."},

// ── ADDITIONAL BLUEPRINT TOPICS ───────────────────────────────────────────────
{mod:10,tag:'Bartholin Cyst vs Abscess',vig:"A 24-year-old woman presents with severe left labial pain and swelling for 2 days. She has a temperature of 38.6°C. On exam you find a very tender, fluctuant, hot, erythematous mass at the 5 o'clock position of the left posterior labia majora. Mucosa shows a red spot at the duct opening.",stem:"What is this finding, how does it differ from a Bartholin gland CYST, and what is the definitive treatment?",opts:["Bartholin gland cyst — non-tender, non-fluctuant; treat with warm compresses only","BARTHOLIN GLAND ABSCESS — the duct is blocked AND infected; differs from a cyst (blocked duct WITHOUT infection = non-tender, no erythema, no fever); abscess = exquisitely tender, FLUCTUANT, HOT, erythematous, fever may be present; definitive treatment: INCISION AND DRAINAGE + antibiotic therapy; a Word catheter is often placed to maintain drainage and prevent recurrence","Vulvar varicosity — soft, non-tender bluish mass; no treatment needed","Skene's gland cyst — located at the urethral meatus, not the posterior labia"],ans:1,rat:"BARTHOLIN GLAND ABSCESS vs. CYST: CYST = blocked duct → accumulated secretions; NON-TENDER, no erythema, no fever, not fluctuant — just a smooth swelling at 5 or 7 o'clock. ABSCESS = blocked duct + INFECTION → pus accumulation; EXQUISITELY TENDER, FLUCTUANT, HOT, ERYTHEMATOUS, may have fever and the red spot at the duct opening (pointing of the abscess). Location is ALWAYS the posterior labia majora at 5 or 7 o'clock (clock-face reference). Treatment: INCISION AND DRAINAGE (I&D) + antibiotics + Word catheter placement to prevent recurrence (marsupialization for recurrent cases)."},

{mod:12,tag:'CN Testing',vig:"You test CN XI by asking the patient to shrug both shoulders against your downward resistance. The patient's RIGHT shoulder shrug is markedly weaker than the left. You also ask the patient to turn their head — they have difficulty turning to the LEFT.",stem:"Which muscles are affected, and to which SIDE does head turning weakness localize the lesion?",opts:["The right trapezius is weak (shoulder shrug); difficulty turning LEFT = right SCM weakness = the lesion is on the RIGHT side of CN XI","The left sternocleidomastoid (SCM) turns the head to the RIGHT; difficulty turning LEFT = the LEFT SCM is weak; CN XI (spinal accessory nerve) on the LEFT side is injured; the trapezius on the RIGHT is also affected suggesting possible bilateral or high cervical cord involvement","Difficulty turning the head in any direction always indicates CN XII damage","Shoulder shrug weakness indicates CN V damage — masseter weakness"],ans:0,rat:"CN XI (SPINAL ACCESSORY NERVE): (1) TRAPEZIUS — shrugs the IPSILATERAL shoulder; right shoulder weakness = RIGHT CN XI (or right trapezius pathology). (2) STERNOCLEIDOMASTOID (SCM) — turns the head to the CONTRALATERAL side; the LEFT SCM turns the head to the RIGHT; difficulty turning to the LEFT = the RIGHT SCM is weak = RIGHT CN XI is affected. Both the right trapezius weakness AND difficulty turning to the LEFT point to the RIGHT CN XI. Test CN XI: (1) Shrug shoulders against resistance (trapezius), (2) Turn head to each side against resistance (SCM)."},

{mod:11,tag:'Cervical Spine',vig:"A 42-year-old woman is rear-ended in a car accident. She develops neck pain, headache, and right arm numbness and tingling involving the thumb, index, and middle fingers. On exam, cervical ROM is limited and painful. Spurling's maneuver (lateral cervical compression toward the right side) reproduces the arm symptoms.",stem:"What nerve root level is most likely compressed, and what is the Spurling's maneuver testing?",opts:["C8 nerve root — the little finger distribution; Spurling's tests for thoracic outlet syndrome","C6 nerve root — the thumb, index, and middle finger distribution corresponds to the C6 dermatomal level; Spurling's maneuver (lateral flexion + axial compression toward the symptomatic side) reproduces or worsens radicular symptoms = positive = CERVICAL RADICULOPATHY at C5-C6 disc level","C7 nerve root — the middle and ring finger distribution; Spurling's tests for carpal tunnel syndrome","T1 nerve root — the axillary distribution; Spurling's tests for cervical cord compression"],ans:1,rat:"C6 RADICULOPATHY: thumb + index + middle finger numbness = C6 DERMATOMAL distribution. Most common level: C5-C6 disc herniation → C6 nerve root compression. SPURLING'S MANEUVER: lateral cervical flexion TOWARD the symptomatic side + gentle axial COMPRESSION → reproduces or worsens radicular arm symptoms = POSITIVE for CERVICAL RADICULOPATHY. Mechanism: narrows the neural foramen on the compressed side, further compressing the nerve root. A positive Spurling's has high specificity for cervical radiculopathy. C6 also mediates: biceps reflex (may be diminished), wrist extension strength. Management: cervical collar, NSAIDs, physical therapy; refer for MRI if persistent."},

{mod:10,tag:'Female GU',vig:"A 32-year-old woman presents for a routine pelvic exam. During the bimanual exam you move the cervix gently from side to side. She winces and jumps backward. Her uterus is tender to palpation and slightly enlarged. She has a temperature of 38.3°C and her WBC is elevated.",stem:"What is the clinical significance of the finding when you moved the cervix, and what is the most likely diagnosis?",opts:["This is normal — cervical motion sensitivity is expected during pelvic exam","CERVICAL MOTION TENDERNESS (CMT) = 'CHANDELIER SIGN' — intense pain with cervical movement indicates PERITONEAL IRRITATION = PELVIC INFLAMMATORY DISEASE (PID) until proven otherwise; caused by ascending infection (chlamydia, gonorrhea, BV) from lower genital tract to endometrium and fallopian tubes; treat with dual antibiotic therapy (ceftriaxone + doxycycline ± metronidazole)","This indicates an ovarian cyst requiring immediate surgical intervention","The uterine enlargement alone indicates endometrial cancer"],ans:1,rat:"CERVICAL MOTION TENDERNESS (CMT) = 'CHANDELIER SIGN' — the patient 'jumps up toward the chandelier' when the cervix is moved. It indicates PERITONEAL IRRITATION from inflammation spreading to the peritoneum. Combined with fever, elevated WBC, and tender enlarged uterus = PID. PID = ascending infection from lower genital tract. Organisms: Chlamydia trachomatis, Neisseria gonorrhoeae, polymicrobial (BV organisms). Complications: ectopic pregnancy, infertility, chronic pelvic pain, reinfection. Treatment: dual antibiotic therapy. Criteria for hospitalization: cannot tolerate oral meds, surgical emergency cannot be excluded, pregnancy, tubo-ovarian abscess."},

{mod:12,tag:'Motor Testing',vig:"During a neurologic exam you ask a patient to perform rapid alternating movements — alternating palm and dorsum of hand on knee as fast as possible. The movements are IRREGULAR, clumsy, and arrhythmic with variable rhythm and amplitude.",stem:"What is this finding called, what does it indicate, and what other cerebellar signs would you look for to support your diagnosis?",opts:["Bradykinesia — slowness of movement indicating basal ganglia disease (Parkinson's)","DYSDIADOCHOKINESIA — inability to perform rapid alternating movements smoothly = CEREBELLAR dysfunction; look for other cerebellar signs: INTENTION TREMOR (worsens approaching a target on finger-nose test), ATAXIC GAIT (wide-based, staggering), NYSTAGMUS, DYSARTHRIA (scanning speech), PAST-POINTING (dysmetria on finger-nose)","Asterixis — metabolic flapping tremor indicating hepatic or renal encephalopathy","Cogwheel rigidity — resistance to passive movement with a ratchet-like quality indicating Parkinson's disease"],ans:1,rat:"DYSDIADOCHOKINESIA = inability to perform rapid alternating movements smoothly (arrhythmic, clumsy, irregular). The HALLMARK of CEREBELLAR dysfunction. COMPLETE CEREBELLAR SIGN CONSTELLATION (DANISH): Dysdiadochokinesia, Ataxia (wide-based gait), Nystagmus, Intention tremor (finger-nose = worsens approaching target), Scanning speech (dysarthria). Cerebellar hemisphere lesion: signs are IPSILATERAL (same side as lesion). Cerebellar vermis lesion: truncal ataxia, gait disturbance. Contrast: Bradykinesia = Parkinson's (basal ganglia — slow but not arrhythmic). Asterixis = metabolic (liver/kidney failure)."},

{mod:10,tag:'Male GU Developmental',vig:"An NP student is learning to examine the genitalia of a 2-year-old uncircumcised boy. The foreskin cannot be retracted over the glans.",stem:"How should the NP counsel the parents about this finding?",opts:["Immediately refer to urology — the foreskin should be fully retractable in all children by age 1","This is PHYSIOLOGIC PHIMOSIS — a normal developmental finding; most foreskins become retractable by ages 2–4, with ~99% retractable by age 17; NEVER forcefully retract the foreskin; no treatment is needed at this age; reinforce gentle hygiene; refer to urology only if causing urinary obstruction or recurrent UTIs","Circumcision is required immediately to prevent urinary tract infections","Apply topical steroids immediately to dilate the foreskin opening"],ans:1,rat:"PHYSIOLOGIC PHIMOSIS in young uncircumcised boys is a NORMAL DEVELOPMENTAL FINDING — the inner prepuce is fused to the glans at birth and separates naturally over time. Timeline: most retractable by ages 2–4; ~99% retractable by age 17. NEVER FORCEFULLY RETRACT the foreskin — forced retraction tears the fused tissue → scarring → iatrogenic PATHOLOGIC phimosis. Management: gentle cleansing of visible external surface only; reassurance; no treatment needed. Refer to urology ONLY if: urinary obstruction (pinhole meatus causing poor stream), recurrent UTIs, or recurrent balanitis. Pathologic phimosis in older children: topical steroid cream (first-line), gradual stretching, or circumcision."},

{mod:11,tag:'Gout',vig:"A 58-year-old obese male with hypertension presents with sudden onset of exquisite RIGHT great toe pain, redness, and swelling that woke him from sleep. The toe is so tender he cannot tolerate even the weight of a bedsheet. He takes hydrochlorothiazide. Joint aspiration shows needle-shaped, NEGATIVELY BIREFRINGENT crystals.",stem:"What is the diagnosis, what triggers this patient's attack, and what is the TARGET JOINT for gout attacks?",opts:["Septic arthritis — treat with IV antibiotics immediately; any joint can be affected equally","GOUT — caused by urate crystal deposition; the FIRST METATARSOPHALANGEAL (MTP) JOINT of the great toe is the #1 target joint (podagra); triggers include THIAZIDE DIURETICS (hydrochlorothiazide reduces uric acid excretion), surgery, trauma, alcohol, purine-rich foods; needle-shaped negatively birefringent crystals confirm the diagnosis on polarized microscopy","Pseudogout — calcium pyrophosphate crystals; always affects the knee","Rheumatoid arthritis — symmetric MCP involvement"],ans:1,rat:"GOUT = inflammatory arthritis from urate crystal deposition. #1 TARGET JOINT = 1st METATARSOPHALANGEAL (MTP) joint of the great toe (PODAGRA) — red, hot, exquisitely tender joint; patient cannot tolerate even bedsheet weight. Diagnosis confirmed by joint aspiration showing NEEDLE-SHAPED, NEGATIVELY BIREFRINGENT crystals on polarized microscopy. Triggers: THIAZIDE DIURETICS (reduce renal urate excretion → hyperuricemia — relevant here because patient takes HCTZ), alcohol (beer especially), purine-rich foods, dehydration, trauma, surgery. Treatment: colchicine, NSAIDs, or steroids for acute attack; allopurinol/febuxostat for chronic urate lowering."},

{mod:14,tag:'Urgent Care',vig:"An NP working in a rural urgent care center receives a 62-year-old man with crushing substernal chest pain radiating to the left arm, diaphoresis, and nausea for 45 minutes. The urgent care has no cardiac catheterization capabilities. The nearest PCI-capable hospital is 35 minutes away.",stem:"What does EMTALA require in this situation regarding treatment BEFORE transfer?",opts:["EMTALA prohibits treating the patient before transfer — all care should wait until he arrives at the PCI-capable hospital","EMTALA requires STABILIZATION to the best of the sending facility's ability before appropriate transfer: administer aspirin, obtain 12-lead EKG, establish IV access, give supplemental O2 if hypoxic, consider sublingual nitrates if no contraindications — THEN arrange emergent transfer via ALS ambulance; do NOT delay transfer for treatment that is beyond the facility's capabilities","EMTALA only applies to patients who arrive by ambulance — walk-in patients are not covered","The NP should not treat the patient until a physician is present"],ans:1,rat:"EMTALA STABILIZE THEN TRANSFER: EMTALA requires: (1) STABILIZE to the BEST OF THE CURRENT FACILITY'S ABILITY — in an ACS: aspirin 325 mg (unless contraindicated), 12-lead EKG, IV access, supplemental O2, sublingual nitroglycerine (if BP allows, no RV infarct), morphine for pain if needed. (2) APPROPRIATE TRANSFER: ALS ambulance (advanced life support capable), receiving facility must accept, all records and treatment given must accompany the patient. The goal: stabilize what you CAN with what you HAVE, then transfer emergently for the definitive care (PCI) you CANNOT provide. Time to balloon is critical — minimize door-to-balloon time."},

{mod:12,tag:'TUG Test',vig:"An NP sees an 80-year-old woman for a Medicare Annual Wellness Visit. She asks: 'What is the TUG test and why do we use it?'",stem:"Which statement BEST explains the TUG test and its clinical utility?",opts:["The TUG (Timed Up and Go) test is a cardiac stress test used to detect atrial fibrillation during ambulation","The TUG test assesses FALL RISK: the patient rises from a chair, walks 10 feet, turns, walks back, and sits; TIMED in seconds; <12 sec = low risk; 12–20 sec = moderate risk; >20 sec = HIGH risk; ALSO provides QUALITATIVE assessment of gait quality (shuffling = Parkinson's; wide-based = cerebellar; unsteady turning = vestibular); high fall risk triggers fall prevention interventions","The TUG test measures lower extremity muscle strength and is used to screen for osteoporosis","The TUG test assesses cognitive function — it is a validated dementia screening tool"],ans:1,rat:"TUG (TIMED GET UP AND GO) TEST: Rise from a chair, walk 10 feet, turn, walk back, sit. TIMED: <12 sec = LOW fall risk; 12–20 sec = MODERATE fall risk; >20 sec = HIGH fall risk (requires fall prevention intervention). The TUG provides BOTH quantitative (time) AND qualitative (gait observation) data. Qualitative findings: shuffling = Parkinsonism; wide-based staggering = cerebellar; turning unsteadiness = vestibular or cerebellar; small steps = Parkinson's or fear of falling. High fall risk triggers: referral to physical therapy, home safety evaluation, medication review (especially polypharmacy), vision assessment, footwear assessment."},

{mod:13,tag:'PPE Orthopedic',vig:"During a sports physical's orthopedic screening portion, the physician asks the NP student to explain what components should be assessed in the musculoskeletal screening for the preparticipation physical evaluation.",stem:"Which of the following BEST describes the key musculoskeletal components of the PPE screening exam?",opts:["Full joint-by-joint arthritis assessment of every joint in the body","Posture, gait, bulk and tone (symmetric), ROM screening (shoulders, elbows, wrists, hands, hips, knees, ankles), scoliosis screen (Adams forward bend test), and sport-specific joint assessment based on the sport; the duck walk screens hip and knee; single-leg balance screens ankle and proprioception; duck walk, single-leg hop, and deep knee bend are functional screening tools","Complete neurologic exam including all 12 cranial nerves","Cardiovascular and cardiac auscultation only — the orthopedic component is not required"],ans:1,rat:"PPE MUSCULOSKELETAL SCREEN components: (1) POSTURE: inspect spine, shoulder height, hip level; (2) GAIT: normal gait, heel-toe walk, toe-raise; (3) SCOLIOSIS: Adams forward bend test; (4) JOINT SCREEN: ROM screening of all major joints with attention to sport-specific areas; (5) FUNCTIONAL TESTS: duck walk (hip/knee), single-leg balance (ankle, proprioception), single-leg hop (functional knee strength), deep knee bend (knee, hip, ankle). Muscle symmetry by inspection and strength testing. Any asymmetry, limitation, or pain warrants detailed orthopedic follow-up. The PPE is not a complete joint-by-joint arthritis evaluation — it is a targeted screening exam."},

{mod:10,tag:'Female GU Abnormals',vig:"During a pelvic exam on a 28-year-old woman, while performing the bimanual exam with your vaginal fingers in the right lateral fornix and your abdominal hand in the right iliac fossa, you palpate a 4 cm tender, mobile, round mass LATERAL to the uterus. She has a positive urine pregnancy test.",stem:"What is the MOST likely diagnosis and why is this a medical emergency?",opts:["Functional ovarian cyst — very common in reproductive-age women; no immediate action needed","ECTOPIC PREGNANCY — a fertilized ovum implanted in the fallopian tube (incidence 1–2% of pregnancies); positive pregnancy test + lateral tender adnexal mass = ectopic until proven otherwise; if the tube RUPTURES it causes massive hemorrhage and can be FATAL; requires IMMEDIATE emergent management (surgery or medical treatment with methotrexate if unruptured); late signs of rupture: decreased BP, tachycardia, diaphoresis, shock","Uterine fibroid — common in reproductive-age women; benign; requires no immediate treatment","PID with tubo-ovarian abscess — treat with IV antibiotics; ectopic pregnancy is not a concern with a positive pregnancy test"],ans:1,rat:"ECTOPIC PREGNANCY = MEDICAL EMERGENCY. Positive pregnancy test + tender lateral adnexal mass = ectopic until proven otherwise. The fertilized ovum implants in the FALLOPIAN TUBE (most common) — risk factors: PID, prior ectopic, smoking, infertility. As the tube cannot expand sufficiently, it RUPTURES → massive hemorrhage → HEMORRHAGIC SHOCK → DEATH if untreated. Late signs of rupture: decreased BP, tachycardia, diaphoresis, shoulder tip pain (from diaphragmatic irritation by blood). Diagnosis: TRANSVAGINAL ULTRASOUND is crucial. Management: methotrexate (if unruptured, hemodynamically stable) or surgical intervention (salpingostomy/salpingectomy)."},

{mod:10,tag:'Prostate',vig:"A 55-year-old man presents for a routine health exam. He has NO urinary complaints. On DRE you feel the prostate is smooth and walnut-sized with the median sulcus palpable. You note the consistency is rubbery, similar to the thenar eminence.",stem:"The NP documents this DRE as normal. Which statement about the normal prostate is INCORRECT?",opts:["The normal prostate is approximately walnut-sized (~4 cm wide)","The surface of the normal prostate is smooth","The MEDIAN SULCUS of a normal prostate is OBLITERATED — the groove disappears in a healthy prostate","The consistency of the normal prostate is rubbery, classically compared to the tip of the examiner's nose"],ans:2,rat:"The INCORRECT statement is C. A NORMAL prostate has a PALPABLE median sulcus (central groove dividing the two lateral lobes). The median sulcus is OBLITERATED in BPH as the lateral lobes grow symmetrically toward each other. Normal prostate DRE: (1) Walnut-sized (~4 cm), (2) Smooth surface, (3) RUBBERY consistency (tip of the nose — or the thenar eminence as described here), (4) NONTENDER, (5) MOBILE, (6) Median sulcus PRESENT (palpable). The question tests knowledge of which finding distinguishes normal from BPH — the median sulcus is the key differentiator."},

{mod:11,tag:'Joint Types',vig:"A patient asks the NP: 'What type of joint is my knee versus my sacroiliac joint?'",stem:"Which correctly classifies and describes BOTH the knee joint and the sacroiliac joint?",opts:["Both are synovial joints — all joints in the body are freely movable","Knee = SYNOVIAL joint (diarthrosis — freely movable; enclosed in a joint capsule with synovial membrane, synovial fluid, and articular cartilage); Sacroiliac joint = CARTILAGINOUS joint (amphiarthrosis — slightly movable; connected by fibrocartilage); the slight mobility of the SI joint is important for shock absorption and allows minor movement during the gait cycle","Knee = fibrous joint (immovable); Sacroiliac joint = synovial joint (freely movable)","Both are cartilaginous joints — any joint that bears weight is classified as cartilaginous"],ans:1,rat:"SYNOVIAL JOINT (knee): enclosed in a capsule with synovial membrane, synovial fluid (lubricant), and articular cartilage; FREELY MOVABLE (diarthrosis); examples: knee, shoulder, hip, elbow, wrist, finger joints. Articular cartilage is AVASCULAR (nourished by synovial fluid during motion). CARTILAGINOUS JOINT (sacroiliac): connected by fibrocartilage; SLIGHTLY MOVABLE (amphiarthrosis); examples: intervertebral discs, pubic symphysis, sacroiliac joints, manubriosternal joint. FIBROUS JOINT: skull sutures, tooth sockets; IMMOVABLE (synarthrosis). The SI joint's slight mobility allows for the transmission and absorption of forces between the spine and lower extremities."},

{mod:14,tag:'Geriatric Red Flags',vig:"An 82-year-old man presents to the urgent care with his daughter. He seems confused about where he is and is picking at his clothing. His daughter reports this started yesterday — he is normally sharp and lives independently. He has a fever of 39.1°C.",stem:"This presentation is MOST consistent with which condition, and why is distinguishing it from dementia clinically critical?",opts:["This is consistent with baseline dementia — the fever is coincidental and unrelated to the confusion","DELIRIUM — an ACUTE (sudden onset, hours to days), FLUCTUATING alteration in consciousness and attention; DISTINGUISHABLE from dementia: dementia is CHRONIC (months to years) and does NOT fluctuate rapidly; delirium ALWAYS has an underlying CAUSE that must be identified (infection, medications, dehydration, metabolic disturbance, pain); fever + acute confusion + picking at clothing (visual hallucinations/asterixis) = delirium from INFECTION; identify and treat the CAUSE","This is sundowning — a normal phenomenon in all elderly patients in the afternoon","Chronic schizophrenia with new-onset fever — treat with antipsychotics"],ans:1,rat:"DELIRIUM vs. DEMENTIA — CRITICAL DISTINCTION: DELIRIUM: ACUTE ONSET (hours to days), FLUCTUATING course (better and worse within same day), impaired ATTENTION (cannot focus), often with perceptual disturbances (hallucinations — picking at clothing is characteristic of visual hallucinations or formication), ALWAYS has an underlying CAUSE. DEMENTIA: CHRONIC (months to years), GRADUAL onset, STABLE day-to-day (except sundowning), attention is relatively preserved early. This patient was normal yesterday and is now acutely confused with fever = DELIRIUM from infection (likely pneumonia, UTI, or sepsis). Identifying and treating the CAUSE reverses delirium — it is NOT inevitable."},

{mod:10,tag:'Cervical Cancer Screening',vig:"A 25-year-old woman presents for her first well-woman exam. She is sexually active and has never had a Pap smear. She asks when she should start Pap smear screening and how often.",stem:"Which statement correctly describes CURRENT cervical cancer screening guidelines?",opts:["Begin Pap smear at first sexual intercourse regardless of age; annually until age 30, then every 5 years","Begin Pap smear at AGE 21 regardless of sexual history; every 3 years until age 29 (cytology alone); at age 30–65 either every 3 years (cytology alone), every 5 years (HPV testing alone), or every 5 years (co-testing); stop screening at age 65 if adequate prior negative screens","Begin Pap smear at age 18; annually every year for life","Begin Pap smear at age 30 only; before that, HPV vaccine is sufficient"],ans:1,rat:"CURRENT CERVICAL CANCER SCREENING (USPSTF/ACOG): Begin at AGE 21 (regardless of sexual debut). Ages 21–29: Pap smear (cytology) every 3 YEARS. Ages 30–65: CHOICE of (1) Cytology alone every 3 years, (2) HPV testing alone every 5 years (preferred by some guidelines), (3) Co-testing (Pap + HPV) every 5 years. Stop at age 65 if adequate prior negative screening history. Do NOT screen before age 21 (cervical changes in young women are usually transient and self-resolving — overtreatment harms outweigh benefits). HPV vaccine does NOT eliminate the need for Pap smears. This 25-year-old should have her first Pap smear now."},

{mod:12,tag:'Myelination',vig:"A pediatric NP is reviewing neurologic development with a nursing student. The student asks: 'Why do babies develop head control before they can walk? And why do they develop shoulder strength before fine finger dexterity?'",stem:"Which principle of neurologic development BEST explains this pattern?",opts:["Babies develop random motor skills in no particular order — individual variation explains all differences","CEPHALOCAUDAL and PROXIMODISTAL myelination: the nervous system myelinates from HEAD TO TAIL (cephalocaudal) — head control comes before trunk control before leg control; and from PROXIMAL TO DISTAL (proximodistal) — shoulder and arm control precedes hand and finger dexterity; unmyelinated pathways cannot conduct motor impulses efficiently; myelination enables increasingly refined voluntary motor control","All motor skills develop simultaneously — the difference is only due to practice and parental encouragement","Myelination is complete at birth — the pattern of motor development reflects muscle strength, not nerve function"],ans:1,rat:"MYELINATION determines the ORDER and TIMING of motor milestones. Two key principles: (1) CEPHALOCAUDAL (head-to-tail): myelination proceeds from brain → cervical cord → thoracic → lumbar → sacral; therefore HEAD CONTROL (cervical) precedes TRUNK CONTROL (thoracic) precedes STANDING/WALKING (lumbar-sacral). (2) PROXIMODISTAL (trunk outward): SHOULDER and ARM control precede WRIST and HAND control precede FINGER DEXTERITY. Unmyelinated axons conduct impulses slowly and unreliably — myelination dramatically increases conduction velocity and motor precision. The corticospinal tract continues myelinating into the SECOND YEAR OF LIFE — this is why the Babinski sign is normal until 12–24 months."},

{mod:10,tag:'Uterine Fibroids',vig:"A 38-year-old African American woman presents with heavy menstrual bleeding requiring her to change pads every hour, pelvic pressure, and urinary frequency for the past year. On bimanual exam the uterus is enlarged, firm, irregular, and nodular with hard, painless nodules in the uterine wall.",stem:"What is the MOST likely diagnosis, what is the demographic group at HIGHEST risk, and what imaging confirms the diagnosis?",opts:["Endometrial cancer — rare in women under 40; requires endometrial biopsy for diagnosis","Uterine fibroids (leiomyomas) — benign ESTROGEN-DEPENDENT tumors; most common benign pelvic tumor in women; highest prevalence in BLACK WOMEN (80% by age 50 vs. 70% in White women); confirmed by PELVIC ULTRASOUND; symptoms: heavy uterine bleeding, pelvic pressure, urinary frequency (from bladder compression)","Polycystic ovary syndrome — bilateral ovarian cysts; irregular menses; no uterine enlargement","Uterine prolapse — uterus protrudes into vagina; no nodular uterus"],ans:1,rat:"UTERINE FIBROIDS (LEIOMYOMAS): BENIGN, estrogen-dependent smooth muscle tumors. Most common benign pelvic tumor in women of reproductive age. HIGHEST RISK: BLACK WOMEN — by age 50: 80% of Black women vs. 70% of White women have at least one fibroid. Symptoms: HEAVY UTERINE BLEEDING (leading to anemia), pelvic pressure, urinary frequency/urgency (anterior fibroids compress bladder), constipation (posterior fibroids compress rectum), dyspareunia. Bimanual: irregularly ENLARGED, FIRM, NODULAR uterus with HARD PAINLESS nodules. Diagnosis: PELVIC ULTRASOUND (gold standard). Treatment: medical (hormonal regulation, NSAIDs), uterine artery embolization, myomectomy, or hysterectomy."},

{mod:14,tag:'Documentation SOAP',vig:"An NP completes a SOAP note after seeing a 50-year-old woman for knee pain. The note reads: A — 'Right knee pain, most consistent with medial meniscus tear based on positive McMurray test and medial joint line tenderness.' P — 'MRI of right knee ordered; ibuprofen 600 mg TID with food; refer to orthopedics; physical therapy evaluation; return in 2 weeks or sooner if symptoms worsen.'",stem:"Based on what you can see of this SOAP note, the Assessment and Plan sections are:",opts:["Incorrectly formatted — the Assessment should list vital signs and the Plan should list the diagnosis","CORRECTLY formatted — Assessment = the NP's clinical INTERPRETATION and DIAGNOSIS (most likely condition based on subjective and objective data); Plan = the specific MANAGEMENT STEPS (tests, treatments, referrals, follow-up); the Plan logically flows from the Assessment","The Assessment should only list the patient's chief complaint","The Plan should only contain medication orders — referrals belong in the Assessment"],ans:1,rat:"SOAP NOTE — ASSESSMENT AND PLAN: ASSESSMENT (A): the NP's CLINICAL INTERPRETATION — the diagnosis or differential diagnosis formulated by SYNTHESIZING the Subjective (patient report) and Objective (exam findings) data. It answers: 'What do I think is going on?' 'Right knee pain most consistent with medial meniscus tear based on positive McMurray test' = correct — it interprets the findings. PLAN (P): specific MANAGEMENT STEPS that logically flow from the assessment — diagnostic tests (MRI), medications (ibuprofen), referrals (orthopedics, PT), follow-up timing. Both sections are correctly formatted here. The four SOAP sections build on each other sequentially: S → O → A → P."},
];

let cur=0,sel=Array(50).fill(-1),sub=Array(50).fill(false),cor=Array(50).fill(false);

function render(){
  const q=Qs[cur],s=sel[cur],ca=q.ans,submitted=sub[cur];
  const opts=q.opts.map((o,i)=>{
    let c='opt';
    if(submitted){c+=' locked';if(i===ca)c+=' correct';else if(i===s&&s!==ca)c+=' wrong';}
    else if(i===s)c+=' sel';
    return `<div class="${c}" onclick="pick(${i})"><span class="ol">${'ABCD'[i]}.</span><span>${o}</span></div>`;
  }).join('');
  const rat=submitted?`<div class="rat ${s===ca?'ok':'ng'}"><div class="rat-lbl">${s===ca?'✓ Correct!':'✗ Incorrect — Correct answer: '+('ABCD'[ca])+'.'}</div>${q.rat}</div>`:'';
  const nav=`<div class="nav">
    <button class="btn" onclick="go(cur-1)" ${cur===0?'disabled':''}>← Back</button>
    ${!submitted?`<button class="btn primary" onclick="doSub()" ${s===-1?'disabled':''}>Submit answer</button>`:''}
    ${cur<49?`<button class="btn" onclick="go(cur+1)">Next →</button>`:''}
    ${cur===49&&submitted?`<button class="btn primary" onclick="results()">View final score →</button>`:''}
  </div>`;
  const done=sub.filter(Boolean).length,corr=cor.filter(Boolean).length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/50)*100)+'%';
  document.getElementById('qn').textContent=cur+1;
  document.getElementById('ac').textContent=done;
  document.getElementById('cc').textContent=corr;
  document.getElementById('qa').innerHTML=`<div class="card">
    <div class="qmeta"><span>Q${cur+1} of 50</span><span class="mtag">Mod ${q.mod}</span><span class="ftag">${q.tag}</span></div>
    ${q.vig?`<div class="vig">${q.vig}</div>`:''}
    <div class="stem">${q.stem}</div>
    ${opts}${rat}
  </div>${nav}`;
}

function pick(i){if(sub[cur])return;sel[cur]=i;render();}
function doSub(){if(sel[cur]===-1)return;sub[cur]=true;cor[cur]=(sel[cur]===Qs[cur].ans);render();}
function go(i){if(i<0||i>49)return;cur=i;render();}

function results(){
  const tot=cor.filter(Boolean).length,pct=Math.round((tot/50)*100);
  let grade='',gc='var(--red)';
  if(pct>=90){grade='A — Outstanding! Exam ready! 🎉';gc='var(--green)';}
  else if(pct>=80){grade='B — Good — review missed topics';gc='var(--teal)';}
  else if(pct>=70){grade='C — Passing — needs more review';gc='var(--gold)';}
  else{grade='Below passing — intensive review recommended';}
  const rv=Qs.map((q,i)=>{
    const ok=cor[i],ua=sel[i]>=0?'ABCD'[sel[i]]:'—';
    return `<div class="rv ${ok?'ok':'ng'}"><div class="rv-q">Q${i+1} [${q.tag}]: ${q.stem.substring(0,80)}...</div><div class="rv-d">Your answer: ${ua} · Correct: ${'ABCD'[q.ans]} · ${ok?'✓ Correct':'✗ Incorrect'}</div></div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('qa').innerHTML=`
    <div class="sc">
      <div class="sc-big" style="color:${gc}">${pct}%</div>
      <div class="sc-lbl">${tot} of 50 correct</div>
      <div class="sc-grade" style="color:${gc}">${grade}</div>
      <div class="sc-note">Set 6 · Full blueprint coverage: Modules 10–14 · 50 brand-new questions</div>
    </div>
    <div style="margin-bottom:1rem"><button class="btn" onclick="go(0)">← Review questions</button></div>
    ${rv}`;
}

render();
</script>
