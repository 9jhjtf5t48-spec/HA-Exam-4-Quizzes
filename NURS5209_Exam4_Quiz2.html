body{font-family:'DM Sans',sans-serif;background:#f0f4f8;color:var(--text);min-height:100vh;padding:2rem 1rem}

.progress-bar{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:8px}

  <h1>NURS 5209 — Exam 4 Practice</h1>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:2%"></div></div>
  <div class="stats">

<script>
const Qs=[
{mod:12,vignette:"A 9-year-old boy is brought in by his mother who is concerned he is not developing normally. She states his older sister started showing breast budding at age 9 and wonders when boys start puberty. During your assessment you explain the expected sequence of male sexual development.",stem:"Which finding represents the FIRST sign of puberty in boys?",opts:["Appearance of pubic hair","Testicular enlargement (Tanner stage 2)","Growth of the penis","Axillary hair development"],ans:1,rat:"The first sign of puberty in boys is testicular enlargement, which marks the onset of Tanner Stage 2 in males. This is followed by pubic hair development, penile growth, and then axillary hair (approximately 2 years after pubic hair onset). This mirrors the female sequence where breast budding (thelarche) is the first sign of puberty in girls."},
{mod:10,vignette:"A 16-year-old girl presents for a well-child exam. On inspection of her external genitalia you note adult-type pubic hair distributed in an inverse triangle pattern extending to her medial thighs. Her breast exam shows only the nipple protruding with the areola flush with the breast contour.",stem:"What Tanner stage describes BOTH her pubic hair and breast development?",opts:["Pubic hair Stage 4, Breast Stage 5","Pubic hair Stage 5, Breast Stage 5","Pubic hair Stage 5, Breast Stage 4","Pubic hair Stage 3, Breast Stage 5"],ans:1,rat:"Stage 5 pubic hair = adult inverse triangle pattern extending onto medial thighs. Stage 5 breast = mature breast where only the nipple protrudes; the areola is flush with the breast contour. Stage 4 breast is when the areola and nipple form a secondary mound ABOVE the breast — distinguishing it from Stage 5 where the areola flattens back."},
{mod:10,vignette:"A 12-year-old girl is in your clinic for her annual visit. Her mother reports she started her period 6 months ago. On exam you note breast tissue and areola enlarged but the nipple is flush with the breast surface. Pubic hair is darker, coarser, and curlier, spreading over the mons pubis.",stem:"Which Tanner stage best describes her current development for BOTH pubic hair and breast tissue?",opts:["Stage 2 for both","Stage 3 for both","Stage 4 for both","Stage 3 pubic hair, Stage 4 breast"],ans:1,rat:"Stage 3 pubic hair = hair is darker, coarser, curlier and spreading over the mons pubis. Stage 3 breast = breast and areola enlarge together; the nipple is FLUSH with the breast surface. Menarche typically occurs in Tanner Stage 3 or 4, consistent with this patient having started her period 6 months ago."},
{mod:10,vignette:"During a physical exam of a 17-year-old Asian patient you note fine, sparse pubic hair that is typical for her ethnic background. Her mother asks if this is abnormal.",stem:"Which statement best reflects evidence-based data regarding pubic hair development across racial and ethnic groups?",opts:["Fine, sparse pubic hair is always abnormal regardless of ethnicity and requires hormonal workup","The Tanner staging data was developed on White girls and may not generalize to all groups — mature Asian women normally have fine, sparse pubic hair","All women should reach Stage 5 by age 16 regardless of ethnicity","Fine pubic hair in a 17-year-old indicates delayed puberty and requires referral"],ans:1,rat:"Jarvis explicitly notes that the Tanner staging data for pubic hair was developed on White girls and may not generalize to all racial and ethnic groups. Specifically, mature Asian women normally have fine, sparse pubic hair. This is a normal ethnic variation, NOT a sign of delayed puberty or hormonal abnormality."},
{mod:10,vignette:"A 52-year-old postmenopausal woman reports she leaks small amounts of urine constantly throughout the day without any urge or physical exertion. She also reports difficulty starting her urine stream and a feeling that her bladder never fully empties.",stem:"What type of incontinence best describes this presentation?",opts:["Stress incontinence — involuntary loss with physical strain","Urge incontinence — strong uncontrollable urge to void","Overflow incontinence — bladder does not fully empty, resulting in constant dribbling","Mixed incontinence — combination of stress and urge components"],ans:2,rat:"Overflow incontinence occurs when the bladder cannot fully empty, resulting in constant leakage of small amounts of urine. Key features: no urge sensation before leaking, no association with physical strain, constant low-level dribbling, difficulty initiating stream, sensation of incomplete emptying. This contrasts with stress (leakage with strain) and urge (sudden strong urge) incontinence."},
{mod:10,vignette:"You are performing a breast exam on a 45-year-old woman. After inspection in multiple positions, you have the patient lie supine. You place a small pillow under her left shoulder and begin palpating her left breast using small circular motions with the flat pads of your fingers, moving in vertical strips from axilla to sternum.",stem:"Why is a small pillow placed under the ipsilateral shoulder during supine breast palpation?",opts:["To elevate the chest wall so the ribs can be felt beneath the breast tissue","To spread the breast tissue evenly across the chest wall, reducing thickness and improving palpation accuracy","To help the patient maintain the supine position comfortably during the exam","To allow gravity to displace the breast medially for better nipple assessment"],ans:1,rat:"Placing a small pillow under the ipsilateral (same-side) shoulder during supine breast palpation causes the breast to spread laterally and evenly across the chest wall. This reduces the thickness of the breast tissue, making it easier to palpate lumps, especially in the outer quadrants and axillary tail."},
{mod:10,vignette:"A 29-year-old woman presents for her annual exam. She asks about the best way to perform BSE. She reports her last menstrual period started 10 days ago.",stem:"If she wants to perform BSE today, is the timing appropriate? What guidance should the NP provide?",opts:["Yes — day 10 is ideal because estrogen peaks around ovulation making lumps more palpable","No — she should wait until the first day of her next period to perform BSE","No — the best time is days 4–7 after her period begins; at day 10 the breast is beginning to become more congested due to rising hormones","Yes — any day of the cycle is equally appropriate for BSE"],ans:2,rat:"BSE should be performed on days 4–7 after the period BEGINS, when breast volume is smallest and nodularity is lowest. At day 10, the follicular phase is progressing and estrogen levels are beginning to rise, which can increase breast tissue congestion. The patient should perform BSE earlier in her next cycle — days 4 through 7 after bleeding begins."},
{mod:10,vignette:"A 61-year-old woman who is 10 years postmenopausal comes in for a breast exam. She mentions she felt a lump last week that she had not noticed before, even though it feels 'like it might have always been there.' On palpation you confirm a 1.5 cm firm, palpable mass in the upper outer quadrant.",stem:"What physiologic change of menopause best explains why a lump that may have been present for years is now suddenly palpable?",opts:["Postmenopausal estrogen excess causes breast tissue proliferation making lumps more prominent","Decreased estrogen causes glandular tissue to atrophy and be replaced by fibrous tissue, and fat atrophies — reducing breast size and making inner structures more prominent","Menopause causes calcification of all breast tissue making every structure palpable","Postmenopausal breast tissue becomes uniformly dense, increasing mammographic and palpatory sensitivity"],ans:1,rat:"After menopause, decreased estrogen causes breast glandular tissue to atrophy and be replaced with fibrous connective tissue. The fat envelope also atrophies. These changes decrease breast size and elasticity. Because the surrounding tissue shrinks, any pre-existing structure becomes MORE prominent and palpable. Any palpable lump in a postmenopausal woman that cannot be positively identified as normal should be referred."},
{mod:10,vignette:"A 24-year-old male presents reporting he noticed a hard, non-tender lump on his left testicle 2 weeks ago. He denies pain. On examination the mass is solid and does NOT transilluminate. He reports no history of undescended testicle.",stem:"What is the most appropriate next step?",opts:["Reassure the patient that a non-tender testicular mass in a young man is most likely a benign spermatocele","Order urgent scrotal ultrasound and refer — a solid non-transilluminating testicular mass in a male aged 15–35 must be evaluated for testicular cancer","Prescribe antibiotics for presumed epididymitis and reassess in 2 weeks","Perform transillumination again — if still negative, discharge with return precautions"],ans:1,rat:"A solid, non-transilluminating, painless testicular mass in a male aged 15–35 must be presumed to be testicular cancer until proven otherwise. Testicular cancer is the most common solid tumor in young men in this age group, has almost 100% cure rate when caught before metastasis, but is often PAINLESS. Scrotal ultrasound should be ordered urgently."},
{mod:10,vignette:"During a male genital exam you inspect the penis of an uncircumcised 25-year-old and note that the urethral meatus appears to open on the underside (ventral surface) of the glans rather than at the tip.",stem:"What congenital anomaly is this, and what is the correct terminology?",opts:["Epispadias — dorsal placement of the urethral meatus","Hypospadias — ventral placement of the urethral meatus; the most common penile congenital anomaly","Phimosis — narrowing of the foreskin opening","Paraphimosis — retracted foreskin that cannot be returned forward"],ans:1,rat:"Hypospadias is the congenital condition where the urethral meatus opens on the VENTRAL (underside) surface of the penis. It is the most common penile congenital anomaly. Memory trick: HYPOspadias = HYPO (under/below) = ventral. EPIspadias = EPI (above/on top) = DORSAL placement."},
{mod:10,vignette:"A 70-year-old man has a DRE as part of his annual physical. You palpate a single hard, irregular, fixed nodule on the posterior surface of the prostate. The patient denies urinary symptoms.",stem:"What does this finding suggest and what is the significance of early prostate cancer having no symptoms?",opts:["This is consistent with BPH — reassure patient and recheck in 1 year","This finding is consistent with prostate cancer — the absence of symptoms in early disease is the reason screening and DRE remain important clinical tools","This is consistent with acute prostatitis — treat with antibiotics and repeat DRE in 6 weeks","A hard nodule is normal in men over 70 due to calcification of the median sulcus"],ans:1,rat:"A stone-hard, irregular, fixed nodule on the posterior surface of the prostate is the classic finding of prostate cancer. Critically, early prostate cancer is ASYMPTOMATIC — symptoms only occur with extensive/advanced disease. BPH = symmetric, smooth, nontender enlargement with obliterated median sulcus. Prostatitis = exquisitely tender."},
{mod:10,vignette:"A 19-year-old male presents with acute onset of left scrotal pain, nausea, and vomiting that began 3 hours ago. On exam the left testis is high-riding and exquisitely tender. The cremasteric reflex is absent on the left.",stem:"What is the most likely diagnosis and what is the most critical next step?",opts:["Epididymitis — treat with antibiotics, Prehn's sign will be positive","Testicular torsion — this is a surgical emergency requiring immediate urologic consultation; delay risks testicular ischemia and loss","Varicocele — soft tortuous cord, not a surgical emergency","Hydrocele — transilluminates; manage conservatively"],ans:1,rat:"Testicular torsion is a surgical emergency. Classic presentation: sudden severe unilateral scrotal pain, nausea/vomiting, high-riding testis, absent cremasteric reflex. Testicular salvage rate approaches 90–100% if detorsion occurs within 6 hours, drops to <10% after 24 hours. Prehn's sign (lifting scrotum relieves pain) is NEGATIVE in torsion (positive = epididymitis)."},
{mod:10,vignette:"You are counseling a 15-year-old girl about her menstrual cycle and breast health. She reports her periods come every 28 days and her last period started on the 1st of the month.",stem:"Based on a 28-day cycle starting on the 1st, when should she perform her next BSE?",opts:["On the 1st of next month — the first day of her next period","On days 4–7 of her cycle, which would be the 4th through the 7th of this month (4–7 days after her period began)","On day 14 — mid-cycle when estrogen peaks","On the last day of her period when bleeding has just stopped"],ans:1,rat:"BSE should be performed on days 4–7 of the menstrual cycle — counting from day 1, which is the FIRST DAY OF MENSTRUAL FLOW. If her period started on the 1st, her optimal BSE window is the 4th through the 7th of that same month. This is a frequently tested fact: the cycle starts on day 1 of BLEEDING, and BSE is performed days 4–7 after that."},
{mod:10,vignette:"A nurse practitioner student asks you: 'When I palpate the Bartholin glands, where exactly should my fingers be and what am I feeling for?'",stem:"Which description correctly identifies the location and palpation technique for the Bartholin glands?",opts:["Palpate at the 12 and 6 o'clock positions of the vaginal introitus using one finger inside and one outside","Palpate the posterior labia majora at the 5 and 7 o'clock positions with gloved index finger in vagina and thumb outside — normally not palpable; swelling, induration, or tenderness is abnormal","Palpate at the anterior labia minora at the 10 and 2 o'clock positions using bimanual technique","Palpate along the urethra from the meatus inward — normal Bartholin glands are smooth and approximately 1 cm"],ans:1,rat:"The Bartholin glands are located bilaterally in the posterior labia majora at the 5 and 7 o'clock positions. The correct palpation technique uses the gloved index finger placed inside the vagina and the thumb outside. Normally the Bartholin glands are NOT palpable. Any swelling, induration, pain, or erythema around the duct opening is abnormal."},
{mod:10,vignette:"During a physical exam of a newborn girl, you note the labia majora appear prominent, the clitoris seems relatively large, and there is a small amount of mucoid whitish vaginal discharge. The mother is alarmed.",stem:"How should the NP interpret and respond to these findings?",opts:["These findings are abnormal — refer immediately to pediatric endocrinology for ambiguous genitalia workup","These findings are normal newborn responses to maternal estrogen exposure — the labia appear prominent, clitoris relatively large, and mucoid discharge (even pseudomenstruation) is a normal physiologic response","The vaginal discharge indicates infection — culture and treat with antibiotics","The prominent clitoris indicates congenital adrenal hyperplasia — urgent cortisol levels required"],ans:1,rat:"Newborn girls are under the influence of maternal estrogen, which causes several normal physiologic findings: prominent labia majora, a relatively large-appearing clitoris, prominent hymenal tissue, and mucoid vaginal discharge. This discharge may even be blood-tinged (pseudomenstruation) due to estrogen withdrawal after delivery. These findings resolve within the first few weeks of life."},
{mod:11,vignette:"A 35-year-old construction worker presents with right knee pain after twisting his knee while carrying materials. He reports his knee 'locks up' and gives way unpredictably. On examination you perform the McMurray test and hear an audible click with valgus stress and external rotation during extension.",stem:"What structure is most likely injured, and what does the Ottawa Knee Rule suggest regarding imaging?",opts:["ACL tear — Lachman test would be more appropriate; Ottawa rules do not apply","Torn meniscus — McMurray positive; Ottawa Knee Rules indicate imaging if patient cannot flex knee to 90°, cannot bear weight for 4 steps, has isolated patellar or fibular head pain, or is ≥55 years","Posterior cruciate ligament — posterior drawer test would confirm","Patellar fracture — Ottawa rules require imaging for any knee pain after trauma"],ans:1,rat:"A positive McMurray test (audible or palpable click with valgus stress + external rotation + extension) indicates a torn meniscus. The Ottawa Knee Rules guide imaging: obtain X-ray if (1) isolated pain at patella or fibular head, (2) age ≥55, (3) cannot flex knee to 90 degrees, or (4) cannot bear weight for 4 steps."},
{mod:11,vignette:"A 28-year-old female gymnast complains of shoulder pain during overhead movements. On examination you find limited abduction with pain starting at about 60 degrees, and muscle spasm. She reports difficulty reaching overhead.",stem:"Which rotator cuff muscle is most commonly injured in overhead athletes, and what movement does it primarily assist?",opts:["Subscapularis — primary internal rotator; most commonly torn in overhead athletes","Supraspinatus — initiates the first 15 degrees of abduction; most commonly torn rotator cuff muscle, especially in overhead activities","Infraspinatus — primary external rotator; most commonly injured in swimmers","Teres minor — assists external rotation; most commonly injured with direct trauma"],ans:1,rat:"The supraspinatus is the most commonly torn rotator cuff muscle. It initiates abduction (first 15 degrees) and is most vulnerable to impingement under the acromion during overhead activities. A painful arc during abduction (pain between 60–120 degrees = supraspinatus impingement zone) is a classic clinical finding."},
{mod:11,vignette:"You are examining a 55-year-old man's hands. You note bony, hard enlargements at the DIP joints bilaterally, with some enlargement at the PIP joints. He reports morning stiffness that lasts about 15 minutes and pain that worsens throughout the day with use.",stem:"What are the DIP joint enlargements called, what are the PIP joint enlargements called, and what condition do they indicate?",opts:["Bouchard nodes at DIP, Heberden nodes at PIP — rheumatoid arthritis","Heberden nodes at DIP, Bouchard nodes at PIP — osteoarthritis","Tophi at DIP joints — gout","Rheumatoid nodules at DIP and PIP — rheumatoid arthritis"],ans:1,rat:"Heberden nodes are bony hard enlargements at the DISTAL interphalangeal (DIP) joints — pathognomonic for osteoarthritis (OA). Bouchard nodes are bony enlargements at the PROXIMAL interphalangeal (PIP) joints — also seen in OA. OA morning stiffness is characteristically <30 minutes and pain worsens with activity. Memory: H comes before B alphabetically; DIP comes before PIP = Heberden at DIP, Bouchard at PIP."},
{mod:11,vignette:"A 70-year-old woman with osteoporosis asks about her bone density scan results. Her T-score is -2.8. She asks what this means and when she should have been screened.",stem:"Which statement most accurately addresses DEXA screening recommendations and T-score interpretation?",opts:["All women should be screened at age 50; a T-score of -2.8 is in the normal range","All women should have a DEXA by age 65; a T-score of -2.5 or below indicates osteoporosis; this patient's T-score of -2.8 confirms osteoporosis and treatment should be considered","DEXA is only needed after a fracture; T-scores are only meaningful in men","T-scores between -1 and -2.5 indicate osteoporosis; below -1 is normal"],ans:1,rat:"DEXA screening: all women by age 65 (earlier with risk factors). T-score: 0 to -1.0 = normal. -1.0 to -2.5 = osteopenia. -2.5 or below = osteoporosis. This patient's T-score of -2.8 confirms osteoporosis and warrants treatment discussion (bisphosphonates, calcium, vitamin D, fall prevention)."},
{mod:11,vignette:"During a newborn assessment you perform the Ortolani maneuver and Barlow maneuver. The Barlow maneuver produces a palpable 'clunk' on the right side when you adduct the hip and apply posterior pressure.",stem:"What does a positive Barlow maneuver indicate?",opts:["The right hip is dislocated and is being reduced by the maneuver — consistent with DDH","The right hip is unstable and can be DISLOCATED posteriorly with the maneuver — consistent with developmental dysplasia of the hip (DDH)","The right hip has normal stability — the clunk is the femoral head seating into the acetabulum","Leg length discrepancy — refer for X-ray"],ans:1,rat:"The Barlow maneuver tests for hip instability — can the hip BE dislocated? Technique: adduct the hip and apply gentle posterior pressure. A positive Barlow = a palpable clunk as the femoral head slips OUT of the acetabulum posteriorly, indicating the hip is unstable and dislocatable. This is the opposite of the Ortolani maneuver, which reduces a dislocated hip. Both positive findings indicate DDH requiring orthopedic referral."},
{mod:12,vignette:"You are testing cranial nerves on a 45-year-old patient. You ask him to clench his teeth, then palpate the masseter and temporalis muscles for bulk and strength. You then test sensation on his forehead, cheek, and chin using a wisp of cotton.",stem:"Which cranial nerve is being assessed, and what are its motor and sensory components?",opts:["CN VII — motor to facial muscles of expression; sensory to anterior tongue","CN V (Trigeminal) — motor to muscles of mastication (masseter, temporalis); sensory to face/scalp via three divisions (V1 ophthalmic, V2 maxillary, V3 mandibular)","CN IX — motor to pharynx; sensory to posterior tongue","CN XI — motor to trapezius and SCM; no sensory component"],ans:1,rat:"CN V (Trigeminal) is a mixed nerve. Motor: muscles of mastication — masseter, temporalis, and pterygoids. Sensory: three divisions — V1 (ophthalmic) = forehead/cornea, V2 (maxillary) = cheeks/upper lip/nasal, V3 (mandibular) = chin/jaw/lower lip. CN VII controls facial expression muscles, not mastication."},
{mod:12,vignette:"On neurologic exam, a patient cannot move her right eye laterally (cannot abduct the right eye). All other eye movements are intact. She reports horizontal diplopia when looking to the right.",stem:"Which cranial nerve is most likely affected?",opts:["CN III (Oculomotor) — controls most extraocular movements including medial, superior, inferior gaze","CN IV (Trochlear) — controls downward and inward eye movement via the superior oblique","CN VI (Abducens) — controls LATERAL eye movement (abduction); deficit causes inability to abduct the eye and horizontal diplopia","CN II (Optic) — controls visual acuity and visual fields"],ans:2,rat:"CN VI (Abducens) controls the lateral rectus muscle, which ABDUCTS the eye. A CN VI palsy causes inability to abduct the affected eye, resulting in horizontal diplopia when looking toward the affected side. CN III controls most other eye movements plus pupil constriction and eyelid opening. CN IV controls the superior oblique (down and inward movement)."},
{mod:12,vignette:"A 35-year-old patient presents for evaluation of a new tremor. You perform rapid alternating movements: you ask the patient to alternately pat the palm and back of the hand on the knee as fast as possible. The patient has irregular, slow, clumsy movements that cannot maintain rhythm.",stem:"What is this finding called, what does it indicate, and which neurologic system is involved?",opts:["Asterixis — flapping tremor of wrists indicating hepatic encephalopathy","Dysdiadochokinesia — inability to perform rapid alternating movements smoothly — indicates cerebellar dysfunction","Bradykinesia — slowness of movement indicating basal ganglia dysfunction (Parkinsonism)","Intention tremor at rest — indicates essential tremor, managed with propranolol"],ans:1,rat:"Dysdiadochokinesia is the inability to perform rapid alternating movements smoothly — the hallmark of cerebellar dysfunction. Cerebellar lesions produce clumsy, irregular, arrhythmic alternating movements. Other cerebellar signs include: ataxic gait, intention tremor (worsens approaching target), nystagmus, and dysarthria."},
{mod:12,vignette:"You are performing a neurologic screening exam on a 68-year-old woman. You ask her to stand with feet together and arms at her sides. With eyes open she stands steadily. When she closes her eyes, she immediately begins to sway significantly and grabs for support.",stem:"What test was performed, what is the result, and what does this indicate?",opts:["Positive Romberg test — swaying with eyes closed indicates proprioceptive or vestibular deficit (not primarily cerebellar)","Negative Romberg test — swaying with eyes closed is normal in older adults","Positive heel-to-shin test — indicates upper motor neuron disease","Positive finger-nose-finger test — indicates intention tremor from cerebellar disease"],ans:0,rat:"The Romberg test assesses proprioception and vestibular integrity. A POSITIVE Romberg = can stand with eyes open but loses balance with eyes CLOSED. This indicates a deficit in proprioception (dorsal column pathway) or vestibular function. In cerebellar ataxia, the patient is unsteady with BOTH eyes open AND closed because the problem is coordination itself."},
{mod:12,vignette:"A 72-year-old man is referred for memory evaluation. His family reports he frequently gets lost in his own neighborhood, cannot recall what he did yesterday, asks the same questions repeatedly, and recently accused his wife of stealing his wallet (which was in his pocket).",stem:"Which early warning signs of Alzheimer's disease are demonstrated in this case?",opts:["Age-related memory changes only — forgetting occasionally and retracing steps is normal","Memory loss that disrupts daily life, getting lost in familiar places, repetitive questioning, misplacing objects and accusing others of stealing, and lack of insight into deficits — all consistent with Alzheimer's disease","This presentation is consistent with normal aging — reassure the family","Depression-related pseudodementia — treat with antidepressants and reassess"],ans:1,rat:"This case demonstrates multiple Alzheimer's disease warning signs: memory loss disrupting daily life, getting lost in familiar places, repetitive questioning, misplacing items and accusing others of stealing, and lack of insight (anosognosia). The temporal and parietal lobes (especially hippocampus) show asymmetric atrophy on imaging."},
{mod:12,vignette:"During a neurologic history, a 58-year-old patient reports sudden onset of right arm weakness and difficulty speaking that occurred yesterday and resolved within 30 minutes. He assumed it was nothing.",stem:"What neurologic history finding is this, and what is the clinical priority?",opts:["Migraine with aura — schedule neurology follow-up in 3–6 months","Transient ischemic attack (TIA) — neurologic symptoms lasting <24 hours that resolve completely; this is a medical emergency requiring same-day evaluation as it is a major warning sign of impending stroke","Bell's palsy — facial weakness that resolves spontaneously; reassure and prescribe steroids","Syncope — vasovagal episode; reassure and discuss hydration"],ans:1,rat:"A TIA is a neurologic deficit caused by temporary focal brain ischemia that resolves completely within 24 hours. It is a medical emergency because approximately 10–15% of TIA patients have a stroke within 3 months, with highest risk in the first 48 hours. Sudden arm weakness + speech difficulty = cortical symptoms consistent with carotid territory TIA."},
{mod:12,vignette:"You are reviewing a patient's chart and notice the following documentation in the Plan section: 'Patient states she has been feeling more fatigued lately and rates her pain as 6/10.' You recognize this is incorrectly placed.",stem:"Where should this information be documented in a SOAP note?",opts:["Assessment section — fatigue and pain are diagnostic clues","Plan section — this is correct placement as these are items to address in the plan","Subjective section — patient-reported symptoms (fatigue, pain rating) belong in the subjective section","Objective section — pain scale and fatigue are measured by the clinician"],ans:2,rat:"In SOAP documentation: Subjective (S) = everything the patient reports — fatigue is a patient-reported symptom, and a self-reported pain rating (6/10) is subjective data. Objective (O) = clinician-measured data. Assessment (A) = diagnosis/clinical reasoning. Plan (P) = actions. The error: patient-reported symptoms were placed in the Plan section."},
{mod:12,vignette:"A 55-year-old woman is asked to follow your finger with her eyes as you move it through the six cardinal positions of gaze. When she looks to the far left, you notice her left eye abducts normally but her right eye does not adduct — it stays in midposition. Both eyes show horizontal nystagmus when looking left.",stem:"What finding does this describe, and which structure is implicated?",opts:["CN VI palsy of the right eye — right lateral rectus cannot abduct","Internuclear ophthalmoplegia (INO) — a lesion in the medial longitudinal fasciculus (MLF) causing failure of adduction of the ipsilateral eye with nystagmus in the abducting eye","CN III palsy — oculomotor nerve damage causing ptosis and down-and-out gaze","CN IV palsy — superior oblique dysfunction causing vertical diplopia"],ans:1,rat:"Internuclear ophthalmoplegia (INO) results from a lesion in the medial longitudinal fasciculus (MLF). The affected eye FAILS TO ADDUCT on lateral gaze while the other eye abducts with nystagmus. INO is a classic finding in multiple sclerosis in young adults and brainstem stroke in older adults."},
{mod:12,vignette:"The NP is reviewing a neurologic past medical history with a new patient who reports new-onset neurologic symptoms.",stem:"Which combination of associated history items is most important to include in the neurologic past medical history?",opts:["Dermatologic history, dietary preferences, and sleep patterns only","Cardiovascular history (stroke risk factors, HTN, afib, hyperlipidemia), metabolic conditions (diabetes — peripheral neuropathy), substance use (alcohol — neuropathy, Wernicke's), psychiatric history (depression mimics dementia), prior head trauma, seizure history, and medication list","Obstetric history, dental history, and vision prescription changes only","Immunization history and travel history exclusively"],ans:1,rat:"A comprehensive neurologic history must explore associated systems: Cardiovascular (stroke risk), metabolic (diabetes neuropathy, thyroid dysfunction), substance use (alcohol neuropathy, Wernicke's), medications (neurologic side effects), psychiatric history (depression mimics dementia), prior head trauma (dementia risk), seizure history, and family history of hereditary neurologic conditions."},
{mod:13,vignette:"A 17-year-old male soccer player is undergoing his annual sports physical. During the history portion of the PPE, he reports that he briefly lost consciousness during a game last season. He thought it was from the heat and did not seek medical evaluation.",stem:"How should the NP proceed with this history finding?",opts:["This is a benign vasovagal episode in an athlete — document and clear for participation","Exertional syncope in a young athlete is a major red flag for potentially life-threatening cardiac conditions (HCM, long QT, arrhythmia) — the patient should NOT be cleared until cardiology evaluation with ECG and echocardiogram is completed","The episode is too remote to be clinically significant — clear for participation","Exertional syncope is only concerning if associated with chest pain — without chest pain, this is not a cardiac red flag"],ans:1,rat:"Unexplained syncope or near-syncope — especially EXERTIONAL — is one of the most critical red flags in the sports PPE. It may indicate HCM, long QT syndrome, arrhythmia, or other potentially fatal cardiac conditions. The AHA 14-point PPE specifically asks about exertional syncope. Athletes should NOT be cleared until cardiology evaluation rules out structural or electrical cardiac disease."},
{mod:13,vignette:"During the orthopedic screen of a 14-year-old girl's sports physical, you ask her to bend forward at the waist with her feet together and hands together. You observe a prominent rib hump on the right side when viewed from behind.",stem:"What condition does this finding suggest, and what is the name of this screening test?",opts:["Kyphosis — treated with physical therapy; the Adams forward bend test is not relevant here","Scoliosis — the Adams forward bend test reveals a rib hump (rotational deformity) on the convex side of the curve; requires further evaluation with X-ray to measure Cobb angle","Lordosis — excessive lumbar curvature; the finding is a normal variant","Leg length discrepancy — refer for orthotics"],ans:1,rat:"The Adams forward bend test is the standard screening test for scoliosis. A positive finding is a rib hump when viewed from behind, caused by vertebral rotation. A rib hump on the RIGHT = right thoracic scoliosis (most common). Requires X-ray to measure the Cobb angle — curves >10° = scoliosis; >25–40° may require bracing; >40–50° may require surgery."},
{mod:13,vignette:"A 16-year-old male presents for his sports physical. He is 6'4\", weighs 175 lbs, has long arms and fingers, a high-arched palate, pectus excavatum, and mild myopia. His father had heart surgery at age 32.",stem:"What condition should the NP be concerned about, and what is the cardiovascular implication?",opts:["Klinefelter syndrome — associated with infertility but no cardiac risk in athletes","Marfan syndrome — associated with aortic root dilation and risk of aortic dissection; this athlete should be referred to cardiology before sports clearance","Normal tall athletic build — no further evaluation needed","Turner syndrome — associated with coarctation of the aorta but only in females"],ans:1,rat:"Marfan syndrome physical stigmata include: tall stature, long limbs (arm span > height), arachnodactyly, high-arched palate, pectus excavatum/carinatum, lens subluxation, and myopia. The critical cardiovascular complication is aortic root dilation, which can lead to aortic dissection or rupture. The AHA PPE specifically screens for Marfan stigmata. Requires cardiology evaluation (echocardiogram) before sports clearance."},
{mod:14,vignette:"A 4-year-old child is brought to urgent care with sudden onset of high-pitched stridor, drooling, and sitting in a tripod position (leaning forward with neck extended). He appears toxic with a temperature of 39.8°C. He had no URI symptoms before today.",stem:"What is the most likely diagnosis and the most critical immediate action?",opts:["Croup — treat with nebulized racemic epinephrine and dexamethasone; discharge when improved","Epiglottitis — this is a life-threatening upper airway emergency; do NOT examine the throat, keep the child calm, call 911, prepare for immediate airway management in a controlled setting (OR or ICU)","Foreign body aspiration — perform Heimlich maneuver immediately","Bronchiolitis — nebulized albuterol and supportive care"],ans:1,rat:"Epiglottitis is a life-threatening supraglottic infection. Classic presentation: sudden onset, high fever, toxic appearance, drooling (cannot swallow secretions), stridor, and tripod positioning. CRITICAL: Do NOT examine the throat with a tongue depressor — can precipitate complete airway obstruction. Keep calm, provide oxygen, call 911, prepare for immediate airway management."},
{mod:14,vignette:"A 78-year-old woman with a known DNR/POLST order is brought to urgent care by EMS after being found unresponsive at home. Her daughter, who is the healthcare proxy, is present and insists the team 'do everything.' The POLST is valid and signed by her physician.",stem:"What is the NP's appropriate action in this situation?",opts:["Honor the daughter's request since she is the healthcare proxy — begin CPR","Honor the valid POLST form — do not initiate CPR; explain to the daughter that the POLST represents her mother's own documented wishes and supersedes surrogate requests; provide comfort care","Initiate CPR until the ethics committee can be reached","Begin CPR since the patient is unresponsive and cannot confirm her wishes"],ans:1,rat:"A POLST is a legally binding medical order that reflects the patient's own autonomous decision about life-sustaining treatment. It supersedes surrogate requests, including those of a healthcare proxy. The healthcare proxy's role is to make decisions when NO documented directive exists — not to override an existing one. The NP should provide comfort-focused care and explain this respectfully."},
{mod:14,vignette:"A 16-year-old male football player is seen on the sideline after a collision. He is alert and oriented but reports 'seeing stars', has a brief headache, and cannot remember the play just before the collision. There was no loss of consciousness.",stem:"What do these findings represent, and what is the return-to-play protocol?",opts:["A mild contusion — may return to play after 5 minutes of rest if symptoms resolve","A concussion — the athlete must NOT return to play on the day of injury regardless of symptom resolution; follow the graduated return-to-play (GRTP) protocol starting the next day if asymptomatic","A subconcussive hit — no restriction from play is required","Loss of consciousness is required for concussion diagnosis — this athlete did not have a concussion"],ans:1,rat:"Concussion does NOT require loss of consciousness. KEY RULE: An athlete with a suspected concussion must NOT return to play on the same day, even if symptoms completely resolve. After 24 hours of rest without symptoms, a stepwise graduated return-to-play (GRTP) protocol begins: rest → light aerobic exercise → sport-specific exercise → non-contact drills → full contact practice → return to competition."},
{mod:14,vignette:"During an urgent care shift, you receive a patient who was transferred from a rural clinic. The transfer paperwork includes a note from the sending provider but no lab results, no EKG, and no imaging that was reportedly performed. The patient is a 67-year-old woman with chest pain.",stem:"What does EMTALA require of the sending facility when transferring a patient?",opts:["EMTALA only applies to emergency departments — urgent care clinics are exempt from transfer regulations","EMTALA requires that all relevant records, test results, and imaging accompany the patient; the sending facility must stabilize the patient to the best of its ability before transfer; physician-to-physician communication is required; and transfer must occur via appropriate transport based on patient acuity","The receiving facility is solely responsible for obtaining records after the patient arrives","EMTALA only requires transfer via ALS ambulance — documentation is optional"],ans:1,rat:"EMTALA requires: (1) Stabilization to the best of the sending facility's ability. (2) All relevant medical records — labs, imaging, EKG results — must ACCOMPANY the patient. (3) Physician-to-physician communication between providers. (4) Appropriate transport modality based on patient acuity. (5) Patient or legally authorized surrogate must consent to transfer. Violation carries significant legal and financial penalties."},
{mod:12,vignette:"A 48-year-old patient with a history of heavy alcohol use for 20 years presents with gait ataxia, confusion, and ophthalmoplegia (paralysis of eye movements). His wife reports he has been severely malnourished.",stem:"What neurologic emergency is this, which nutritional deficiency causes it, and what is the immediate treatment?",opts:["Hepatic encephalopathy — treated with lactulose and rifaximin","Wernicke's encephalopathy — caused by thiamine (vitamin B1) deficiency; immediate IV thiamine is the treatment; the triad is ophthalmoplegia, ataxia, and confusion","Korsakoff syndrome — permanent amnesia from alcohol use; no acute treatment available","Alcohol withdrawal delirium (DTs) — treat with benzodiazepines"],ans:1,rat:"Wernicke's encephalopathy is caused by thiamine (vitamin B1) deficiency, most commonly from chronic alcohol use with malnutrition. The classic TRIAD: ophthalmoplegia, ataxia, confusion. Treatment: immediate IV thiamine — glucose should NOT be given before thiamine. If untreated, progresses to Korsakoff syndrome (irreversible anterograde amnesia with confabulation)."},
{mod:10,vignette:"You are performing a developmental assessment on a 2-month-old female infant. The mother is concerned about the baby's genitalia appearing 'swollen and large' at birth, which has since resolved. She reports a small amount of bloody vaginal discharge on day 3 of life that lasted 2 days.",stem:"How should the NP counsel this mother?",opts:["The bloody discharge was abnormal — refer to pediatric gynecology for further evaluation","Both findings were normal newborn responses to maternal estrogen: prominent labia and clitoris due to estrogen effect, and pseudomenstruation (blood-tinged withdrawal bleeding) as maternal estrogen levels drop after delivery — both resolve spontaneously","Prominent labia at birth indicates ambiguous genitalia requiring chromosomal analysis","Vaginal discharge in a newborn always indicates infection — culture and treat"],ans:1,rat:"Newborn girls experience physiologic changes from maternal estrogen exposure: prominent labia majora, relatively large-appearing clitoris, and mucoid or blood-tinged vaginal discharge (pseudomenstruation) as maternal estrogen drops after delivery, causing a withdrawal bleed from the stimulated endometrium. Entirely normal; resolves within the first 1–2 weeks."},
{mod:11,vignette:"A 16-year-old male wrestler presents for a pre-season physical. During your examination you note that when he bends forward, his left shoulder and rib area is more prominent than the right when viewed from behind. He denies back pain.",stem:"What condition should be evaluated further, what is the screening test called, and what measurement tool is used to quantify the curve?",opts:["Kyphosis — Adams forward bend test; Risser classification measures severity","Scoliosis — Adams forward bend test reveals rib hump; Cobb angle on spinal X-ray measures the degree of lateral curvature","Lordosis — Adams forward bend test; Cobb angle measures lumbar curvature","Leg length discrepancy — Galeazzi sign; measure ASIS to medial malleolus"],ans:1,rat:"Scoliosis screening: the Adams forward bend test is the standard tool. A rib hump indicates vertebral rotation accompanying a lateral curve. Cobb angle on spinal X-ray quantifies severity: >10° = scoliosis, 25–40° = bracing may be indicated, >40–50° = surgical evaluation. The left rib hump here suggests a left thoracic scoliosis curve."},
{mod:12,vignette:"A 25-year-old woman presents with sudden onset of severe headache she describes as 'the worst headache of my life.' She is alert but has neck stiffness and photophobia. Temperature is 38.1°C.",stem:"What does this presentation suggest, and what is the appropriate urgent action?",opts:["Tension headache — treat with ibuprofen and stress reduction","A thunderclap headache with neck stiffness and photophobia is the classic presentation of subarachnoid hemorrhage (SAH) or meningitis — this is a neurologic emergency requiring immediate transfer to the emergency department for CT head and lumbar puncture","Migraine with meningismus — treat with triptans and anti-emetics","Cervicogenic headache — physical therapy and NSAIDs"],ans:1,rat:"The 'worst headache of my life' with sudden onset (thunderclap headache) is the classic presentation of SUBARACHNOID HEMORRHAGE until proven otherwise. Neck stiffness + photophobia + fever also raises concern for bacterial meningitis. Both are life-threatening neurologic emergencies requiring CT head and lumbar puncture. This presentation should NEVER be dismissed without ruling out SAH first."},
{mod:12,vignette:"You test a 70-year-old man's deep tendon reflexes using a reflex hammer. At the knee, you tap the patellar tendon and the knee extends briskly. You grade this as 2+.",stem:"What does a 2+ reflex indicate, and what is the clinical significance of hyperreflexia (4+) versus hyporeflexia (0–1+)?",opts:["2+ indicates hyperreflexia and suggests upper motor neuron disease","2+ is the normal expected response; hyperreflexia (3–4+) suggests UMN lesion or metabolic cause; hyporeflexia/areflexia (0–1+) suggests LMN lesion, peripheral neuropathy, or severe metabolic disorder","2+ indicates hyporeflexia and suggests peripheral neuropathy","All reflex grades from 0–4+ are normal variants with no clinical significance"],ans:1,rat:"Deep tendon reflex grading: 0 = absent, 1+ = diminished, 2+ = normal, 3+ = brisk (possibly abnormal), 4+ = hyperreflexia with clonus. Hyperreflexia (3–4+) = UMN lesion (stroke, MS, spinal cord injury). Hyporeflexia/areflexia (0–1+) = LMN lesion, peripheral neuropathy, hypothyroidism. The patellar reflex tests L2-L4; Achilles tests S1-S2; biceps tests C5-C6; triceps tests C7."},
{mod:10,vignette:"A 38-year-old woman reports that during her last menstrual cycle, her breasts felt extremely full, heavy, and tender for several days before her period started. She asks if this is normal.",stem:"How should the NP explain this cyclic breast change?",opts:["This is abnormal — cyclic breast tenderness always requires mammography","This is a normal physiologic response — breast volume is greatest and nodularity increases in the 3–4 days before menstruation due to hormonal influence; breasts are smallest on days 4–7 of the cycle","This suggests fibrocystic breast disease requiring ultrasound","Premenstrual breast pain indicates hormone imbalance requiring laboratory evaluation"],ans:1,rat:"Cyclic mastalgia and increased nodularity in the days before menstruation is a NORMAL physiologic response. In the luteal phase, progesterone and estrogen levels peak, causing increased breast fluid retention, nodularity, and tenderness. Breast volume peaks in the 3–4 days before menstruation. Breasts are smallest on days 4–7 of the cycle. This is also why BSE is performed on days 4–7 — to avoid the confounding effect of premenstrual breast changes."},
{mod:11,vignette:"A 22-year-old male lacrosse player complains of knee pain after a twisting injury. On examination you stabilize the distal femur and pull the tibia anteriorly with the knee flexed at 20–30 degrees. There is increased anterior translation with a soft, mushy endpoint compared to the other side.",stem:"What test was performed and what structure is likely injured?",opts:["McMurray test — positive for torn medial meniscus","Lachman test — positive for anterior cruciate ligament (ACL) tear","Posterior drawer test — positive for posterior cruciate ligament (PCL) tear","Valgus stress test — positive for medial collateral ligament (MCL) tear"],ans:1,rat:"The Lachman test is the most sensitive test for ACL integrity. With the knee flexed 20–30°, anterior force is applied to the tibia. A positive Lachman = increased anterior tibial translation with a soft or mushy endpoint (vs. firm endpoint in intact ACL). This indicates ACL rupture. The Lachman test is more sensitive than the anterior drawer test (which uses 90° flexion)."},
{mod:12,vignette:"A nursing student asks you to explain the difference between upper motor neuron (UMN) and lower motor neuron (LMN) lesions during a neurologic case review.",stem:"Which combination of findings correctly distinguishes UMN from LMN lesions?",opts:["UMN: flaccid paralysis, muscle atrophy, fasciculations, absent reflexes. LMN: spastic paralysis, hyperreflexia, Babinski sign","UMN: spastic paralysis, hyperreflexia, positive Babinski sign, no atrophy. LMN: flaccid paralysis, muscle atrophy, fasciculations, absent or decreased reflexes","Both UMN and LMN lesions cause identical findings — distinguished only by imaging","UMN: affects only cranial nerves. LMN: affects only spinal nerves"],ans:1,rat:"UMN lesions (brain and spinal cord — above the anterior horn) produce: spastic paralysis, hyperreflexia, positive Babinski sign, minimal atrophy. Examples: stroke, MS, spinal cord injury. LMN lesions (anterior horn cells, nerve roots, peripheral nerves) produce: flaccid paralysis, hyporeflexia/areflexia, significant muscle atrophy, fasciculations, no Babinski. Examples: Guillain-Barré, peripheral neuropathy, Bell's palsy."},
{mod:10,vignette:"A 55-year-old woman presents for her annual exam. She has not had a mammogram in 3 years. She is 52 years old.",stem:"Which statement correctly reflects American Cancer Society mammography screening recommendations?",opts:["Mammography is recommended annually for all women beginning at age 40 with no option to delay","Women ages 45–54 should have annual mammography; women 55 and older may transition to biennial screening or continue annually; women ages 40–44 have the opportunity to begin annual screening","Mammography is not recommended until age 60 for average-risk women","Clinical breast exam (CBE) is recommended annually and replaces mammography for women under 60"],ans:1,rat:"ACS mammography guidelines: Ages 40–44 = opportunity to begin annual mammography (individual decision). Ages 45–54 = annual mammography recommended. Ages 55+ = may transition to biennial or continue annual. The ACS does NOT recommend CBE for average-risk women at any age as a screening tool. This patient at 52 (in the 45–54 range) should be receiving ANNUAL mammography."},
{mod:12,vignette:"A 44-year-old patient presents with numbness and tingling in her pinky finger and the medial half of her ring finger. She works as a data entry specialist.",stem:"Which dermatome/peripheral nerve distribution correlates with numbness in the fifth (pinky) finger?",opts:["C6 — thumb","C7 — middle finger","C8 — fifth (little) finger and medial ring finger","T1 — axilla and medial forearm"],ans:2,rat:"Key dermatome landmarks for the upper extremity: C6 = thumb, C7 = middle finger, C8 = fifth (little/pinky) finger. Numbness in the pinky and medial ring finger corresponds to C8 dermatomal territory. The ulnar nerve (C8-T1) innervates the intrinsic hand muscles and provides sensation to the little finger and medial ring finger."},
{mod:13,vignette:"During the preparticipation physical for a 15-year-old female volleyball player, you assess her blood pressure in both arms while seated. Her right arm BP is 128/78 and her left arm BP is 86/54.",stem:"What does a significant blood pressure difference between the two arms suggest, and what is the clinical concern in a young athlete?",opts:["This is a normal finding — BP can vary 10–20 mmHg between arms at any age","A >10–15 mmHg difference in systolic BP between arms suggests coarctation of the aorta — the AHA PPE specifically screens for this by checking BP in both arms and femoral pulses","This indicates white coat hypertension — repeat in a relaxed setting","This finding is only significant in adults; in adolescents it reflects normal vascular development"],ans:1,rat:"The AHA 14-point preparticipation cardiovascular screening includes measuring blood pressure in BOTH arms and checking femoral pulses. A significant difference in BP between arms (>10–15 mmHg systolic) or diminished/absent femoral pulses suggests coarctation of the aorta — a congenital narrowing of the aortic arch. Requires cardiology referral before sports clearance."},
{mod:14,vignette:"You are working in an urgent care clinic when a 3-year-old girl is brought in. She is irritable and crying. Her temperature is 39.2°C rectally. On otoscopic exam you see a bulging, erythematous, opacified tympanic membrane with loss of landmarks on the left.",stem:"This scenario illustrates an important concept about fever in young children. Which statement is most accurate?",opts:["Fever in children under 5 is never a medical emergency and can always be managed with antipyretics at home","In infants under 3 months, any fever >38°C (100.4°F) represents a potential emergency (sepsis risk) regardless of source; in older infants and children, the source and clinical appearance guide urgency","Fever is only concerning if accompanied by a rash — otitis media with fever in a 3-year-old is always managed outpatient","All febrile children under 5 require a lumbar puncture to rule out meningitis"],ans:1,rat:"In infants UNDER 3 months, ANY fever ≥38°C is treated as a potential emergency (sepsis, meningitis risk) regardless of source — requires full sepsis workup. In OLDER infants and children (like this 3-year-old), fever management is guided by the SOURCE identified on exam and the child's clinical appearance. This child has an identified source (acute otitis media) — appropriate for outpatient management."},
{mod:11,vignette:"A 19-year-old female gymnast has wrist pain after a fall on an outstretched hand. On exam there is anatomical snuffbox tenderness. X-ray is negative.",stem:"What injury must be suspected even with a negative initial X-ray, and why is this clinically important?",opts:["Colles' fracture — always visible on initial X-ray; if negative, no fracture occurred","Scaphoid fracture — the most commonly missed wrist fracture; may not appear on initial X-ray for up to 2 weeks; anatomical snuffbox tenderness is the key clinical finding; treat as scaphoid fracture until proven otherwise due to avascular necrosis risk","Distal radius fracture — treat conservatively with wrist splint","De Quervain tenosynovitis — treat with thumb spica splint and NSAIDs"],ans:1,rat:"Anatomical snuffbox tenderness after wrist trauma = suspect scaphoid fracture until proven otherwise, even with a normal initial X-ray. Initial X-rays are negative in up to 20% of cases. The critical concern is avascular necrosis (AVN) of the scaphoid — the proximal pole has a retrograde blood supply and is at high risk of AVN if missed. Clinically treat as a scaphoid fracture (thumb spica cast) until imaging confirms or excludes it."},
{mod:14,vignette:"A 4-year-old child is brought to urgent care with sudden onset of high-pitched stridor, drooling, and sitting in a tripod position.",stem:"What condition does tripod positioning (leaning forward, neck extended) in a febrile child with stridor and drooling most specifically suggest?",opts:["Croup — position relieves the barking cough","Epiglottitis — the child is positioned to maximize airway patency; this is a LIFE-THREATENING emergency","Asthma — tripod positioning helps use accessory muscles for breathing","Foreign body aspiration — the child positions to dislodge the foreign body"],ans:1,rat:"Tripod positioning (leaning forward with neck extended) in a febrile, drooling child with high-pitched stridor is pathognomonic for epiglottitis. The child assumes this position instinctively to maximize the airway opening around the swollen epiglottis. This is a life-threatening emergency. Do NOT examine the oropharynx with a tongue depressor — this can precipitate complete airway obstruction. Croup has a barking seal-like cough and does not typically cause drooling."},
{mod:12,vignette:"You test a 70-year-old man's sense of smell by having him close his eyes and identify familiar odors presented to each nostril separately. He is unable to identify any odors in either nostril.",stem:"Which cranial nerve is being tested, and what is the clinical significance of bilateral anosmia in an older adult?",opts:["CN II (Optic) — bilateral vision loss from optic nerve atrophy","CN I (Olfactory) — bilateral anosmia in older adults may be an early sign of neurodegenerative disease such as Parkinson's disease or Alzheimer's disease, or may result from prior head trauma, viral illness, or normal aging","CN V (Trigeminal) — sensory loss affecting the nasal mucosa","CN IX (Glossopharyngeal) — loss of taste affecting posterior tongue"],ans:1,rat:"CN I (Olfactory) mediates the sense of smell. Bilateral anosmia in older adults is clinically significant. Causes include: normal aging, Alzheimer's disease (olfactory deficits are an early feature), Parkinson's disease (hyposmia is often an early premotor symptom preceding motor findings by years), prior head trauma, viral illness/COVID-19, zinc deficiency, and nasal polyps."},
];

let cur=0,sel=Array(50).fill(-1),sub=Array(50).fill(false),cor=Array(50).fill(false);

function render(){
  const q=Qs[cur],isSub=sub[cur],s=sel[cur],ca=q.ans;
  const opts=q.opts.map((o,i)=>{
    let c='option';
    if(isSub){c+=' locked';if(i===ca)c+=' correct';else if(i===s&&s!==ca)c+=' wrong';}
    else if(i===s)c+=' selected';
    return `<div class="${c}" onclick="pick(${i})"><span class="option-letter">${String.fromCharCode(65+i)}.</span><span>${o}</span></div>`;
  }).join('');
  const rat=isSub?`<div class="rationale ${s===ca?'correct-r':'wrong-r'}"><div class="rationale-label">${s===ca?'Correct!':'Incorrect. Correct answer: '+String.fromCharCode(65+ca)+'.'}</div><div>${q.rat}</div></div>`:'';
  const nav=`<div class="nav">
    <button class="btn" onclick="go(cur-1)" ${cur===0?'disabled':''}>← Back</button>
    ${!isSub?`<button class="btn primary" onclick="submit()" ${s===-1?'disabled':''}>Submit answer</button>`:''}
    ${cur<49?`<button class="btn" onclick="go(cur+1)">Next →</button>`:''}
    ${cur===49&&isSub?`<button class="btn primary" onclick="showResults()">View final score</button>`:''}
  </div>`;
  const done=sub.filter(Boolean).length,corr=cor.filter(Boolean).length;
  document.getElementById('prog').style.width=Math.round(((cur+1)/50)*100)+'%';
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('ans-count').textContent=done;
  document.getElementById('cor-count').textContent=corr;
  document.getElementById('qarea').innerHTML=`<div class="qcard"><div class="q-meta">Module ${q.mod} · Question ${cur+1} of 50</div><div class="vignette">${q.vignette}</div><div class="stem">${q.stem}</div>${opts}${rat}</div>${nav}`;
}

function pick(i){if(sub[cur])return;sel[cur]=i;render();}
function submit(){if(sel[cur]===-1)return;sub[cur]=true;cor[cur]=(sel[cur]===Qs[cur].ans);render();}
function go(i){if(i<0||i>49)return;cur=i;render();}

function showResults(){
  const tot=cor.filter(Boolean).length,pct=Math.round((tot/50)*100);
  let grade='',gc='#A32D2D';
  if(pct>=90){grade='A — Excellent! Exam ready!';gc='#1D9E75';}
  else if(pct>=80){grade='B — Good — review weak areas';gc='#2E75B6';}
  else if(pct>=70){grade='C — Passing, more review needed';gc='#BA7517';}
  else{grade='Below passing — intensive review needed';}
  const prev=44,prevPct=Math.round((prev/49)*100);
  const diff=pct-prevPct;
  const trend=`${diff>=0?'+'+diff:diff}% vs. your Set 1 score (${prevPct}%)`;
  const rev=Qs.map((q,i)=>{
    const ok=cor[i],ua=sel[i]>=0?String.fromCharCode(65+sel[i]):'—';
    return `<div class="review-item ${ok?'r-correct':'r-wrong'}"><div class="review-q">Q${i+1} (Mod ${q.mod}): ${q.stem.substring(0,90)}...</div><div class="review-detail">Your answer: ${ua} · Correct: ${String.fromCharCode(65+q.ans)} · ${ok?'✓ Correct':'✗ Incorrect'}</div></div>`;
  }).join('');
  document.getElementById('prog').style.width='100%';
  document.getElementById('qarea').innerHTML=`<div class="score-card"><div class="score-big" style="color:${gc}">${pct}%</div><div class="score-label">${tot} of 50 correct</div><div class="grade" style="color:${gc}">${grade}</div><div class="trend">${trend}</div></div><div style="margin-bottom:1rem"><button class="btn" onclick="go(0)">← Review questions</button></div>${rev}`;
}

render();
</script>
</body>
</html>
